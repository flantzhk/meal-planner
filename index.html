    function useNow() {
      const [now, setNow] = useState(() => MP.date.hkNowMin());
      useEffect(() => {
        const id = setInterval(() => setNow(MP.date.hkNowMin()), 30 * 1000);
        return () => clearInterval(id);
      }, []);
      return now;
    }

    function TodayTimeline({ day, nextDay, recipesById, nowMin }) {
      const tasks = MP.schedule.buildDayTasks(day, nextDay, recipesById);
      if (tasks.length === 0) {
        return (
          <div className="bg-white rounded-2xl p-5 shadow-sm ring-1 ring-black/5">
            <h2 className="font-display text-xl mb-1">⏱ Today's schedule</h2>
            <p className="text-sm text-warm">Nothing planned for today yet.</p>
          </div>
        );
      }
      const kindLabel = { defrost: "❄️ Defrost", marinate: "🧂 Marinate", cook: "🔥 Cook", serve: "🍽️ Serve" };
      const kindClass = {
        defrost: "bg-sky-100 text-sky-900",
        marinate: "bg-amber-100 text-amber-900",
        cook: "bg-terra/20 text-terra",
        serve: "bg-sage/20 text-sage",
      };
      return (
        <div className="bg-white rounded-2xl p-5 shadow-sm ring-1 ring-black/5">
          <h2 className="font-display text-xl mb-3">⏱ Today's schedule</h2>
          <ol className="space-y-2">
            {tasks.map((t, i) => {
              const past = t.at <= nowMin;
              const upNext = !past && tasks.slice(0, i).every((x) => x.at <= nowMin);
              return (
                <li key={i}
                  className={`flex items-start gap-3 p-2 rounded-lg ${
                    upNext ? "bg-terra/10 ring-1 ring-terra" :
                    past ? "opacity-40" : ""
                  }`}>
                  <div className="num text-warm min-w-[5rem] pt-0.5">
                    {MP.schedule.fmtTime(t.at)}
                  </div>
                  <div className="flex-1">
                    <span className={`inline-block px-2 py-0.5 rounded-full text-xs mr-2 ${kindClass[t.kind]}`}>
                      {kindLabel[t.kind]}
                    </span>
                    <span className={past ? "line-through" : ""}>{t.label}</span>
                    {t.flagEarly && !past && (
                      <div className="text-xs text-terra mt-0.5">⚠ Start earlier than usual</div>
                    )}
                  </div>
                  {upNext && <span className="text-xs text-terra font-semibold self-center">← next</span>}
                </li>
              );
            })}
          </ol>
          <p className="text-xs text-warm mt-4 leading-relaxed">
            Send to Leni:{" "}
            <a href="https://flantzhk.github.io/meal-planner/helper.html"
               target="_blank" rel="noopener"
               className="underline break-all">flantzhk.github.io/meal-planner/helper.html</a>
          </p>
        </div>
      );
    }


    function MealCell({ day, meal, recipesById, isNow, onPickComponent, onPreviewComponent }) {
      const mealObj = getMealObj(day, meal);
      const heroId = mealObj.protein || mealObj.vegetable || mealObj.carb;
      const heroRecipe = heroId ? recipesById[heroId] : null;
      const heroImg = heroRecipe ? MP.recipeImage(heroRecipe) : null;
      const mealIsEmpty = !mealObj.protein && !mealObj.vegetable && !mealObj.carb;
      const hasOvernightDep = ALL_COMPONENTS.some((c) => {
        const r = mealObj[c] ? recipesById[mealObj[c]] : null;
        return r && MP.schedule.forMeal(meal, r, { mealTime: day[meal + "_time"] }).hasOvernightDep;
      });
      const mealEmoji = meal === "breakfast" ? "🍳" : meal === "lunch" ? "🥗" : "🍽️";

      return (
        <div className={`rounded-xl overflow-hidden ring-1 flex flex-col h-[220px] ${isNow ? "ring-2 ring-terra" : "ring-black/5"} bg-white`}>
          {/* Hero image — fixed 88px */}
          <div className="relative h-[88px] shrink-0 bg-sand/50 overflow-hidden">
            {heroImg ? (
              <img src={heroImg} alt="" className="w-full h-full object-cover"
                onLoad={(e) => {
                  if (MP.isYoutubePlaceholder(e.target)) {
                    const s = e.target.src;
                    if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                    if (heroRecipe.hero_image && s !== heroRecipe.hero_image) { e.target.src = heroRecipe.hero_image; return; }
                    e.target.style.display = "none";
                  }
                }}
                onError={(e) => {
                  const s = e.target.src;
                  if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                  if (heroRecipe.hero_image && s !== heroRecipe.hero_image) { e.target.src = heroRecipe.hero_image; return; }
                  e.target.parentElement.innerHTML = `<div class="w-full h-full flex items-center justify-center"><span class="text-3xl opacity-20">${mealEmoji}</span></div>`;
                }} />
            ) : (
              <div className="w-full h-full flex items-center justify-center">
                <span className="text-3xl opacity-20">{mealEmoji}</span>
              </div>
            )}
            {hasOvernightDep && (
              <span className="absolute top-1.5 right-1.5 bg-amber-100/90 text-amber-800 text-[10px] px-1.5 py-0.5 rounded-full">🌙 prep</span>
            )}
          </div>

          {/* Component rows */}
          <div className="flex flex-col gap-0.5 p-1.5 flex-1 overflow-hidden">
            {COMPONENTS.map((comp) => {
              const r = mealObj[comp] ? recipesById[mealObj[comp]] : null;
              return (
                <button key={comp}
                  onClick={() => r ? onPreviewComponent(comp, r) : onPickComponent(comp)}
                  className={`w-full flex items-center gap-1.5 text-left px-1.5 py-0.5 rounded-lg transition hover:bg-cream text-xs min-h-[26px] ${r ? "text-ink" : "text-warm/40"}`}>
                  <span className="shrink-0 leading-none">{COMPONENT_ICONS[comp]}</span>
                  {r ? (
                    <span className="truncate leading-tight font-medium">{r.name}</span>
                  ) : (
                    <span className="italic">Add {COMPONENT_LABELS[comp].toLowerCase()}</span>
                  )}
                </button>
              );
            })}

            {/* Optional: soup / salad */}
            <div className="flex gap-1 pt-0.5">
              {OPT_COMPONENTS.map((comp) => {
                const r = mealObj[comp] ? recipesById[mealObj[comp]] : null;
                return r ? (
                  <button key={comp} onClick={() => onPreviewComponent(comp, r)}
                    className="flex items-center gap-0.5 text-[10px] text-warm bg-sand px-1.5 py-0.5 rounded-full max-w-[50%] truncate">
                    {COMPONENT_ICONS[comp]} <span className="truncate">{r.name}</span>
                  </button>
                ) : (
                  <button key={comp} onClick={() => onPickComponent(comp)}
                    className="text-[10px] text-warm/35 hover:text-warm px-1.5 py-0.5 rounded-full ring-1 ring-dashed ring-warm/20 transition">
                    +{comp}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function MissedPrepAlert({ todayDay, recipesById, nowMin, onSwitch }) {
      const THRESHOLD = 9 * 60;
      if (!todayDay || nowMin < THRESHOLD) return null;
      const seen = new Set();
      const alerts = MEALS.flatMap((meal) =>
        getMealRecipeIds(todayDay, meal).map((id) => {
          const r = recipesById[id]; if (!r) return null;
          const sched = MP.schedule.forMeal(meal, r, { mealTime: todayDay[meal + "_time"] });
          if (!sched.hasOvernightDep || seen.has(meal)) return null;
          seen.add(meal);
          return { meal, recipe: r };
        })
      ).filter(Boolean);
      if (alerts.length === 0) return null;
      return (
        <div className="mb-4 space-y-2">
          {alerts.map(({ meal, recipe }) => (
            <div key={meal} className="flex items-center justify-between gap-3 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3">
              <div>
                <span className="text-amber-800 font-semibold text-sm">🌙 {recipe.name}</span>
                <span className="text-amber-700 text-sm"> needs overnight prep — has it been done?</span>
              </div>
              <button onClick={() => onSwitch(meal)}
                className="shrink-0 bg-amber-700 text-white text-sm px-3 py-1.5 rounded-lg">
                Switch meal
              </button>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [recipes, setRecipes] = useState(null);
      const [plan, setPlan] = useState(null);
      const [eatenLog, setEatenLog] = useState({});
      const [pantry, setPantry] = useState({});
      const [sources, setSources] = useState({});
      const [extras, setExtras] = useState([]);
      const [err, setErr] = useState(null);
      const [picker, setPicker] = useState(null); // { dayIdx, meal }
      const [preview, setPreview] = useState(null); // { dayIdx, meal, recipe }
      const [showShop, setShowShop] = useState(false);
      const [showLibrary, setShowLibrary] = useState(false);
      const [editRecipe, setEditRecipe] = useState(null); // null=closed, false=new, recipe=edit
      const [showSettings, setShowSettings] = useState(false);
      const [saving, setSaving] = useState(false);
      const [flash, setFlashMsg] = useState("");
      // Change 2: unsaved changes indicator
      const [isDirty, setIsDirty] = useState(false);

      // All hooks MUST be above the early returns so React's hook count stays
      // consistent between loading and loaded renders.
      const nowMin = useNow();

      const lang = "en"; // planner stays English; language is for helper view.

      useEffect(() => {
        (async () => {
          try {
            const [rs, wp, el, pa, sr, ex] = await Promise.all([
              MP.api.getRecipes(), MP.api.getWeekplan(), MP.api.getEatenLog(), MP.api.getPantry(),
              MP.api.getSources().catch(() => ({})),
              MP.api.getExtras().catch(() => ([])),
            ]);
            setRecipes(rs);
            setEatenLog(el || {});
            setPantry(pa || {});
            setSources(sr || {});
            setExtras(ex || []);
            if (wp) setPlan(wp);
            else setPlan(makeEmptyPlan());
          } catch (e) { setErr(e.message); }
        })();
      }, []);

      async function togglePantryItem(item, have) {
        setPantry((p) => {
          const next = { ...p };
          if (have) next[item] = new Date().toISOString().slice(0, 10);
          else delete next[item];
          return next;
        });
        try { await MP.api.togglePantry(item, have); }
        catch (e) { setFlashMsg("Pantry save failed: " + e.message); }
      }

      async function addExtra(item, source) {
        if (!item || !item.trim()) return;
        try {
          const list = await MP.api.addExtra(item.trim(), source || "supermarket");
          setExtras(list);
        } catch (e) { setFlashMsg("Add extra failed: " + e.message); }
      }
      async function toggleExtra(id, done) {
        setExtras((xs) => xs.map((x) => x.id === id ? { ...x, done } : x));
        try { await MP.api.updateExtra(id, { done }); }
        catch (e) { setFlashMsg("Update extra failed: " + e.message); }
      }
      async function removeExtra(id) {
        setExtras((xs) => xs.filter((x) => x.id !== id));
        try { await MP.api.removeExtra(id); }
        catch (e) { setFlashMsg("Remove extra failed: " + e.message); }
      }

      function handleRecipeSaved(saved) {
        setRecipes((rs) => {
          const idx = rs.findIndex((r) => r.id === saved.id);
          return idx >= 0 ? rs.map((r) => r.id === saved.id ? saved : r) : [...rs, saved];
        });
        setEditRecipe(null);
        setFlashMsg(`✓ "${saved.name}" saved.`);
      }

      function handleRecipeDeleted(id) {
        setRecipes((rs) => rs.filter((r) => r.id !== id));
        setEditRecipe(null);
        setPreview(null);
        setFlashMsg("Recipe deleted.");
      }

      async function setIngredientSource(item, source) {
        const k = (item || "").toLowerCase().trim();
        setSources((s) => {
          const next = { ...s };
          if (source) next[k] = source;
          else delete next[k];
          return next;
        });
        try { await MP.api.setSource(item, source); }
        catch (e) { setFlashMsg("Source save failed: " + e.message); }
      }

      function makeEmptyPlan() {
        const ws = MP.date.mondayOf(MP.date.hkToday());
        const names = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
        return {
          week_start: ws, shopping_day: "Monday", serves: 4, language: "en",
          days: names.map((n, i) => ({ day: n, date: MP.date.addDays(ws, i), breakfast: null, lunch: null, dinner: null })),
        };
      }

      const recipesById = useMemo(() => {
        const m = {}; (recipes || []).forEach((r) => m[r.id] = r); return m;
      }, [recipes]);

      const usedIds = useMemo(() => {
        if (!plan) return [];
        return plan.days.flatMap((d) => MEALS.flatMap((m) => getMealRecipeIds(d, m)));
      }, [plan]);

      function setSlot(dayIdx, meal, component, id) {
        setPlan((p) => {
          const days = p.days.map((d, i) => {
            if (i !== dayIdx) return d;
            const current = getMealObj(d, meal);
            const updated = { ...current, [component]: id || null };
            const allEmpty = ALL_COMPONENTS.every((c) => !updated[c]);
            const next = { ...d, [meal]: allEmpty ? null : updated };
            if (allEmpty) { delete next[meal + "_time"]; delete next[meal + "_serves"]; }
            return next;
          });
          return { ...p, days };
        });
        setIsDirty(true);
      }
      // Change 2: setSlotMeta marks dirty
      function setSlotMeta(dayIdx, meal, { time, serves }) {
        setPlan((p) => {
          const days = p.days.map((d, i) => {
            if (i !== dayIdx) return d;
            const next = { ...d };
            if (time && time !== MP.schedule.defaultMealTime(meal)) next[meal + "_time"] = time;
            else delete next[meal + "_time"];
            if (serves && serves !== (p.serves || 4)) next[meal + "_serves"] = serves;
            else delete next[meal + "_serves"];
            return next;
          });
          return { ...p, days };
        });
        setIsDirty(true);
      }

      async function shiftWeek(delta) {
        const newStart = MP.date.addDays(plan.week_start, delta * 7);
        // Try to load a previously-saved plan for that week; fall back to empty scaffold.
        let stored = null;
        try { stored = await MP.api.getWeekplanFor(newStart); } catch (e) { /* offline */ }
        if (stored && stored.week_start === newStart) {
          setPlan(stored);
          setIsDirty(false); // loaded from server — not dirty
          return;
        }
        const names = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
        setPlan((p) => ({
          ...p,
          week_start: newStart,
          days: names.map((n, i) => ({
            day: n, date: MP.date.addDays(newStart, i),
            breakfast: null, lunch: null, dinner: null,
          })),
        }));
        setIsDirty(false); // fresh empty scaffold — not dirty
      }

      async function savePlan() {
        if (!MP.api.hasToken()) {
          setShowSettings(true);
          setFlashMsg("Paste your Faith token in Settings first.");
          return;
        }
        setSaving(true);
        try {
          await MP.api.putWeekplan(plan);
          const el = await MP.api.getEatenLog();
          setEatenLog(el || {});
          setFlashMsg("✓ Week saved. Helper will see it.");
          setIsDirty(false); // Change 2: clear dirty on successful save
        } catch (e) {
          setFlashMsg("Save failed: " + e.message);
        } finally { setSaving(false); }
      }

      // Change 6: copyLastWeek function
      async function copyLastWeek() {
        const prevStart = MP.date.addDays(plan.week_start, -7);
        let prev = null;
        try { prev = await MP.api.getWeekplanFor(prevStart); } catch(e) {}
        if (!prev || !prev.days) { setFlashMsg("No saved plan for last week."); return; }
        // Copy just the meal assignments (not times/serves overrides) into current week
        setPlan((p) => ({
          ...p,
          days: p.days.map((d, i) => {
            const src = prev.days[i];
            if (!src) return d;
            return { ...d, breakfast: src.breakfast, lunch: src.lunch, dinner: src.dinner };
          }),
        }));
        setIsDirty(true);
        setFlashMsg("Meals copied from last week — review and save.");
      }

      if (err) {
        return (
          <div className="max-w-xl mx-auto p-6">
            <h1 className="font-display text-3xl">Lantz Meal Planner</h1>
            <p className="text-terra mt-4">Could not load: {err}</p>
            <button onClick={() => setShowSettings(true)} className="mt-3 bg-ink text-cream px-4 py-2 rounded-lg">Open Settings</button>
            <Modal open={showSettings} onClose={() => setShowSettings(false)} title="Settings">
              <SettingsPanel onClose={() => setShowSettings(false)} />
            </Modal>
          </div>
        );
      }
      if (!recipes || !plan) return <div className="p-6 text-warm">Loading…</div>;

      const today = MP.date.hkToday();
      const clockStr = MP.date.hkNowClock("en");
      const currentMeal = MP.date.currentMeal();
      const todayDay = plan.days.find((d) => d.date === today);
      const tomorrowDay = todayDay ? plan.days.find((d) => d.date === MP.date.addDays(today, 1)) : null;
      const todayMealObj = todayDay ? getMealObj(todayDay, currentMeal) : null;
      const todayRecipe = todayMealObj
        ? recipesById[todayMealObj.protein] || recipesById[todayMealObj.vegetable] || recipesById[todayMealObj.carb] || null
        : null;
      const todayComponentCount = todayMealObj ? ALL_COMPONENTS.filter((c) => todayMealObj[c]).length : 0;
      const todayRecipeSched = todayRecipe ? MP.schedule.forMeal(currentMeal, todayRecipe, { mealTime: todayDay && todayDay[currentMeal + "_time"] }) : null;

      return (
        <main className="max-w-[1400px] mx-auto px-3 md:px-6 pt-4 md:pt-6 pb-16">
          <header className="flex items-start justify-between gap-3 flex-wrap mb-4 md:mb-6">
            <div>
              <h1 className="font-display text-2xl md:text-3xl">Lantz Meal Planner</h1>
              <div className="text-warm text-sm">
                Week of <span className="num">{plan.week_start}</span>
                <button onClick={() => shiftWeek(-1)} className="ml-3 text-terra">◀ prev</button>
                <button onClick={() => shiftWeek(1)} className="ml-2 text-terra">next ▶</button>
                {/* Change 6: copy last week button */}
                <button onClick={copyLastWeek} className="text-xs text-warm underline ml-2">copy last week</button>
              </div>
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              <label className="text-sm text-warm">Serves
                <select value={plan.serves || 4} onChange={(e) => setPlan((p) => ({...p, serves: Number(e.target.value)}))}
                  className="ml-1 rounded-lg border border-warm/20 bg-white px-2 py-1">
                  {[2,3,4,5,6].map((n) => <option key={n} value={n}>{n}</option>)}
                </select>
              </label>
              <a href="helper.html" target="_blank" rel="noopener"
                className="bg-sand text-ink px-3 py-2 rounded-lg text-sm">👁 <span className="hidden sm:inline">Helper view</span></a>
              <button onClick={() => setShowLibrary(true)} className="bg-sand text-ink px-3 py-2 rounded-lg text-sm">📖 <span className="hidden sm:inline">Recipes</span></button>
              <button onClick={() => setShowShop(true)} className="bg-sand text-ink px-3 py-2 rounded-lg text-sm">🛒 <span className="hidden sm:inline">Shopping list</span></button>
              {/* Change 2: dynamic Save button */}
              <button onClick={savePlan} disabled={saving}
                className={`px-3 py-2 rounded-lg text-sm disabled:opacity-60 transition ${isDirty ? 'bg-terra text-cream ring-2 ring-terra/50' : 'bg-sand text-warm'}`}>
                {saving ? "Saving…" : isDirty ? "● Save" : "Saved ✓"}
              </button>
              <button onClick={() => setShowSettings(true)} className="bg-ink/80 text-cream px-3 py-2 rounded-lg text-sm">⚙︎</button>
            </div>
          </header>

          {flash && <div className="mb-4 text-sm text-terra">{flash}</div>}

          <MissedPrepAlert
            todayDay={todayDay} recipesById={recipesById} nowMin={nowMin}
            onSwitch={(meal) => {
              const dayIdx = plan.days.findIndex((d) => d.date === today);
              setFlashMsg("Didn't get time to prep — switched the meal.");
              setPicker({ dayIdx, meal, component: "protein" });
            }}
          />

          {/* Today hero */}
          <section className="mb-4 md:mb-6 bg-white rounded-2xl p-4 md:p-5 shadow-sm ring-1 ring-terra/20 flex flex-wrap items-center justify-between gap-3">
            <div>
              <div className="text-xs uppercase tracking-wide text-terra">Right now · {MP.date.dayName(today)}, {MP.date.prettyDate(today)} · 🕐 <span className="num">{clockStr}</span></div>
              <div className="font-display text-2xl mt-1">
                {currentMeal === "breakfast" ? "🍳 Breakfast" : currentMeal === "lunch" ? "🥗 Lunch" : "🍽️ Dinner"}
                {todayComponentCount > 0
                  ? <span className="text-ink"> — {todayComponentCount} dish{todayComponentCount > 1 ? "es" : ""} planned</span>
                  : <span className="text-warm/60"> — not planned</span>}
              </div>
              {todayRecipe && todayRecipeSched && (
                <div className="text-sm text-warm mt-1">
                  Start at <span className="num font-semibold">{todayRecipeSched.startTime}</span>
                </div>
              )}
            </div>
            {todayDay && (
              <button onClick={() => {
                const dayIdx = plan.days.findIndex((d) => d.date === today);
                setPicker({ dayIdx, meal: currentMeal, component: "protein" });
              }} className="bg-terra text-cream px-4 py-2 rounded-lg text-sm">
                {todayComponentCount > 0 ? "Edit today's meal" : "Plan today's meal"}
              </button>
            )}
          </section>

          {/* Mobile: vertical per-day card list */}
          <div className="md:hidden space-y-3">
            {plan.days.map((d, dayIdx) => {
              const isToday = d.date === today;
              return (
                <div key={d.date} className={`rounded-2xl p-3 ring-1 ${isToday ? "bg-white ring-terra/40" : "bg-white ring-black/5"}`}>
                  <div className="flex items-baseline justify-between mb-2">
                    <div className={`font-display text-lg ${isToday ? "text-terra" : ""}`}>{d.day}{isToday && " · Today"}</div>
                    <div className="text-xs text-warm num">{d.date}</div>
                  </div>
                  <div className="space-y-2">
                    {MEALS.map((meal) => {
                      const mealObj = getMealObj(d, meal);
                      const isNow = isToday && meal === currentMeal;
                      const hasAny = COMPONENTS.some((c) => mealObj[c]);
                      return (
                        <div key={meal} className={`rounded-xl ring-1 overflow-hidden ${isNow ? "ring-2 ring-terra" : "ring-black/5"} bg-white`}>
                          <div className={`text-xs uppercase tracking-wide px-2.5 pt-2 pb-1 ${isNow ? "text-terra font-semibold" : "text-warm"}`}>{meal}</div>
                          <div className="px-2 pb-2 space-y-0.5">
                            {COMPONENTS.map((comp) => {
                              const r = mealObj[comp] ? recipesById[mealObj[comp]] : null;
                              return (
                                <button key={comp} onClick={() => r
                                  ? setPreview({ dayIdx, meal, component: comp, recipe: r })
                                  : setPicker({ dayIdx, meal, component: comp })}
                                  className={`w-full flex items-center gap-1.5 text-left px-1.5 py-1 rounded-lg text-xs transition hover:bg-cream ${r ? "text-ink" : "text-warm/40"}`}>
                                  <span>{COMPONENT_ICONS[comp]}</span>
                                  {r ? <span className="truncate font-medium">{r.name}</span>
                                     : <span className="italic">Add {COMPONENT_LABELS[comp].toLowerCase()}</span>}
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Desktop: week grid */}
          <div className="hidden md:block overflow-x-auto">
            <table className="w-full border-separate border-spacing-3">
              <thead>
                <tr>
                  <th className="w-24"></th>
                  {plan.days.map((d) => {
                    const isToday = d.date === today;
                    return (
                      <th key={d.date} className={`text-left font-normal ${isToday ? "bg-terra/10 rounded-t-lg px-2" : ""}`}>
                        <div className={`font-display text-lg ${isToday ? "text-terra" : ""}`}>{d.day}{isToday && " · Today"}</div>
                        <div className="text-xs text-warm num">{d.date}</div>
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {MEALS.map((meal) => (
                  <tr key={meal} className="align-top">
                    <td className={`text-sm uppercase tracking-wide pt-3 pr-2 ${meal === currentMeal ? "text-terra font-semibold" : "text-warm"}`}>
                      {meal}{meal === currentMeal && " ●"}
                    </td>
                    {plan.days.map((d, dayIdx) => {
                      const isToday = d.date === today;
                      const isNow = isToday && meal === currentMeal;
                      return (
                        <td key={d.date} className={`${isToday ? "bg-terra/5" : ""} align-top`}>
                          <MealCell
                            day={d} meal={meal} recipesById={recipesById} isNow={isNow}
                            onPickComponent={(comp) => setPicker({ dayIdx, meal, component: comp })}
                            onPreviewComponent={(comp, recipe) => setPreview({ dayIdx, meal, component: comp, recipe })}
                          />
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {todayDay && (
            <section className="mt-10">
              <TodayTimeline day={todayDay} nextDay={tomorrowDay} recipesById={recipesById} nowMin={nowMin} />
            </section>
          )}

          <Modal open={!!picker} onClose={() => setPicker(null)}
            title={picker ? `${plan.days[picker.dayIdx].day} — ${picker.meal}` : ""}>
            {picker && (
              <RecipePicker
                mealType={picker.meal} componentType={picker.component}
                recipes={recipes} eatenLog={eatenLog}
                usedIds={usedIds} lang={lang}
                onPick={(id) => { setSlot(picker.dayIdx, picker.meal, picker.component, id); setPicker(null); }}
              />
            )}
          </Modal>

          <Modal open={showShop} onClose={() => setShowShop(false)} title="Shopping list">
            <ShoppingList recipes={recipes} plan={plan} lang={lang}
              pantry={pantry} onToggle={togglePantryItem}
              sources={sources} onSetSource={setIngredientSource}
              extras={extras} onAddExtra={addExtra}
              onToggleExtra={toggleExtra} onRemoveExtra={removeExtra} />
          </Modal>

          <Modal open={!!preview} onClose={() => setPreview(null)}
            title={preview ? `${plan.days[preview.dayIdx].day} — ${preview.meal}` : ""}>
            {preview && (
              <RecipePreview
                recipe={preview.recipe} meal={preview.meal}
                pantry={pantry} onTogglePantry={togglePantryItem}
                sources={sources} onSetSource={setIngredientSource}
                mealTime={plan.days[preview.dayIdx][preview.meal + "_time"]}
                mealServes={plan.days[preview.dayIdx][preview.meal + "_serves"]}
                planServes={plan.serves || 4}
                onUpdate={({ time, serves }) => setSlotMeta(preview.dayIdx, preview.meal, { time, serves })}
                onChange={() => { const p = preview; setPreview(null); setPicker({ dayIdx: p.dayIdx, meal: p.meal, component: p.component || "protein" }); }}
                onEdit={() => { setEditRecipe(preview.recipe); setPreview(null); }}
              />
            )}
          </Modal>

          <Modal open={showLibrary} onClose={() => setShowLibrary(false)} title="Recipe library">
            <RecipeLibrary recipes={recipes} eatenLog={eatenLog} lang={lang}
              onOpen={(r) => { setShowLibrary(false); setPreview({ dayIdx: 0, meal: (r.meal_type||["dinner"])[0], recipe: r }); }}
              onNew={(r) => { setShowLibrary(false); setEditRecipe(r || false); }} />
          </Modal>

          <Modal open={editRecipe !== null} onClose={() => setEditRecipe(null)}
            title={editRecipe ? `Edit — ${editRecipe.name}` : "New recipe"}>
            {editRecipe !== null && (
              <RecipeForm
                recipe={editRecipe || null}
                onSave={handleRecipeSaved}
                onDelete={() => handleRecipeDeleted(editRecipe.id)}
                onCancel={() => setEditRecipe(null)}
              />
            )}
          </Modal>

          <Modal open={showSettings} onClose={() => setShowSettings(false)} title="Settings">
            <SettingsPanel onClose={() => setShowSettings(false)} />
          </Modal>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
