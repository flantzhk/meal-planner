<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lantz Meal Planner</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f5ecdf'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='44'%3E🍽️%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: "#f5ecdf", sand: "#ebddc6", ink: "#2e2a24",
            terra: "#b4593a", sage: "#6b8a6c", warm: "#6d5b46",
          },
          fontFamily: {
            display: ["Lora", "Georgia", "serif"],
            body: ["Source Sans 3", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    html, body { background: #f5ecdf; color: #2e2a24; font-family: "Source Sans 3", system-ui, sans-serif; }
    h1, h2, h3 { font-family: Lora, Georgia, serif; }
    .num { font-variant-numeric: tabular-nums; }
  </style>
  <script src="shared.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;
    const MEALS = ["breakfast", "lunch", "dinner"];
    const COMPONENTS = ["protein", "vegetable", "carb"];
    const OPT_COMPONENTS = ["soup", "salad"];
    const ALL_COMPONENTS = [...COMPONENTS, ...OPT_COMPONENTS];
    const COMPONENT_ICONS  = { protein: "🥩", vegetable: "🥦", carb: "🍚", soup: "🍲", salad: "🥗" };
    const COMPONENT_LABELS = { protein: "Protein", vegetable: "Vegetable", carb: "Carb", soup: "Soup", salad: "Salad" };
    const getMealObj = (day, meal) => MP.getMealObj(day, meal);
    const getMealRecipeIds = (day, meal) => MP.getMealRecipeIds(day, meal);

    function lastEatenPill(le, lang) {
      if (le.status === "never") {
        return <span className="text-xs text-warm/60">— {MP.i18n.t(lang, "never")}</span>;
      }
      const color = le.status === "recent" ? "bg-terra/15 text-terra"
                 : le.status === "warming" ? "bg-amber-200/60 text-amber-900"
                 : "bg-sage/20 text-sage";
      return <span className={`text-xs px-2 py-0.5 rounded-full ${color} num`}>{le.days}{MP.i18n.t(lang, "daysAgo")}</span>;
    }

    function Modal({ open, onClose, children, title }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-40 bg-ink/40 flex items-start justify-center p-4 overflow-y-auto"
             onClick={onClose}>
          <div className="bg-cream w-full max-w-3xl rounded-2xl shadow-xl mt-10 mb-10"
               onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-warm/10">
              <h2 className="font-display text-xl">{title}</h2>
              <button onClick={onClose} className="text-warm text-xl leading-none">×</button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    // RecipePicker with component-type filtering
    function RecipePicker({ mealType, componentType, recipes, eatenLog, onPick, lang, usedIds }) {
      const [q, setQ] = useState("");
      const [cuisine, setCuisine] = useState("all");
      const [showAll, setShowAll] = useState(false);
      const today = MP.date.hkToday();
      const filtered = useMemo(() => {
        return recipes
          .filter((r) => !r.meal_type || r.meal_type.includes(mealType))
          .filter((r) => {
            // If no componentType filter or recipe has no type, show it; otherwise match
            if (!componentType || showAll) return true;
            if (!r.component_type) return true;
            return r.component_type === componentType;
          })
          .filter((r) => (cuisine === "all" ? true : r.cuisine === cuisine))
          .filter((r) => (q ? r.name.toLowerCase().includes(q.toLowerCase()) : true));
      }, [recipes, mealType, componentType, cuisine, q, showAll]);
      const cuisines = useMemo(() => ["all", ...Array.from(new Set(recipes.map((r) => r.cuisine).filter(Boolean)))], [recipes]);

      // Change 8: recently used — 6 recipe IDs with most-recent dates for this meal type
      const recent = useMemo(() => {
        return recipes
          .filter(r => !r.meal_type || r.meal_type.includes(mealType))
          .map(r => ({ r, le: MP.lastEaten(r.id, eatenLog, today) }))
          .filter(({le}) => le.status !== 'never')
          .sort((a, b) => (a.le.days || 999) - (b.le.days || 999))
          .slice(0, 6)
          .map(({r}) => r);
      }, [recipes, eatenLog, mealType]);

      return (
        <div>
          {componentType && (
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <span className="text-xl">{COMPONENT_ICONS[componentType]}</span>
                <span className="font-display text-lg">Picking {COMPONENT_LABELS[componentType]}</span>
              </div>
              <button onClick={() => setShowAll(v => !v)}
                className={`text-xs px-2 py-1 rounded-full ring-1 transition ${showAll ? "bg-terra text-cream ring-terra" : "bg-white text-warm ring-warm/20"}`}>
                {showAll ? "Showing all" : "Show all types"}
              </button>
            </div>
          )}
          {/* Recently used horizontal scroll row */}
          {recent.length > 0 && (
            <div className="mb-4">
              <div className="text-xs uppercase tracking-wide text-warm mb-2">Recently used</div>
              <div className="flex gap-2 overflow-x-auto pb-1">
                {recent.map(r => (
                  <button key={r.id} onClick={() => onPick(r.id)}
                    className="shrink-0 flex flex-col items-center bg-white rounded-xl p-2 ring-1 ring-black/5 hover:ring-terra/40 w-24 text-center">
                    {MP.recipeImage(r) && <img src={MP.recipeImage(r)} className="w-20 h-14 object-cover rounded-lg mb-1" />}
                    <span className="text-xs leading-tight line-clamp-2">{r.name}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
          <div className="flex gap-2 mb-4">
            <input value={q} onChange={(e) => setQ(e.target.value)}
              placeholder="Search…"
              className="flex-1 rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm" />
            <select value={cuisine} onChange={(e) => setCuisine(e.target.value)}
              className="rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm">
              {cuisines.map((c) => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-3">
            {filtered.map((r) => {
              const le = MP.lastEaten(r.id, eatenLog, today);
              const used = usedIds.includes(r.id);
              return (
                <button key={r.id}
                  onClick={() => onPick(r.id)}
                  className={`text-left bg-white rounded-xl overflow-hidden shadow-sm ring-1 ring-black/5 hover:ring-terra/40 transition ${used ? "opacity-60" : ""}`}>
                  {MP.recipeImage(r) && (
                    <img src={MP.recipeImage(r)} alt="" className="w-full h-28 object-cover"
                         onLoad={(e) => {
                           if (MP.isYoutubePlaceholder(e.target)) {
                             const src = e.target.src;
                             if (src.includes("maxresdefault")) { e.target.src = src.replace("maxresdefault", "hqdefault"); return; }
                             if (r.hero_image && src !== r.hero_image) { e.target.src = r.hero_image; return; }
                             e.target.style.display = "none";
                           }
                         }}
                         onError={(e) => {
                           const src = e.target.src;
                           if (src.includes("maxresdefault")) { e.target.src = src.replace("maxresdefault", "hqdefault"); return; }
                           if (r.hero_image && src !== r.hero_image) { e.target.src = r.hero_image; return; }
                           e.target.style.display = "none";
                         }} />
                  )}
                  <div className="p-3">
                    {/* Change 1: text-[17px] -> text-base */}
                    <div className="font-display text-base leading-tight">{r.name}</div>
                    <div className="flex items-center justify-between mt-1">
                      <span className="text-xs text-warm">
                        {r.cuisine} · <span className="num">{(r.prep_time_mins || 0) + (r.cook_time_mins || 0)}</span>m
                      </span>
                      {lastEatenPill(le, lang)}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // Change 5: Shopping filter persistence via sessionStorage
    function ShoppingList({ recipes, plan, lang, pantry, onToggle, sources, onSetSource, extras, onAddExtra, onToggleExtra, onRemoveExtra }) {
      const groups = MP.buildShoppingList(recipes, plan, sources);
      const [newItem, setNewItem] = useState("");
      const [newSource, setNewSource] = useState("supermarket");
      // Change 5: persist filter to sessionStorage
      const [filter, setFilter] = useState(() => sessionStorage.getItem('mpShopFilter') || 'all');
      const sourceLabels = {
        "wet-market": "🥬 Wet market", "supermarket": "🛒 Fusion / Marketplace",
        "hktvmall": "📦 HKTVmall", "other": "Other",
      };
      const categoryLabels = {
        meat: "Meat & Seafood", produce: "Vegetables & Fruit",
        dairy: "Dairy & Eggs", pantry: "Pantry & Dry Goods",
        bakery: "Bread & Bakery", frozen: "Frozen", other: "Other",
      };
      const sourceOrder = ["wet-market", "supermarket", "hktvmall", "other"];
      const key = (it) => (it.item || "").toLowerCase().trim();

      // Change 5: applyFilter helper
      function applyFilter(f) { setFilter(f); sessionStorage.setItem('mpShopFilter', f); }

      // Per-section "remaining" counts so the nav shows how much is left in each shop.
      const counts = {};
      for (const src of sourceOrder) {
        const g = groups[src];
        if (!g) continue;
        let remaining = 0, total = 0;
        for (const items of Object.values(g)) for (const it of items) {
          total++; if (!pantry[key(it)]) remaining++;
        }
        counts[src] = { remaining, total };
      }
      const extrasRemaining = (extras || []).filter((x) => !x.done).length;
      const extrasTotal = (extras || []).length;

      const showExtras = onAddExtra && (filter === "all" || filter === "extras");
      const showSource = (src) => filter === "all" || filter === src;

      // Change 7: WhatsApp share function
      function shareWhatsApp() {
        const sourceLabelsPlain = { "wet-market": "Wet market", "supermarket": "Supermarket", "hktvmall": "HKTVmall", "other": "Other" };
        let text = `Shopping list — week of ${plan.week_start}\n\n`;
        for (const src of ["wet-market","supermarket","hktvmall","other"]) {
          const g = groups[src]; if (!g) continue;
          text += `*${sourceLabelsPlain[src]}*\n`;
          for (const [cat, items] of Object.entries(g)) {
            for (const it of items) {
              const k = (it.item||"").toLowerCase().trim();
              if (pantry[k]) continue; // skip already-have items
              text += `• ${Number(it.amount.toFixed(2))} ${it.unit} ${it.item}\n`;
            }
          }
          text += "\n";
        }
        if (extras && extras.filter(x=>!x.done).length > 0) {
          text += `*Extras*\n`;
          for (const x of extras.filter(e=>!e.done)) text += `• ${x.item}\n`;
        }
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
      }

      return (
        <div>
          <div className="text-sm text-warm mb-3">
            Week of <span className="num">{plan.week_start}</span> · Serves <span className="num">{plan.serves || 4}</span>
            {/* Change 7: WhatsApp share button */}
            <div className="mt-2">
              <button onClick={shareWhatsApp} className="flex items-center gap-1.5 bg-sage text-white px-3 py-1.5 rounded-lg text-sm">
                📱 Share via WhatsApp
              </button>
            </div>
            <div className="mt-1 text-xs">Tap a shop below to focus on just that list. Ticked items are already in the pantry.</div>
          </div>

          {/* Jump / filter nav — sticky so it stays reachable while scrolling */}
          {/* Change 1: unified active state for all pills */}
          <nav className="sticky top-0 z-10 -mx-5 px-5 py-3 mb-4 bg-cream/95 backdrop-blur border-b border-warm/10 flex flex-wrap gap-2">
            <button onClick={() => applyFilter("all")}
              className={`px-3 py-1.5 rounded-full text-sm ring-1 ${filter === "all" ? "ring-2 ring-terra text-terra bg-white" : "bg-white text-warm ring-1 ring-warm/20"}`}>
              All
            </button>
            {sourceOrder.map((src) => {
              if (!counts[src]) return null;
              const active = filter === src;
              const { remaining, total } = counts[src];
              return (
                <button key={src} onClick={() => applyFilter(src)}
                  className={`px-3 py-1.5 rounded-full text-sm ring-1 ${active ? "ring-2 ring-terra text-terra bg-white" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                  {sourceLabels[src]}
                  <span className={`ml-1.5 num text-xs ${active ? "text-terra/80" : "text-warm"}`}>{remaining}/{total}</span>
                </button>
              );
            })}
            {onAddExtra && extrasTotal > 0 && (
              <button onClick={() => applyFilter("extras")}
                className={`px-3 py-1.5 rounded-full text-sm ring-1 ${filter === "extras" ? "ring-2 ring-terra text-terra bg-white" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                ➕ Extras <span className={`ml-1.5 num text-xs ${filter === "extras" ? "text-terra/80" : "text-warm"}`}>{extrasRemaining}/{extrasTotal}</span>
              </button>
            )}
          </nav>

          {showExtras && (
            <div className="mb-5 p-4 rounded-xl bg-sand/40">
              <div className="font-display text-base mb-2">➕ Extras (non-recipe)</div>
              <form className="flex flex-wrap gap-2 items-center"
                onSubmit={(e) => { e.preventDefault(); if (newItem.trim()) { onAddExtra(newItem, newSource); setNewItem(""); } }}>
                <input value={newItem} onChange={(e) => setNewItem(e.target.value)}
                  placeholder="e.g. toilet paper"
                  className="flex-1 min-w-[10rem] rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm" />
                <select value={newSource} onChange={(e) => setNewSource(e.target.value)}
                  className="text-sm rounded-lg border border-warm/20 bg-white px-2 py-2">
                  <option value="wet-market">🥬 Wet market</option>
                  <option value="supermarket">🛒 Supermarket</option>
                  <option value="hktvmall">📦 HKTVmall</option>
                  <option value="other">Other</option>
                </select>
                <button type="submit" className="bg-terra text-cream px-4 py-2 rounded-lg text-sm">Add</button>
              </form>
              {extras && extras.length > 0 && (
                <ul className="mt-3 space-y-1">
                  {extras.map((x) => (
                    <li key={x.id} className={`flex items-center gap-2 text-sm ${x.done ? "opacity-40 line-through" : ""}`}>
                      <input type="checkbox" className="accent-sage w-4 h-4"
                        checked={!!x.done}
                        onChange={(e) => onToggleExtra(x.id, e.target.checked)} />
                      <span className="flex-1">{x.item}</span>
                      <span className="text-xs text-warm">{(sourceLabels[x.source] || x.source)}</span>
                      <button onClick={() => onRemoveExtra(x.id)}
                        className="text-xs text-warm/60 hover:text-terra">×</button>
                    </li>
                  ))}
                </ul>
              )}
            </div>
          )}
          {sourceOrder.map((src) => {
            const g = groups[src];
            if (!g) return null;
            if (!showSource(src)) return null;
            return (
              <div key={src} className="mb-6">
                <h3 className="font-display text-lg text-terra">{sourceLabels[src] || src}</h3>
                {Object.entries(g).map(([cat, items]) => (
                  <div key={cat} className="mt-2">
                    <div className="uppercase tracking-wide text-xs text-warm mb-1">{categoryLabels[cat] || cat}</div>
                    <ul className="space-y-0.5">
                      {items.map((it, i) => {
                        const k = key(it);
                        const has = !!pantry[k];
                        return (
                          <li key={i} className={`flex flex-wrap gap-2 text-sm items-center py-1 ${has ? "opacity-40 line-through" : ""}`}>
                            <input type="checkbox" className="accent-sage w-4 h-4"
                              checked={has}
                              onChange={(e) => onToggle(k, e.target.checked)} />
                            <span className="num text-warm min-w-[5rem]">
                              {Number(it.amount.toFixed(2)).toString()} {it.unit}
                            </span>
                            <span className="flex-1 min-w-[6rem]">{it.item}</span>
                            {onSetSource && (
                              <select value={sources?.[k] || it.source || ""}
                                onChange={(e) => onSetSource(it.item, e.target.value)}
                                className="text-xs rounded border border-warm/20 bg-white px-2 py-1">
                                <option value="wet-market">🥬 Wet market</option>
                                <option value="supermarket">🛒 Supermarket</option>
                                <option value="hktvmall">📦 HKTVmall</option>
                                <option value="other">Other</option>
                              </select>
                            )}
                          </li>
                        );
                      })}
                    </ul>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      );
    }

    function YoutubeEditor({ recipe }) {
      const [editing, setEditing] = useState(false);
      const [val, setVal] = useState(recipe.youtube_url || "");
      const [busy, setBusy] = useState(false);
      const [msg, setMsg] = useState("");
      async function save() {
        setBusy(true); setMsg("");
        try {
          await MP.api.upsertRecipe(recipe.id, { ...recipe, youtube_url: val || null });
          recipe.youtube_url = val || null; // mutate for immediate image refresh in modal
          setMsg("✓ Saved — image will update on next load.");
          setEditing(false);
        } catch (e) { setMsg("Failed: " + e.message); }
        finally { setBusy(false); }
      }
      if (!editing) {
        return (
          <div className="flex items-center gap-2 flex-wrap">
            {recipe.youtube_url ? (
              <a href={recipe.youtube_url} target="_blank" rel="noopener"
                className="inline-flex items-center gap-2 bg-terra text-cream px-4 py-2 rounded-full text-sm">
                ▶ Watch video
              </a>
            ) : (
              <span className="text-sm text-warm/70 italic">No video yet</span>
            )}
            <button onClick={() => setEditing(true)} className="text-xs underline text-warm">
              {recipe.youtube_url ? "Change video" : "Paste YouTube link"}
            </button>
            {msg && <span className="text-xs text-warm">{msg}</span>}
          </div>
        );
      }
      return (
        <div className="flex flex-wrap gap-2 items-center">
          <input value={val} onChange={(e) => setVal(e.target.value)}
            placeholder="https://www.youtube.com/watch?v=…"
            className="flex-1 min-w-[18rem] rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm" />
          <button onClick={save} disabled={busy}
            className="bg-ink text-cream px-3 py-2 rounded-lg text-sm disabled:opacity-60">
            {busy ? "Saving…" : "Save"}
          </button>
          <button onClick={() => { setVal(recipe.youtube_url || ""); setEditing(false); }}
            className="text-warm px-2 text-sm">Cancel</button>
          <div className="text-xs text-warm basis-full">
            Pasting a link will also use its thumbnail as the recipe photo automatically.
          </div>
        </div>
      );
    }

    function RecipePreview({ recipe, meal, mealTime, mealServes, planServes, onChange, onUpdate, onEdit, pantry, onTogglePantry, sources, onSetSource }) {
      const img = MP.recipeImage(recipe);
      const effTime = mealTime || MP.schedule.defaultMealTime(meal);
      const effServes = mealServes || planServes || recipe.serves_base || 4;
      const sched = MP.schedule.forMeal(meal, recipe, { mealTime: effTime });
      return (
        <div>
          {img && (
            <img src={img} alt="" className="w-full h-48 object-cover rounded-xl mb-4"
              onLoad={(e) => {
                if (!MP.isYoutubePlaceholder(e.target)) return;
                const s = e.target.src;
                if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                if (recipe.hero_image && s !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                e.target.style.display = "none";
              }}
              onError={(e) => {
                const s = e.target.src;
                if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                if (recipe.hero_image && s !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                e.target.style.display = "none";
              }} />
          )}
          <div className="flex items-start justify-between mb-3">
            <div>
              <div className="text-xs uppercase text-warm">{meal}</div>
              <h3 className="font-display text-2xl">{recipe.name}</h3>
              <div className="text-sm text-warm mt-1">
                {recipe.cuisine} · recipe base <span className="num">{recipe.serves_base}</span> · prep <span className="num">{recipe.prep_time_mins}</span>m · cook <span className="num">{recipe.cook_time_mins}</span>m
              </div>
            </div>
            <div className="text-right shrink-0">
              <div className="text-xs text-warm">Start</div>
              <div className="font-display text-xl num">{sched.startTime}</div>
            </div>
          </div>
          {onUpdate && (
            <div className="mb-4 p-4 rounded-xl bg-sand/50 flex flex-wrap gap-4 items-end">
              <label className="text-sm text-warm">
                <div className="text-xs uppercase tracking-wide">Serve at</div>
                <input type="time" value={effTime}
                  onChange={(e) => onUpdate({ time: e.target.value, serves: effServes })}
                  className="mt-1 rounded-lg border border-warm/20 bg-white px-2 py-1 num" />
              </label>
              <label className="text-sm text-warm">
                <div className="text-xs uppercase tracking-wide">Eating</div>
                <select value={effServes}
                  onChange={(e) => onUpdate({ time: effTime, serves: Number(e.target.value) })}
                  className="mt-1 rounded-lg border border-warm/20 bg-white px-2 py-1 num">
                  {[1,2,3,4,5,6,7,8].map((n) => <option key={n} value={n}>{n} {n===1?"person":"people"}</option>)}
                </select>
              </label>
              <div className="text-xs text-warm ml-auto">
                Start {sched.startTime} · ingredients scale to {effServes}
              </div>
            </div>
          )}
          {onUpdate && (
            <YoutubeEditor recipe={recipe} />
          )}
          {!onUpdate && recipe.youtube_url && (
            <a href={recipe.youtube_url} target="_blank" rel="noopener"
              className="inline-flex items-center gap-2 bg-terra text-cream px-4 py-2 rounded-full text-sm">
              ▶ Watch video
            </a>
          )}
          <h4 className="font-display text-lg mt-5">Ingredients</h4>
          {onSetSource && (
            <p className="text-xs text-warm mb-2">Set where you buy each one — saved globally so every recipe using it will remember.</p>
          )}
          {/* Change 1: text-[15px] -> text-sm */}
          <ul className="text-sm space-y-1">
            {(recipe.ingredients || []).map((ing, i) => {
              const k = (ing.item || "").toLowerCase().trim();
              const savedSource = (sources && sources[k]) || ing.source || "";
              const inPantry = pantry && !!pantry[k];
              const amt = ing.amount != null ? Number(Number(ing.amount).toFixed(2)) : "";
              return (
                <li key={i} className={`flex flex-wrap items-center gap-x-3 gap-y-1 py-1.5 px-2 rounded-lg ${inPantry ? "bg-sage/10" : ""}`}>
                  <span className="num text-warm min-w-[4.5rem]">{amt} {ing.unit || ""}</span>
                  <span className={`flex-1 min-w-[6rem] ${inPantry ? "line-through text-warm" : ""}`}>{ing.item}</span>
                  {onSetSource && (
                    <select value={savedSource}
                      onChange={(e) => onSetSource(ing.item, e.target.value)}
                      className="text-xs rounded border border-warm/20 bg-white px-2 py-1">
                      <option value="">— where? —</option>
                      <option value="wet-market">🥬 Wet market</option>
                      <option value="supermarket">🛒 Supermarket</option>
                      <option value="hktvmall">📦 HKTVmall</option>
                      <option value="other">Other</option>
                    </select>
                  )}
                  {onTogglePantry && (
                    <label className="text-xs text-warm flex items-center gap-1 cursor-pointer select-none">
                      <input type="checkbox" checked={inPantry}
                        onChange={(e) => onTogglePantry(ing.item, e.target.checked)}
                        className="accent-sage" />
                      In pantry
                    </label>
                  )}
                </li>
              );
            })}
          </ul>
          <h4 className="font-display text-lg mt-5">Steps</h4>
          <ol className="space-y-3 mt-1">
            {recipe.steps.map((s) => (
              <li key={s.step} className="flex gap-3">
                <span className="font-display text-terra text-lg min-w-[1.5rem]">{s.step}</span>
                {/* Change 1: text-[15px] -> text-sm */}
                <div className="text-sm leading-relaxed">{s.instruction}</div>
              </li>
            ))}
          </ol>
          <div className="mt-6 flex gap-2 flex-wrap">
            <button onClick={onChange} className="bg-sand text-ink px-4 py-2 rounded-lg text-sm">Change this meal</button>
            {onEdit && (
              <button onClick={onEdit} className="bg-sand text-ink px-4 py-2 rounded-lg text-sm">✏️ Edit recipe</button>
            )}
          </div>
        </div>
      );
    }

    function RecipeLibrary({ recipes, eatenLog, onOpen, onNew, lang }) {
      const [q, setQ] = useState("");
      const [cuisine, setCuisine] = useState("all");
      const [mealType, setMealType] = useState("all");
      const today = MP.date.hkToday();
      const cuisines = useMemo(() => ["all", ...Array.from(new Set(recipes.map((r) => r.cuisine).filter(Boolean)))], [recipes]);
      const filtered = useMemo(() => {
        return recipes
          .filter((r) => mealType === "all" ? true : (r.meal_type || []).includes(mealType))
          .filter((r) => cuisine === "all" ? true : r.cuisine === cuisine)
          .filter((r) => q ? r.name.toLowerCase().includes(q.toLowerCase()) : true);
      }, [recipes, mealType, cuisine, q]);
      return (
        <div>
          <div className="flex flex-wrap gap-2 mb-4">
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search…"
              className="flex-1 min-w-[10rem] rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm" />
            <select value={mealType} onChange={(e) => setMealType(e.target.value)}
              className="rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm">
              <option value="all">Any meal</option>
              <option value="breakfast">Breakfast</option>
              <option value="lunch">Lunch</option>
              <option value="dinner">Dinner</option>
            </select>
            <select value={cuisine} onChange={(e) => setCuisine(e.target.value)}
              className="rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm">
              {cuisines.map((c) => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs text-warm num">{filtered.length} of {recipes.length} recipes</div>
            {onNew && <button onClick={onNew} className="bg-terra text-cream px-3 py-1.5 rounded-lg text-sm">+ New recipe</button>}
          </div>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
            {filtered.map((r) => {
              const le = MP.lastEaten(r.id, eatenLog, today);
              return (
                <div key={r.id} className="relative group text-left bg-white rounded-xl overflow-hidden shadow-sm ring-1 ring-black/5 hover:ring-terra/40 transition">
                <button onClick={() => onOpen(r)} className="w-full text-left">
                  {MP.recipeImage(r) && (
                    <img src={MP.recipeImage(r)} alt="" className="w-full h-28 object-cover"
                      onLoad={(e) => {
                        if (!MP.isYoutubePlaceholder(e.target)) return;
                        const s = e.target.src;
                        if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                        if (r.hero_image && s !== r.hero_image) { e.target.src = r.hero_image; return; }
                        e.target.style.display = "none";
                      }}
                      onError={(e) => {
                        const s = e.target.src;
                        if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                        if (r.hero_image && s !== r.hero_image) { e.target.src = r.hero_image; return; }
                        e.target.style.display = "none";
                      }} />
                  )}
                  <div className="p-3">
                    {/* Change 1: text-[16px] -> text-base */}
                    <div className="font-display text-base leading-tight">{r.name}</div>
                    <div className="flex items-center justify-between mt-1">
                      <span className="text-xs text-warm">
                        {r.cuisine} · <span className="num">{(r.prep_time_mins || 0) + (r.cook_time_mins || 0)}</span>m
                      </span>
                      {lastEatenPill(le, lang)}
                    </div>
                    <div className="mt-1 text-[11px] uppercase tracking-wide text-warm/70">
                      {(r.meal_type || []).join(" · ")}
                    </div>
                  </div>
                </button>
                {onNew && (
                  <button onClick={(e) => { e.stopPropagation(); onNew(r); }}
                    className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition bg-white/90 text-warm text-xs px-2 py-1 rounded-lg shadow ring-1 ring-warm/20">
                    ✏️
                  </button>
                )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ---------- RecipeForm ----------
    // create: pass recipe=null
    // edit:   pass the existing recipe object
    // onSave(savedRecipe)  — called after successful PUT
    // onDelete()           — called after successful DELETE

    const BLANK_INGREDIENT = { item: "", amount: "", unit: "g", category: "produce", source: "wet-market", scales: "linear" };
    const BLANK_STEP = { instruction: "", instruction_tl: "", instruction_il: "" };

    function RecipeForm({ recipe: initRecipe, onSave, onDelete, onCancel }) {
      const isNew = !initRecipe;
      const slug = (name) => name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");

      const [form, setForm] = useState(() => initRecipe ? {
        ...initRecipe,
        // Normalise fields that may be null/missing in KV data
        ingredients: initRecipe.ingredients && initRecipe.ingredients.length > 0
          ? initRecipe.ingredients : [{ ...BLANK_INGREDIENT }],
        steps: initRecipe.steps && initRecipe.steps.length > 0
          ? initRecipe.steps : [{ step: 1, ...BLANK_STEP }],
        dependencies: initRecipe.dependencies || [],
        meal_type: initRecipe.meal_type || ["dinner"],
      } : {
        id: "", name: "", name_tl: "", name_il: "",
        cuisine: "", meal_type: ["dinner"], component_type: "",
        serves_base: 4, prep_time_mins: 15, cook_time_mins: 30, active_time_mins: 20,
        estimated_cost_hkd: "",
        youtube_url: "", hero_image: "",
        ingredients: [{ ...BLANK_INGREDIENT }],
        steps: [{ step: 1, ...BLANK_STEP }],
        dependencies: [],
        translations_verified: false,
      });

      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      const [confirmDel, setConfirmDel] = useState(false);
      const [showTrans, setShowTrans] = useState(false);

      function setF(k, v) { setForm((f) => ({ ...f, [k]: v })); }

      // ingredients helpers
      function setIng(i, k, v) {
        setForm((f) => { const ings = [...f.ingredients]; ings[i] = { ...ings[i], [k]: v }; return { ...f, ingredients: ings }; });
      }
      function addIng() { setForm((f) => ({ ...f, ingredients: [...f.ingredients, { ...BLANK_INGREDIENT }] })); }
      function removeIng(i) { setForm((f) => ({ ...f, ingredients: f.ingredients.filter((_, j) => j !== i) })); }

      // steps helpers
      function setStep(i, k, v) {
        setForm((f) => { const ss = [...f.steps]; ss[i] = { ...ss[i], [k]: v }; return { ...f, steps: ss }; });
      }
      function addStep() {
        setForm((f) => ({ ...f, steps: [...f.steps, { step: f.steps.length + 1, ...BLANK_STEP }] }));
      }
      function removeStep(i) {
        setForm((f) => ({ ...f, steps: f.steps.filter((_, j) => j !== i).map((s, j) => ({ ...s, step: j + 1 })) }));
      }

      // dependencies helpers
      function setDep(i, k, v) {
        setForm((f) => { const ds = [...f.dependencies]; ds[i] = { ...ds[i], [k]: v }; return { ...f, dependencies: ds }; });
      }
      function addDep() { setForm((f) => ({ ...f, dependencies: [...f.dependencies, { type: "marinate", hours_before: 2 }] })); }
      function removeDep(i) { setForm((f) => ({ ...f, dependencies: f.dependencies.filter((_, j) => j !== i) })); }

      async function save() {
        setErr(""); setBusy(true);
        try {
          const id = form.id || slug(form.name) || `recipe-${Date.now()}`;
          const payload = {
            ...form, id,
            serves_base: Number(form.serves_base) || 4,
            prep_time_mins: Number(form.prep_time_mins) || 0,
            cook_time_mins: Number(form.cook_time_mins) || 0,
            active_time_mins: Number(form.active_time_mins) || 0,
            estimated_cost_hkd: form.estimated_cost_hkd ? Number(form.estimated_cost_hkd) : undefined,
            ingredients: form.ingredients
              .filter((i) => i.item.trim())
              .map((i) => ({ ...i, amount: Number(i.amount) || 0 })),
            steps: form.steps.filter((s) => s.instruction.trim()),
          };
          const saved = await MP.api.upsertRecipe(id, payload);
          onSave(saved || payload);
        } catch (e) { setErr(e.message); }
        finally { setBusy(false); }
      }

      async function del() {
        setBusy(true);
        try {
          await MP.api.deleteRecipe(form.id);
          onDelete();
        } catch (e) { setErr(e.message); setBusy(false); }
      }

      const inputCls = "w-full rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm";
      const labelCls = "block text-xs uppercase tracking-wide text-warm mb-1";

      return (
        <div className="space-y-6">
          {/* Basic info */}
          <section className="p-4">
            <h4 className="font-display text-lg mb-3">Basic info</h4>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div className="sm:col-span-2">
                <label className={labelCls}>Recipe name (English) *</label>
                <input value={form.name} onChange={(e) => {
                  setF("name", e.target.value);
                  if (isNew) setF("id", slug(e.target.value));
                }} className={inputCls} />
              </div>
              {isNew && (
                <div className="sm:col-span-2">
                  <label className={labelCls}>ID (auto-generated, lowercase-hyphens)</label>
                  <input value={form.id} onChange={(e) => setF("id", e.target.value)} className={inputCls} />
                </div>
              )}
              <div>
                <label className={labelCls}>Cuisine</label>
                <input value={form.cuisine} onChange={(e) => setF("cuisine", e.target.value)}
                  list="cuisine-list" className={inputCls} />
                <datalist id="cuisine-list">
                  {["Filipino","Chinese","Western","Italian","Thai","Japanese","Indian","Korean","Middle Eastern"].map((c) => <option key={c} value={c} />)}
                </datalist>
              </div>
              <div>
                <label className={labelCls}>Component type</label>
                <select value={form.component_type || ""} onChange={(e) => setF("component_type", e.target.value)} className={inputCls}>
                  <option value="">— any (shows in all slots) —</option>
                  <option value="protein">🥩 Protein</option>
                  <option value="vegetable">🥦 Vegetable</option>
                  <option value="carb">🍚 Carb</option>
                  <option value="soup">🍲 Soup</option>
                  <option value="salad">🥗 Salad</option>
                </select>
              </div>
              <div>
                <label className={labelCls}>Meal type</label>
                <div className="flex gap-3 pt-1">
                  {["breakfast","lunch","dinner"].map((m) => (
                    <label key={m} className="flex items-center gap-1.5 text-sm cursor-pointer">
                      <input type="checkbox" className="accent-terra"
                        checked={(form.meal_type || []).includes(m)}
                        onChange={(e) => setF("meal_type", e.target.checked
                          ? [...(form.meal_type || []), m]
                          : (form.meal_type || []).filter((x) => x !== m))} />
                      {m}
                    </label>
                  ))}
                </div>
              </div>
              <div>
                <label className={labelCls}>Serves (base)</label>
                <input type="number" min="1" max="20" value={form.serves_base}
                  onChange={(e) => setF("serves_base", e.target.value)} className={inputCls} />
              </div>
              <div className="grid grid-cols-3 gap-2">
                <div>
                  <label className={labelCls}>Prep (min)</label>
                  <input type="number" min="0" value={form.prep_time_mins}
                    onChange={(e) => setF("prep_time_mins", e.target.value)} className={inputCls} />
                </div>
                <div>
                  <label className={labelCls}>Cook (min)</label>
                  <input type="number" min="0" value={form.cook_time_mins}
                    onChange={(e) => setF("cook_time_mins", e.target.value)} className={inputCls} />
                </div>
                <div>
                  <label className={labelCls}>Active (min)</label>
                  <input type="number" min="0" value={form.active_time_mins}
                    onChange={(e) => setF("active_time_mins", e.target.value)} className={inputCls} />
                </div>
              </div>
              <div>
                <label className={labelCls}>Est. cost (HKD)</label>
                <input type="number" min="0" value={form.estimated_cost_hkd}
                  onChange={(e) => setF("estimated_cost_hkd", e.target.value)} className={inputCls} />
              </div>
              <div>
                <label className={labelCls}>YouTube URL</label>
                <input value={form.youtube_url || ""} onChange={(e) => setF("youtube_url", e.target.value)} className={inputCls} />
              </div>
              <div>
                <label className={labelCls}>Hero image URL</label>
                <input value={form.hero_image || ""} onChange={(e) => setF("hero_image", e.target.value)} className={inputCls} />
              </div>
            </div>
          </section>

          {/* Translations */}
          <section>
            <button type="button" onClick={() => setShowTrans((v) => !v)}
              className="text-sm text-terra underline">
              {showTrans ? "▲ Hide" : "▼ Show"} Tagalog / Ilocano name translations
            </button>
            {showTrans && (
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3">
                <div>
                  <label className={labelCls}>Name — Tagalog</label>
                  <input value={form.name_tl || ""} onChange={(e) => setF("name_tl", e.target.value)} className={inputCls} />
                </div>
                <div>
                  <label className={labelCls}>Name — Ilocano</label>
                  <input value={form.name_il || ""} onChange={(e) => setF("name_il", e.target.value)} className={inputCls} />
                </div>
              </div>
            )}
          </section>

          {/* Dependencies */}
          <section>
            <div className="flex items-center justify-between mb-2">
              <h4 className="font-display text-lg">Dependencies</h4>
              <button type="button" onClick={addDep}
                className="text-sm bg-sand text-ink px-3 py-1 rounded-lg">+ Add</button>
            </div>
            <p className="text-xs text-warm mb-3">Things that need to happen before cooking starts (marinate, defrost).</p>
            {(form.dependencies || []).length === 0 && <p className="text-sm text-warm/60 italic">None</p>}
            {(form.dependencies || []).map((d, i) => (
              <div key={i} className="flex items-center gap-2 mb-2">
                <select value={d.type} onChange={(e) => setDep(i, "type", e.target.value)}
                  className="rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm">
                  <option value="marinate">Marinate</option>
                  <option value="defrost">Defrost</option>
                </select>
                <input type="number" min="0.5" step="0.5" value={d.hours_before}
                  onChange={(e) => setDep(i, "hours_before", Number(e.target.value))}
                  className="w-20 rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm" />
                <span className="text-sm text-warm">hrs before</span>
                <button type="button" onClick={() => removeDep(i)} className="text-warm/50 hover:text-terra ml-auto">×</button>
              </div>
            ))}
          </section>

          {/* Ingredients — Change 4: responsive mobile stacked / desktop grid */}
          <section>
            <div className="flex items-center justify-between mb-2">
              <h4 className="font-display text-lg">Ingredients</h4>
              <button type="button" onClick={addIng}
                className="text-sm bg-sand text-ink px-3 py-1 rounded-lg">+ Add</button>
            </div>
            {/* Mobile stacked cards */}
            <div className="sm:hidden space-y-3">
              {(form.ingredients || []).map((ing, i) => (
                <div key={i} className="bg-sand/30 rounded-xl p-3 space-y-2">
                  <div className="flex gap-2">
                    <input value={ing.item} onChange={(e) => setIng(i, "item", e.target.value)} placeholder="Item name" className="flex-1 rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm" />
                    <button type="button" onClick={() => removeIng(i)} className="text-warm/40 hover:text-terra px-2">×</button>
                  </div>
                  <div className="flex gap-2">
                    <input type="number" value={ing.amount} onChange={(e) => setIng(i, "amount", e.target.value)} className="w-20 rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm num" />
                    <select value={ing.unit} onChange={(e) => setIng(i, "unit", e.target.value)} className="flex-1 rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm">
                      {["g","kg","ml","l","tsp","tbsp","cup","oz","lb","whole","cloves","sprigs","bunches"].map((u) => <option key={u}>{u}</option>)}
                    </select>
                    <select value={ing.category} onChange={(e) => setIng(i, "category", e.target.value)} className="flex-1 rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm">
                      {["produce","meat","dairy","pantry","bakery","frozen","other"].map((c) => <option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <div className="flex gap-2">
                    <select value={ing.source} onChange={(e) => setIng(i, "source", e.target.value)} className="flex-1 rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm">
                      <option value="wet-market">Wet mkt</option>
                      <option value="supermarket">Supermarket</option>
                      <option value="hktvmall">HKTVmall</option>
                      <option value="other">Other</option>
                    </select>
                    <select value={ing.scales} onChange={(e) => setIng(i, "scales", e.target.value)} className="flex-1 rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm">
                      <option value="linear">Linear</option>
                      <option value="fixed">Fixed</option>
                      <option value="taper">Taper</option>
                    </select>
                  </div>
                </div>
              ))}
            </div>
            {/* Desktop grid */}
            <div className="hidden sm:block space-y-2">
              {/* header row */}
              <div className="grid grid-cols-[2fr_1fr_1fr_1fr_1fr_1fr_auto] gap-2 text-xs text-warm uppercase tracking-wide px-1">
                <span>Item</span><span>Amount</span><span>Unit</span><span>Category</span><span>Shop</span><span>Scales</span><span></span>
              </div>
              {(form.ingredients || []).map((ing, i) => (
                <div key={i} className="grid grid-cols-[2fr_1fr_1fr_1fr_1fr_1fr_auto] gap-1.5 items-center">
                  <input value={ing.item} onChange={(e) => setIng(i, "item", e.target.value)}
                    placeholder="e.g. chicken thigh" className="rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm" />
                  <input type="number" value={ing.amount} onChange={(e) => setIng(i, "amount", e.target.value)}
                    className="rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm num" />
                  <select value={ing.unit} onChange={(e) => setIng(i, "unit", e.target.value)}
                    className="rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm">
                    {["g","kg","ml","l","tsp","tbsp","cup","oz","lb","whole","cloves","sprigs","bunches"].map((u) => <option key={u}>{u}</option>)}
                  </select>
                  <select value={ing.category} onChange={(e) => setIng(i, "category", e.target.value)}
                    className="rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm">
                    {["produce","meat","dairy","pantry","bakery","frozen","other"].map((c) => <option key={c}>{c}</option>)}
                  </select>
                  <select value={ing.source} onChange={(e) => setIng(i, "source", e.target.value)}
                    className="rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm">
                    <option value="wet-market">Wet mkt</option>
                    <option value="supermarket">Supermarket</option>
                    <option value="hktvmall">HKTVmall</option>
                    <option value="other">Other</option>
                  </select>
                  <select value={ing.scales} onChange={(e) => setIng(i, "scales", e.target.value)}
                    className="rounded-lg border border-warm/20 bg-white px-2 py-1.5 text-sm">
                    <option value="linear">Linear</option>
                    <option value="fixed">Fixed</option>
                    <option value="taper">Taper</option>
                  </select>
                  <button type="button" onClick={() => removeIng(i)} className="text-warm/40 hover:text-terra px-1">×</button>
                </div>
              ))}
            </div>
          </section>

          {/* Steps */}
          <section>
            <div className="flex items-center justify-between mb-2">
              <h4 className="font-display text-lg">Steps</h4>
              <button type="button" onClick={addStep}
                className="text-sm bg-sand text-ink px-3 py-1 rounded-lg">+ Add</button>
            </div>
            <div className="space-y-3">
              {(form.steps || []).map((s, i) => (
                <div key={i} className="flex gap-3">

                        onChange={(e) => setStep(i, "instruction_tl", e.target.value)}

                        className="w-full rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm resize-y" />
                      <textarea rows={1} value={s.instruction_il || ""}
                        onChange={(e) => setStep(i, "instruction_il", e.target.value)}
                        placeholder="Ilocano…"
                        className="w-full rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm resize-y" />

                  <button type="button" onClick={() => removeStep(i)}

          {err && <p className="text-sm text-terra">{err}</p>}
          <div className="flex gap-2 flex-wrap pt-2 border-t border-warm/10">

              {busy ? "Saving…" : isNew ? "Create recipe" : "Save changes"}

            <button type="button" onClick={onCancel}
              className="bg-sand text-ink px-4 py-2 rounded-lg text-sm">Cancel</button>
            {!isNew && !confirmDel && (
              <button type="button" onClick={() => setConfirmDel(true)}
                className="ml-auto text-sm text-warm/60 hover:text-terra">Delete recipe</button>
            )}
            {!isNew && confirmDel && (
              <div className="ml-auto flex items-center gap-2">
                <span className="text-sm text-terra">Delete {form.name}?</span>
                <button type="button" onClick={del} disabled={busy}
                  className="bg-terra text-cream px-3 py-1.5 rounded-lg text-sm">Yes, delete</button>
                <button type="button" onClick={() => setConfirmDel(false)}
                  className="bg-sand text-ink px-3 py-1.5 rounded-lg text-sm">Cancel</button>
              </div>

          <label className="block text-sm text-warm mt-4">Faith token</label>
