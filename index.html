<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Meal Planner</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f5ecdf'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='44'%3E🍽️%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: "#f5ecdf", sand: "#ebddc6", ink: "#2e2a24",
            terra: "#b4593a", sage: "#6b8a6c", warm: "#6d5b46",
          },
          fontFamily: {
            display: ["Lora", "Georgia", "serif"],
            body: ["Source Sans 3", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    html, body { background: #f5ecdf; color: #2e2a24; font-family: "Source Sans 3", system-ui, sans-serif; }
    h1, h2, h3 { font-family: Lora, Georgia, serif; }
    .num { font-variant-numeric: tabular-nums; }
  </style>
  <script src="shared.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;
    const MEALS = ["breakfast", "lunch", "dinner"];

    function lastEatenPill(le, lang) {
      if (le.status === "never") {
        return <span className="text-xs text-warm/60">— {MP.i18n.t(lang, "never")}</span>;
      }
      const color = le.status === "recent" ? "bg-terra/15 text-terra"
                 : le.status === "warming" ? "bg-amber-200/60 text-amber-900"
                 : "bg-sage/20 text-sage";
      return <span className={`text-xs px-2 py-0.5 rounded-full ${color} num`}>{le.days}{MP.i18n.t(lang, "daysAgo")}</span>;
    }

    function Modal({ open, onClose, children, title }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-40 bg-ink/40 flex items-start justify-center p-4 overflow-y-auto"
             onClick={onClose}>
          <div className="bg-cream w-full max-w-3xl rounded-2xl shadow-xl mt-10 mb-10"
               onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-warm/10">
              <h2 className="font-display text-xl">{title}</h2>
              <button onClick={onClose} className="text-warm text-xl leading-none">×</button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    function RecipePicker({ mealType, recipes, eatenLog, onPick, lang, usedIds }) {
      const [q, setQ] = useState("");
      const [cuisine, setCuisine] = useState("all");
      const today = MP.date.hkToday();
      const filtered = useMemo(() => {
        return recipes
          .filter((r) => !r.meal_type || r.meal_type.includes(mealType))
          .filter((r) => (cuisine === "all" ? true : r.cuisine === cuisine))
          .filter((r) => (q ? r.name.toLowerCase().includes(q.toLowerCase()) : true));
      }, [recipes, mealType, cuisine, q]);
      const cuisines = useMemo(() => ["all", ...Array.from(new Set(recipes.map((r) => r.cuisine).filter(Boolean)))], [recipes]);

      return (
        <div>
          <div className="flex gap-2 mb-4">
            <input value={q} onChange={(e) => setQ(e.target.value)}
              placeholder="Search…"
              className="flex-1 rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm" />
            <select value={cuisine} onChange={(e) => setCuisine(e.target.value)}
              className="rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm">
              {cuisines.map((c) => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-3">
            {filtered.map((r) => {
              const le = MP.lastEaten(r.id, eatenLog, today);
              const used = usedIds.includes(r.id);
              return (
                <button key={r.id}
                  onClick={() => onPick(r.id)}
                  className={`text-left bg-white rounded-xl overflow-hidden shadow-sm ring-1 ring-black/5 hover:ring-terra/40 transition ${used ? "opacity-60" : ""}`}>
                  {MP.recipeImage(r) && (
                    <img src={MP.recipeImage(r)} alt="" className="w-full h-28 object-cover"
                         onLoad={(e) => {
                           if (MP.isYoutubePlaceholder(e.target)) {
                             const src = e.target.src;
                             if (src.includes("maxresdefault")) { e.target.src = src.replace("maxresdefault", "hqdefault"); return; }
                             if (r.hero_image && src !== r.hero_image) { e.target.src = r.hero_image; return; }
                             e.target.style.display = "none";
                           }
                         }}
                         onError={(e) => {
                           const src = e.target.src;
                           if (src.includes("maxresdefault")) { e.target.src = src.replace("maxresdefault", "hqdefault"); return; }
                           if (r.hero_image && src !== r.hero_image) { e.target.src = r.hero_image; return; }
                           e.target.style.display = "none";
                         }} />
                  )}
                  <div className="p-3">
                    <div className="font-display text-[17px] leading-tight">{r.name}</div>
                    <div className="flex items-center justify-between mt-1">
                      <span className="text-xs text-warm">
                        {r.cuisine} · <span className="num">{(r.prep_time_mins || 0) + (r.cook_time_mins || 0)}</span>m
                      </span>
                      {lastEatenPill(le, lang)}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function ShoppingList({ recipes, plan, lang, pantry, onToggle }) {
      const groups = MP.buildShoppingList(recipes, plan);
      const sourceLabels = {
        "wet-market": "Wet market", "supermarket": "Fusion / Marketplace",
        "hktvmall": "HKTVmall", "other": "Other",
      };
      const categoryLabels = {
        meat: "Meat & Seafood", produce: "Vegetables & Fruit",
        dairy: "Dairy & Eggs", pantry: "Pantry & Dry Goods",
        bakery: "Bread & Bakery", frozen: "Frozen", other: "Other",
      };
      const sourceOrder = ["wet-market", "supermarket", "hktvmall", "other"];
      const key = (it) => (it.item || "").toLowerCase().trim();
      return (
        <div>
          <div className="text-sm text-warm mb-4">
            Week of <span className="num">{plan.week_start}</span> · Serves <span className="num">{plan.serves || 4}</span>
            <div className="mt-1 text-xs">Ticked items are in the pantry already — helper keeps this list current.</div>
          </div>
          {sourceOrder.map((src) => {
            const g = groups[src];
            if (!g) return null;
            return (
              <div key={src} className="mb-6">
                <h3 className="font-display text-lg text-terra">{sourceLabels[src] || src}</h3>
                {Object.entries(g).map(([cat, items]) => (
                  <div key={cat} className="mt-2">
                    <div className="uppercase tracking-wide text-xs text-warm mb-1">{categoryLabels[cat] || cat}</div>
                    <ul className="space-y-0.5">
                      {items.map((it, i) => {
                        const k = key(it);
                        const has = !!pantry[k];
                        return (
                          <li key={i} className={`flex gap-3 text-[15px] items-center ${has ? "opacity-40 line-through" : ""}`}>
                            <input type="checkbox" className="accent-sage w-4 h-4"
                              checked={has}
                              onChange={(e) => onToggle(k, e.target.checked)} />
                            <span className="num text-warm min-w-[5rem]">
                              {Number(it.amount.toFixed(2)).toString()} {it.unit}
                            </span>
                            <span>{it.item}</span>
                          </li>
                        );
                      })}
                    </ul>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      );
    }

    function YoutubeEditor({ recipe }) {
      const [editing, setEditing] = useState(false);
      const [val, setVal] = useState(recipe.youtube_url || "");
      const [busy, setBusy] = useState(false);
      const [msg, setMsg] = useState("");
      async function save() {
        setBusy(true); setMsg("");
        try {
          await MP.api.upsertRecipe(recipe.id, { ...recipe, youtube_url: val || null });
          recipe.youtube_url = val || null; // mutate for immediate image refresh in modal
          setMsg("✓ Saved — image will update on next load.");
          setEditing(false);
        } catch (e) { setMsg("Failed: " + e.message); }
        finally { setBusy(false); }
      }
      if (!editing) {
        return (
          <div className="flex items-center gap-2 flex-wrap">
            {recipe.youtube_url ? (
              <a href={recipe.youtube_url} target="_blank" rel="noopener"
                className="inline-flex items-center gap-2 bg-terra text-cream px-4 py-2 rounded-full text-sm">
                ▶ Watch video
              </a>
            ) : (
              <span className="text-sm text-warm/70 italic">No video yet</span>
            )}
            <button onClick={() => setEditing(true)} className="text-xs underline text-warm">
              {recipe.youtube_url ? "Change video" : "Paste YouTube link"}
            </button>
            {msg && <span className="text-xs text-warm">{msg}</span>}
          </div>
        );
      }
      return (
        <div className="flex flex-wrap gap-2 items-center">
          <input value={val} onChange={(e) => setVal(e.target.value)}
            placeholder="https://www.youtube.com/watch?v=…"
            className="flex-1 min-w-[18rem] rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm" />
          <button onClick={save} disabled={busy}
            className="bg-ink text-cream px-3 py-2 rounded-lg text-sm disabled:opacity-60">
            {busy ? "Saving…" : "Save"}
          </button>
          <button onClick={() => { setVal(recipe.youtube_url || ""); setEditing(false); }}
            className="text-warm px-2 text-sm">Cancel</button>
          <div className="text-xs text-warm basis-full">
            Pasting a link will also use its thumbnail as the recipe photo automatically.
          </div>
        </div>
      );
    }

    function RecipePreview({ recipe, meal, mealTime, mealServes, planServes, onChange, onUpdate }) {
      const img = MP.recipeImage(recipe);
      const effTime = mealTime || MP.schedule.defaultMealTime(meal);
      const effServes = mealServes || planServes || recipe.serves_base || 4;
      const sched = MP.schedule.forMeal(meal, recipe, { mealTime: effTime });
      return (
        <div>
          {img && (
            <img src={img} alt="" className="w-full h-48 object-cover rounded-xl mb-4"
              onLoad={(e) => {
                if (!MP.isYoutubePlaceholder(e.target)) return;
                const s = e.target.src;
                if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                if (recipe.hero_image && s !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                e.target.style.display = "none";
              }}
              onError={(e) => {
                const s = e.target.src;
                if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                if (recipe.hero_image && s !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                e.target.style.display = "none";
              }} />
          )}
          <div className="flex items-start justify-between mb-3">
            <div>
              <div className="text-xs uppercase text-warm">{meal}</div>
              <h3 className="font-display text-2xl">{recipe.name}</h3>
              <div className="text-sm text-warm mt-1">
                {recipe.cuisine} · recipe base <span className="num">{recipe.serves_base}</span> · prep <span className="num">{recipe.prep_time_mins}</span>m · cook <span className="num">{recipe.cook_time_mins}</span>m
              </div>
            </div>
            <div className="text-right shrink-0">
              <div className="text-xs text-warm">Start</div>
              <div className="font-display text-xl num">{sched.startTime}</div>
            </div>
          </div>
          {onUpdate && (
            <div className="mb-4 p-3 rounded-xl bg-sand/50 flex flex-wrap gap-4 items-end">
              <label className="text-sm text-warm">
                <div className="text-xs uppercase tracking-wide">Serve at</div>
                <input type="time" value={effTime}
                  onChange={(e) => onUpdate({ time: e.target.value, serves: effServes })}
                  className="mt-1 rounded-lg border border-warm/20 bg-white px-2 py-1 num" />
              </label>
              <label className="text-sm text-warm">
                <div className="text-xs uppercase tracking-wide">Eating</div>
                <select value={effServes}
                  onChange={(e) => onUpdate({ time: effTime, serves: Number(e.target.value) })}
                  className="mt-1 rounded-lg border border-warm/20 bg-white px-2 py-1 num">
                  {[1,2,3,4,5,6,7,8].map((n) => <option key={n} value={n}>{n} {n===1?"person":"people"}</option>)}
                </select>
              </label>
              <div className="text-xs text-warm ml-auto">
                Start {sched.startTime} · ingredients scale to {effServes}
              </div>
            </div>
          )}
          {onUpdate && (
            <YoutubeEditor recipe={recipe} />
          )}
          {!onUpdate && recipe.youtube_url && (
            <a href={recipe.youtube_url} target="_blank" rel="noopener"
              className="inline-flex items-center gap-2 bg-terra text-cream px-4 py-2 rounded-full text-sm">
              ▶ Watch video
            </a>
          )}
          <h4 className="font-display text-lg mt-5">Ingredients</h4>
          <ul className="text-[15px]">
            {recipe.ingredients.map((ing, i) => (
              <li key={i} className="flex gap-3 py-0.5">
                <span className="num text-warm min-w-[4.5rem]">{Number(ing.amount.toFixed(2))} {ing.unit}</span>
                <span>{ing.item}</span>
              </li>
            ))}
          </ul>
          <h4 className="font-display text-lg mt-5">Steps</h4>
          <ol className="space-y-3 mt-1">
            {recipe.steps.map((s) => (
              <li key={s.step} className="flex gap-3">
                <span className="font-display text-terra text-lg min-w-[1.5rem]">{s.step}</span>
                <div className="text-[15px] leading-relaxed">{s.instruction}</div>
              </li>
            ))}
          </ol>
          <div className="mt-6 flex gap-2">
            <button onClick={onChange} className="bg-sand text-ink px-4 py-2 rounded-lg text-sm">Change this meal</button>
          </div>
        </div>
      );
    }

    function RecipeLibrary({ recipes, eatenLog, onOpen, lang }) {
      const [q, setQ] = useState("");
      const [cuisine, setCuisine] = useState("all");
      const [mealType, setMealType] = useState("all");
      const today = MP.date.hkToday();
      const cuisines = useMemo(() => ["all", ...Array.from(new Set(recipes.map((r) => r.cuisine).filter(Boolean)))], [recipes]);
      const filtered = useMemo(() => {
        return recipes
          .filter((r) => mealType === "all" ? true : (r.meal_type || []).includes(mealType))
          .filter((r) => cuisine === "all" ? true : r.cuisine === cuisine)
          .filter((r) => q ? r.name.toLowerCase().includes(q.toLowerCase()) : true);
      }, [recipes, mealType, cuisine, q]);
      return (
        <div>
          <div className="flex flex-wrap gap-2 mb-4">
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search…"
              className="flex-1 min-w-[10rem] rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm" />
            <select value={mealType} onChange={(e) => setMealType(e.target.value)}
              className="rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm">
              <option value="all">Any meal</option>
              <option value="breakfast">Breakfast</option>
              <option value="lunch">Lunch</option>
              <option value="dinner">Dinner</option>
            </select>
            <select value={cuisine} onChange={(e) => setCuisine(e.target.value)}
              className="rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm">
              {cuisines.map((c) => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="text-xs text-warm mb-3 num">{filtered.length} of {recipes.length} recipes</div>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
            {filtered.map((r) => {
              const le = MP.lastEaten(r.id, eatenLog, today);
              return (
                <button key={r.id} onClick={() => onOpen(r)}
                  className="text-left bg-white rounded-xl overflow-hidden shadow-sm ring-1 ring-black/5 hover:ring-terra/40 transition">
                  {MP.recipeImage(r) && (
                    <img src={MP.recipeImage(r)} alt="" className="w-full h-28 object-cover"
                      onLoad={(e) => {
                        if (!MP.isYoutubePlaceholder(e.target)) return;
                        const s = e.target.src;
                        if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                        if (r.hero_image && s !== r.hero_image) { e.target.src = r.hero_image; return; }
                        e.target.style.display = "none";
                      }}
                      onError={(e) => {
                        const s = e.target.src;
                        if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                        if (r.hero_image && s !== r.hero_image) { e.target.src = r.hero_image; return; }
                        e.target.style.display = "none";
                      }} />
                  )}
                  <div className="p-3">
                    <div className="font-display text-[16px] leading-tight">{r.name}</div>
                    <div className="flex items-center justify-between mt-1">
                      <span className="text-xs text-warm">
                        {r.cuisine} · <span className="num">{(r.prep_time_mins || 0) + (r.cook_time_mins || 0)}</span>m
                      </span>
                      {lastEatenPill(le, lang)}
                    </div>
                    <div className="mt-1 text-[11px] uppercase tracking-wide text-warm/70">
                      {(r.meal_type || []).join(" · ")}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function SettingsPanel({ onClose }) {
      const [base, setBase] = useState(localStorage.getItem("mpApiBase") || "");
      const [tok, setTok] = useState(localStorage.getItem("mpFaithToken") || "");
      const [status, setStatus] = useState("");
      async function test() {
        if (base) MP.api.setBase(base);
        try {
          const r = await MP.api.health();
          setStatus("OK: " + JSON.stringify(r));
        } catch (e) { setStatus("FAIL: " + e.message); }
      }
      return (
        <div>
          <label className="block text-sm text-warm">Worker URL</label>
          <input value={base} onChange={(e) => setBase(e.target.value)}
            placeholder="https://meal-planner-api.<you>.workers.dev"
            className="mt-1 w-full rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm" />
          <label className="block text-sm text-warm mt-4">Faith token</label>
          <input value={tok} onChange={(e) => setTok(e.target.value)} type="password"
            className="mt-1 w-full rounded-lg border border-warm/20 bg-white px-3 py-2 text-sm" />
          <div className="mt-4 flex gap-2">
            <button onClick={() => { MP.api.setBase(base); MP.api.setToken(tok); onClose(); location.reload(); }}
              className="bg-ink text-cream px-4 py-2 rounded-lg">Save</button>
            <button onClick={test} className="bg-sand text-ink px-4 py-2 rounded-lg">Test</button>
          </div>
          {status && <div className="mt-3 text-sm text-warm">{status}</div>}
        </div>
      );
    }

    function Feedback({ date }) {
      const [items, setItems] = useState(null);
      useEffect(() => { MP.api.getFeedback(date).then(setItems).catch(() => setItems([])); }, [date]);
      if (!items) return null;
      if (items.length === 0) return <p className="text-sm text-warm">No feedback yet this week.</p>;
      return (
        <ul className="space-y-2">
          {items.map((f, i) => (
            <li key={i} className="text-sm">
              <span className="num text-warm">{f.date}</span> · {f.meal} ·{" "}
              {f.rating > 0 ? "👍" : f.rating < 0 ? "👎" : "💬"} {f.recipe_id}
              {f.note ? <span className="text-warm italic"> — {f.note}</span> : null}
            </li>
          ))}
        </ul>
      );
    }

    function useNow() {
      const [now, setNow] = useState(() => MP.date.hkNowMin());
      useEffect(() => {
        const id = setInterval(() => setNow(MP.date.hkNowMin()), 30 * 1000);
        return () => clearInterval(id);
      }, []);
      return now;
    }

    function App() {
      const [recipes, setRecipes] = useState(null);
      const [plan, setPlan] = useState(null);
      const [eatenLog, setEatenLog] = useState({});
      const [pantry, setPantry] = useState({});
      const [err, setErr] = useState(null);
      const [picker, setPicker] = useState(null); // { dayIdx, meal }
      const [preview, setPreview] = useState(null); // { dayIdx, meal, recipe }
      const [showShop, setShowShop] = useState(false);
      const [showLibrary, setShowLibrary] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [saving, setSaving] = useState(false);
      const [flash, setFlashMsg] = useState("");

      const lang = "en"; // planner stays English; language is for helper view.

      useEffect(() => {
        (async () => {
          try {
            const [rs, wp, el, pa] = await Promise.all([
              MP.api.getRecipes(), MP.api.getWeekplan(), MP.api.getEatenLog(), MP.api.getPantry(),
            ]);
            setRecipes(rs);
            setEatenLog(el || {});
            setPantry(pa || {});
            if (wp) setPlan(wp);
            else setPlan(makeEmptyPlan());
          } catch (e) { setErr(e.message); }
        })();
      }, []);

      async function togglePantryItem(item, have) {
        setPantry((p) => {
          const next = { ...p };
          if (have) next[item] = new Date().toISOString().slice(0, 10);
          else delete next[item];
          return next;
        });
        try { await MP.api.togglePantry(item, have); }
        catch (e) { setFlashMsg("Pantry save failed: " + e.message); }
      }

      function makeEmptyPlan() {
        const ws = MP.date.mondayOf(MP.date.hkToday());
        const names = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
        return {
          week_start: ws, shopping_day: "Monday", serves: 4, language: "en",
          days: names.map((n, i) => ({ day: n, date: MP.date.addDays(ws, i), breakfast: null, lunch: null, dinner: null })),
        };
      }

      const recipesById = useMemo(() => {
        const m = {}; (recipes || []).forEach((r) => m[r.id] = r); return m;
      }, [recipes]);

      const usedIds = useMemo(() => {
        if (!plan) return [];
        const ids = [];
        for (const d of plan.days) for (const m of MEALS) if (d[m]) ids.push(d[m]);
        return ids;
      }, [plan]);

      function setSlot(dayIdx, meal, id) {
        setPlan((p) => {
          const days = p.days.map((d, i) => {
            if (i !== dayIdx) return d;
            const next = { ...d, [meal]: id };
            if (!id) {
              delete next[meal + "_time"];
              delete next[meal + "_serves"];
            }
            return next;
          });
          return { ...p, days };
        });
      }
      function setSlotMeta(dayIdx, meal, { time, serves }) {
        setPlan((p) => {
          const days = p.days.map((d, i) => {
            if (i !== dayIdx) return d;
            const next = { ...d };
            if (time && time !== MP.schedule.defaultMealTime(meal)) next[meal + "_time"] = time;
            else delete next[meal + "_time"];
            if (serves && serves !== (p.serves || 4)) next[meal + "_serves"] = serves;
            else delete next[meal + "_serves"];
            return next;
          });
          return { ...p, days };
        });
      }

      async function shiftWeek(delta) {
        const newStart = MP.date.addDays(plan.week_start, delta * 7);
        // Try to load a previously-saved plan for that week; fall back to empty scaffold.
        let stored = null;
        try { stored = await MP.api.getWeekplanFor(newStart); } catch (e) { /* offline */ }
        if (stored && stored.week_start === newStart) {
          setPlan(stored);
          return;
        }
        const names = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
        setPlan((p) => ({
          ...p,
          week_start: newStart,
          days: names.map((n, i) => ({
            day: n, date: MP.date.addDays(newStart, i),
            breakfast: null, lunch: null, dinner: null,
          })),
        }));
      }

      async function savePlan() {
        if (!MP.api.hasToken()) {
          setShowSettings(true);
          setFlashMsg("Paste your Faith token in Settings first.");
          return;
        }
        setSaving(true);
        try {
          await MP.api.putWeekplan(plan);
          const el = await MP.api.getEatenLog();
          setEatenLog(el || {});
          setFlashMsg("✓ Week saved. Helper will see it.");
        } catch (e) {
          setFlashMsg("Save failed: " + e.message);
        } finally { setSaving(false); }
      }

      // All hooks MUST be above the early returns so React's hook count stays
      // consistent between loading and loaded renders.
      const nowMin = useNow();

      if (err) {
        return (
          <div className="max-w-xl mx-auto p-6">
            <h1 className="font-display text-3xl">Meal Planner</h1>
            <p className="text-terra mt-4">Could not load: {err}</p>
            <button onClick={() => setShowSettings(true)} className="mt-3 bg-ink text-cream px-4 py-2 rounded-lg">Open Settings</button>
            <Modal open={showSettings} onClose={() => setShowSettings(false)} title="Settings">
              <SettingsPanel onClose={() => setShowSettings(false)} />
            </Modal>
          </div>
        );
      }
      if (!recipes || !plan) return <div className="p-6 text-warm">Loading…</div>;

      const today = MP.date.hkToday();
      const clockStr = MP.date.hkNowClock("en");
      const currentMeal = MP.date.currentMeal();
      const todayDay = plan.days.find((d) => d.date === today);
      const todayRecipe = todayDay && todayDay[currentMeal] ? recipesById[todayDay[currentMeal]] : null;
      const todayRecipeSched = todayRecipe ? MP.schedule.forMeal(currentMeal, todayRecipe, { mealTime: todayDay && todayDay[currentMeal + "_time"] }) : null;
      const todayMealTime = todayDay ? (todayDay[currentMeal + "_time"] || MP.schedule.defaultMealTime(currentMeal)) : null;

      return (
        <main className="max-w-[1400px] mx-auto px-6 pt-6 pb-16">
          <header className="flex items-center justify-between gap-4 flex-wrap mb-6">
            <div>
              <h1 className="font-display text-3xl">Meal Planner</h1>
              <div className="text-warm text-sm">
                Week of <span className="num">{plan.week_start}</span>
                <button onClick={() => shiftWeek(-1)} className="ml-3 text-terra">◀ prev</button>
                <button onClick={() => shiftWeek(1)} className="ml-2 text-terra">next ▶</button>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <label className="text-sm text-warm">Serves
                <select value={plan.serves || 4} onChange={(e) => setPlan((p) => ({...p, serves: Number(e.target.value)}))}
                  className="ml-1 rounded-lg border border-warm/20 bg-white px-2 py-1">
                  {[2,3,4,5,6].map((n) => <option key={n} value={n}>{n}</option>)}
                </select>
              </label>
              <a href="helper.html" target="_blank" rel="noopener"
                className="bg-sand text-ink px-3 py-2 rounded-lg text-sm">👁 Helper view</a>
              <button onClick={() => setShowLibrary(true)} className="bg-sand text-ink px-3 py-2 rounded-lg text-sm">📖 Recipes</button>
              <button onClick={() => setShowShop(true)} className="bg-sand text-ink px-3 py-2 rounded-lg text-sm">🛒 Shopping list</button>
              <button onClick={savePlan} disabled={saving}
                className="bg-terra text-cream px-4 py-2 rounded-lg text-sm disabled:opacity-60">
                {saving ? "Saving…" : "Save Week"}
              </button>
              <button onClick={() => setShowSettings(true)} className="bg-ink/80 text-cream px-3 py-2 rounded-lg text-sm">⚙︎</button>
            </div>
          </header>

          {flash && <div className="mb-4 text-sm text-terra">{flash}</div>}

          <section className="mb-6 bg-white rounded-2xl p-5 shadow-sm ring-1 ring-terra/20 flex flex-wrap items-center justify-between gap-4">
            <div>
              <div className="text-xs uppercase tracking-wide text-terra">Right now · {MP.date.dayName(today)}, {MP.date.prettyDate(today)} · 🕐 <span className="num">{clockStr}</span></div>
              <div className="font-display text-2xl mt-1">
                {currentMeal === "breakfast" ? "🍳 Breakfast" : currentMeal === "lunch" ? "🥗 Lunch" : "🍽️ Dinner"}
                {todayRecipe ? <span className="text-ink"> — {todayRecipe.name}</span> : <span className="text-warm/60"> — not planned</span>}
              </div>
              {todayRecipe && (
                <div className="text-sm text-warm mt-1">
                  Start at <span className="num font-semibold">{todayRecipeSched.startTime}</span> · {todayRecipe.cuisine} · {(todayRecipe.prep_time_mins||0)+(todayRecipe.cook_time_mins||0)}m
                </div>
              )}
            </div>
            {todayRecipe && (
              <button
                onClick={() => {
                  const dayIdx = plan.days.findIndex((d) => d.date === today);
                  setPreview({ dayIdx, meal: currentMeal, recipe: todayRecipe });
                }}
                className="bg-terra text-cream px-4 py-2 rounded-lg text-sm">
                Open recipe
              </button>
            )}
          </section>

          <div className="overflow-x-auto">
            <table className="w-full border-separate border-spacing-3">
              <thead>
                <tr>
                  <th className="w-24"></th>
                  {plan.days.map((d) => {
                    const isToday = d.date === today;
                    return (
                      <th key={d.date} className={`text-left font-normal ${isToday ? "bg-terra/10 rounded-t-lg px-2" : ""}`}>
                        <div className={`font-display text-lg ${isToday ? "text-terra" : ""}`}>{d.day}{isToday && " · Today"}</div>
                        <div className="text-xs text-warm num">{d.date}</div>
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {MEALS.map((meal) => (
                  <tr key={meal} className="align-top">
                    <td className={`text-sm uppercase tracking-wide pt-4 ${meal === currentMeal ? "text-terra font-semibold" : "text-warm"}`}>
                      {meal}{meal === currentMeal && " ●"}
                    </td>
                    {plan.days.map((d, dayIdx) => {
                      const r = d[meal] ? recipesById[d[meal]] : null;
                      const conflicts = MP.schedule.dayConflicts(d, recipesById);
                      const inConflict = r && conflicts.some((pair) => pair.includes(meal));
                      const sched = r ? MP.schedule.forMeal(meal, r, { mealTime: d[meal + "_time"] }) : null;
                      const servesOverride = d[meal + "_serves"];
                      const isToday = d.date === today;
                      const isNow = isToday && meal === currentMeal;
                      return (
                        <td key={d.date} className={isToday ? "bg-terra/5" : ""}>
                          <button onClick={() => r ? setPreview({ dayIdx, meal, recipe: r }) : setPicker({ dayIdx, meal })}
                            className={`w-full h-full min-h-[88px] text-left rounded-xl p-3 transition ring-1 ${
                              isNow ? "bg-white ring-2 ring-terra" :
                              r ? "bg-white ring-black/5 hover:ring-terra/40" : "bg-sand/60 ring-sand hover:bg-sand"
                            }`}>
                            {r ? (
                              <div>
                                <div className="font-display leading-tight text-[15px]">{r.name}</div>
                                <div className="text-xs text-warm mt-1 flex items-center justify-between gap-2">
                                  <span className="num">{sched.startTime}</span>
                                  <span className="flex items-center gap-1">
                                    {servesOverride && <span className="num text-warm bg-sand px-1.5 rounded" title="Custom serves">{servesOverride}p</span>}
                                    {inConflict && <span title="Stove conflict" className="text-terra">⚠</span>}
                                    {sched.flagEarly && <span title="Start previous day" className="text-amber-700">🌙</span>}
                                  </span>
                                </div>
                              </div>
                            ) : (
                              <div className="text-warm text-sm">+ pick</div>
                            )}
                          </button>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <section className="mt-10 grid md:grid-cols-2 gap-6">
            <div className="bg-white/70 rounded-2xl p-5 shadow-sm ring-1 ring-black/5">
              <h2 className="font-display text-xl mb-3">This week's feedback</h2>
              <Feedback date={plan.days[0]?.date || today} />
            </div>
            <div className="bg-white/70 rounded-2xl p-5 shadow-sm ring-1 ring-black/5">
              <h2 className="font-display text-xl mb-3">Tip</h2>
              <p className="text-sm text-warm leading-relaxed">
                ⚠ next to a meal means two recipes need the stove at the same time — rearrange or simplify one.{" "}
                🌙 means start the night before or defrost today (check the helper's "Prep for tomorrow" panel).
                Send the helper: <code className="text-xs bg-sand px-1 py-0.5 rounded">…/helper.html</code>
              </p>
            </div>
          </section>

          <Modal open={!!picker} onClose={() => setPicker(null)}
            title={picker ? `${plan.days[picker.dayIdx].day} — ${picker.meal}` : ""}>
            {picker && (
              <RecipePicker
                mealType={picker.meal} recipes={recipes} eatenLog={eatenLog}
                usedIds={usedIds} lang={lang}
                onPick={(id) => { setSlot(picker.dayIdx, picker.meal, id); setPicker(null); }}
              />
            )}
          </Modal>

          <Modal open={showShop} onClose={() => setShowShop(false)} title="Shopping list">
            <ShoppingList recipes={recipes} plan={plan} lang={lang}
              pantry={pantry} onToggle={togglePantryItem} />
          </Modal>

          <Modal open={!!preview} onClose={() => setPreview(null)}
            title={preview ? `${plan.days[preview.dayIdx].day} — ${preview.meal}` : ""}>
            {preview && (
              <RecipePreview
                recipe={preview.recipe} meal={preview.meal}
                mealTime={plan.days[preview.dayIdx][preview.meal + "_time"]}
                mealServes={plan.days[preview.dayIdx][preview.meal + "_serves"]}
                planServes={plan.serves || 4}
                onUpdate={({ time, serves }) => setSlotMeta(preview.dayIdx, preview.meal, { time, serves })}
                onChange={() => { const p = preview; setPreview(null); setPicker({ dayIdx: p.dayIdx, meal: p.meal }); }}
              />
            )}
          </Modal>

          <Modal open={showLibrary} onClose={() => setShowLibrary(false)} title="Recipe library">
            <RecipeLibrary recipes={recipes} eatenLog={eatenLog} lang={lang}
              onOpen={(r) => { setShowLibrary(false); setPreview({ dayIdx: 0, meal: (r.meal_type||["dinner"])[0], recipe: r }); }} />
          </Modal>

          <Modal open={showSettings} onClose={() => setShowSettings(false)} title="Settings">
            <SettingsPanel onClose={() => setShowSettings(false)} />
          </Modal>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
