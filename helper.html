<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#F4F1EC" />
  <title>Today's meals</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23F4F1EC'/%3E%3Ctext x='32' y='46' font-size='38' text-anchor='middle'%3E%F0%9F%8D%BD%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: "#F4F1EC", sand: "#EAE3D9", ink: "#1A1A1A",
            terra: "#C8392B", sage: "#6B6B6B", warm: "#6B6B6B",
            bg0: "#FAFAF7", border: "#E4DDD5",
          },
          fontFamily: {
            display: ["Source Serif 4", "Georgia", "serif"],
            body: ["Inter", "system-ui", "sans-serif"],
            mono: ["JetBrains Mono", "ui-monospace", "monospace"],
          },
        },
      },
    };
  </script>
  <style>
    html, body { background: #F4F1EC; color: #1A1A1A; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    h1, h2, h3, h4 { font-family: "Source Serif 4", Georgia, serif; font-weight: 400; letter-spacing: -0.005em; }
    .step-num { font-variant-numeric: tabular-nums; }
    .num { font-variant-numeric: tabular-nums; }
  </style>
  <link rel="preload" href="https://unpkg.com/@babel/standalone/babel.min.js" as="script" />
  <link rel="preload" href="https://unpkg.com/react@18/umd/react.production.min.js" as="script" />
  <link rel="preload" href="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" as="script" />
</head>
<body>
  <!-- Static splash — visible instantly while scripts load -->
  <div id="splash" style="max-width:560px;margin:0 auto;padding:56px 16px 24px">
    <div style="height:28px;width:120px;background:#EAE3D9;margin-bottom:16px"></div>
    <div style="height:40px;width:200px;background:#EAE3D9;margin-bottom:12px"></div>
    <div style="height:16px;width:96px;background:#EAE3D9;opacity:.6;margin-bottom:20px"></div>
    <div style="height:80px;background:rgba(200,57,43,.15);margin-bottom:16px"></div>
    <div style="height:112px;background:#EAE3D9;margin-bottom:12px"></div>
    <div style="height:112px;background:#EAE3D9;opacity:.7"></div>
  </div>
  <div id="root"></div>

  <script src="shared.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useState, useMemo } = React;
    // "Auntie Leni" appears verbatim (untranslated) in the en/tl strings this touches
    // (helloLeni, prepInstructions, thankYouLeni) — one substitution covers every call site.
    const t = (lang, key) => {
      const raw = MP.i18n.t(lang, key);
      const cookName = localStorage.getItem("mpCookName");
      return cookName ? raw.replace(/Auntie Leni/g, cookName) : raw;
    };
    const COMPONENTS = ["protein", "vegetable", "carb"];
    const OPT_COMPONENTS = ["starter", "soup", "salad"];
    const ALL_COMPONENTS = [...COMPONENTS, ...OPT_COMPONENTS];
    const COMPONENT_ICONS  = { protein: "🥩", vegetable: "🥦", carb: "🍚", starter: "🍽️", soup: "🍲", salad: "🥗" };
    const COMPONENT_LABELS = { protein: "Protein", vegetable: "Vegetable", carb: "Carb", starter: "Starter", soup: "Soup", salad: "Salad" };

    const HELPER_BUFFER = 20; // extra mins added to every start time for Leni

    function langStore() {
      return localStorage.getItem("mpHelperLang") || "en";
    }

    function LangToggle({ lang, onChange }) {
      return (
        <div className="inline-flex rounded-full bg-sand p-1 gap-0.5 text-xs shadow-sm">
          {MP.i18n.languages.map((l) => (
            <button
              key={l.code}
              onClick={() => onChange(l.code)}
              className={`px-3 py-1.5 rounded-full font-semibold transition ${
                lang === l.code
                  ? "bg-terra text-cream shadow"
                  : "text-warm hover:text-ink"
              }`}>
              {l.label}
            </button>
          ))}
        </div>
      );
    }

    // Change 2: NowBar — fixed slim bar always visible at top
    function NowBar({ day, nextDay, recipesById, nowMin, lang }) {
      const { h, m, s, ampm, blink, dateStr } = useClock();
      let content = null;
      let overdue = false;

      if (day) {
        const tasks = MP.schedule.buildDayTasks(day, nextDay, recipesById, { buffer: HELPER_BUFFER });
        const upcoming = tasks.find((tk) => (tk.kind === "cook" || tk.kind === "serve") && tk.at > nowMin);
        if (upcoming) {
          const minsToStart = upcoming.at - nowMin;
          overdue = minsToStart <= 0;
          content = overdue
            ? t(lang, "cookNow")
            : minsToStart < 60
              ? `in ${minsToStart} min`
              : MP.schedule.fmtTime(upcoming.at);
        } else {
          content = "🌙 All done";
        }
      } else {
        content = "🌙 All done";
      }

      return (
        <div
          className={`fixed top-0 left-0 right-0 z-20 flex items-center justify-between px-4 gap-2 ${
            overdue ? "bg-terra text-cream" : "bg-ink text-cream"
          }`}
          style={{ height: "56px" }}>
          {/* Left: live clock */}
          <div className="shrink-0">
            <div className="text-[9px] font-semibold uppercase tracking-wider opacity-50 leading-none mb-0.5">{dateStr}</div>
            <div className="num font-display text-xl leading-none tracking-tight">
              {h}<span style={{ opacity: blink ? 1 : 0.25 }}>:</span>{m}<span className="text-sm ml-1 opacity-70">{ampm}</span>
            </div>
          </div>
          {/* Right: cooking action */}
          <div className="text-right min-w-0">
            <div className="text-[9px] font-semibold uppercase tracking-wider opacity-50 leading-tight mb-0.5 break-words">{t(lang, "startCookingNextMeal")}</div>
            <div className={`text-sm font-semibold ${overdue ? "text-cream" : "text-cream/80"}`}>{content}</div>
          </div>
        </div>
      );
    }

    // Renders a single recipe's image, ingredients and steps
    function RecipeCard({ recipe, componentType, lang, onVerify, noImage }) {
      const [playing, setPlaying] = useState(false);
      const name = MP.i18n.recipeName(recipe, lang);
      const showEng = !recipe.translations_verified && lang !== "en";
      const img = MP.recipeImage(recipe);
      const vid = MP.youtubeId(recipe.youtube_url);
      const closeLabel = lang === "tl" ? "Isara ang video" : lang === "il" ? "Isarrek ti video" : "Close video";
      return (
        <article className="bg-white rounded-2xl overflow-hidden shadow-sm ring-1 ring-black/5">
          {/* Inline player — shown when playing (both noImage and full modes) */}
          {playing && vid && (
            <div style={{ aspectRatio: "16/9" }}>
              <iframe
                src={`https://www.youtube.com/embed/${vid}?autoplay=1&rel=0`}
                className="w-full h-full"
                allow="autoplay; encrypted-media"
                allowFullScreen
              />
            </div>
          )}
          {/* Thumbnail — only in full (non-accordion) mode when not playing */}
          {!playing && !noImage && img && (
            <button onClick={() => vid && setPlaying(true)}
              className={`block w-full relative group ${vid ? "cursor-pointer" : "cursor-default"}`}>
              <img src={img} alt={name} className="w-full h-44 object-cover"
                {...MP.imgFallbackHandlers(recipe)} />
              {vid && (
                <div className="absolute inset-0 flex items-center justify-center bg-black/20 opacity-0 group-hover:opacity-100 transition">
                  <div className="bg-black/60 text-white rounded-full px-4 py-2 text-sm font-medium">▶ {t(lang, "watch")}</div>
                </div>
              )}
            </button>
          )}
          <div className="p-5">
            {componentType ? (
              <div className="flex items-center gap-2 text-warm text-xs uppercase tracking-wide mb-1">
                <span className="text-base">{COMPONENT_ICONS[componentType] || ""}</span>
                <span>{COMPONENT_LABELS[componentType] || componentType}</span>
              </div>
            ) : recipe.cuisine && (
              <div className="text-warm text-xs uppercase tracking-wide mb-1">{recipe.cuisine}</div>
            )}
            <h2 className="font-display text-2xl leading-tight">{name}</h2>
            {showEng && <div className="text-sm text-warm/80 italic mt-0.5">{recipe.name}</div>}
            {vid && !playing && (
              <button onClick={() => setPlaying(true)}
                className="mt-3 inline-flex items-center gap-2 bg-terra text-cream px-4 py-2 rounded-full text-sm font-medium">
                ▶ {t(lang, "watch")}
              </button>
            )}
            {!vid && !playing && (
              <div className="mt-3 text-sm text-warm/50 italic">No video added yet</div>
            )}
            {playing && (
              <button onClick={() => setPlaying(false)}
                className="mt-3 inline-flex items-center gap-2 bg-warm text-cream px-4 py-2 rounded-full text-sm font-medium">
                ✕ {closeLabel}
              </button>
            )}
            <h3 className="mt-5 font-display text-lg">{t(lang, "ingredients")}</h3>
            <ul className="mt-1 divide-y divide-sand/50">
              {(recipe.ingredients || []).map((ing, i) => {
                const amt = ing.amount != null ? Number(Number(ing.amount).toFixed(2)) : "";
                return (
                  <li key={i} className="flex gap-3 py-2">
                    <span className="num font-semibold text-ink min-w-[5rem] shrink-0">{amt !== "" ? amt : ""} {ing.unit || ""}</span>
                    <span className="text-ink/80">{ing.item || ""}</span>
                  </li>
                );
              })}
            </ul>
            <h3 className="mt-5 font-display text-lg">{t(lang, "steps")}</h3>
            <ol className="mt-2 space-y-4">
              {(recipe.steps || []).map((s, i) => (
                <li key={s.step ?? i} className="flex gap-3 items-start">
                  <div className="shrink-0 w-8 h-8 rounded-full bg-terra text-cream flex items-center justify-center font-display text-base font-semibold leading-none step-num mt-0.5">
                    {s.step ?? i + 1}
                  </div>
                  <div className="leading-relaxed text-sm pt-1.5">
                    <div>{MP.i18n.stepText(s, lang)}</div>
                    {showEng && <div className="text-warm/70 italic text-sm mt-0.5">{s.instruction}</div>}
                  </div>
                </li>
              ))}
            </ol>
            {!recipe.translations_verified && lang !== "en" && (
              <button onClick={() => onVerify(recipe.id)} className="mt-4 text-xs underline text-warm/80">
                ✓ {t(lang, "verify")}
              </button>
            )}
          </div>
        </article>
      );
    }

    // Accordion item: summary row that expands to show full RecipeCard
    function ComponentAccordion({ comp, recipe, mealServes, lang, onVerify, defaultOpen }) {
      const [open, setOpen] = useState(defaultOpen || false);
      const name = MP.i18n.recipeName(recipe, lang);
      const img = MP.recipeImage(recipe);
      const scaled = {
        ...recipe,
        ingredients: (recipe.ingredients || []).map((i) => {
          try { return MP.scale(i, mealServes, recipe.serves_base || 4); } catch(e) { return i; }
        }),
      };
      const vid = MP.youtubeId(recipe.youtube_url);
      return (
        <div className={`rounded-2xl overflow-hidden ${open ? "ring-2 ring-terra/40" : "ring-1 ring-black/5"} bg-white`}>
          {/* Header — div not button so <a> video link can live inside without invalid nesting */}
          <div onClick={() => setOpen((o) => !o)} className="cursor-pointer select-none">
            {/* Image banner — full width, 96px tall */}
            {img && (
              <div className="relative w-full overflow-hidden" style={{ height: "96px" }}>
                <img src={img} alt="" className="w-full h-full object-cover"
                  {...MP.imgFallbackHandlers(recipe)} />
              </div>
            )}
            <div className="flex items-center justify-between px-4 py-3 gap-2">
              <div className="flex-1 min-w-0">
                <div className="font-display text-xl leading-snug">{name}</div>
                <div className="text-sm text-warm/60 mt-0.5">{open ? t(lang, "tapToClose") : t(lang, "tapToCook")}</div>
              </div>
              <div className="flex items-center gap-2 shrink-0">
                {/* ▶ Watch button — visible without opening; stops propagation so it doesn't toggle the accordion */}
                {vid && !open && (
                  <a href={recipe.youtube_url} target="_blank" rel="noopener"
                    onClick={(e) => e.stopPropagation()}
                    className="flex items-center gap-1 bg-terra text-cream px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap">
                    ▶ {t(lang, "watch")}
                  </a>
                )}
                <span className="text-warm/40 text-2xl leading-none" style={{ transform: open ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>›</span>
              </div>
            </div>
          </div>
          {open && (
            <div className="border-t border-sand/60">
              <RecipeCard recipe={scaled} componentType={comp} lang={lang} onVerify={onVerify} noImage />
            </div>
          )}
        </div>
      );
    }

    const SOURCE_LABEL = (lang) => ({ "wet-market": t(lang, "fromWetMarket"), "supermarket": t(lang, "fromSupermarket") });
    const SOURCE_ORDER = ["wet-market", "supermarket"];

    function MealShoppingList({ mealType, day, recipesById, planServes, lang, nowMin }) {
      const [open, setOpen] = useState(false);
      const [checked, setChecked] = useState({});
      const mealServes = day[mealType + "_serves"] || planServes;
      const ids = MP.getMealRecipeIds(day, mealType);

      const groups = useMemo(() => {
        const byKey = new Map();
        for (const id of ids) {
          const r = recipesById[id]; if (!r) continue;
          for (const ing of r.ingredients || []) {
            if (ing.category === "pantry") continue;
            MP.aggregateIngredient(byKey, ing, mealServes, r.serves_base, ing.source || "supermarket", ing.category);
          }
        }
        const result = {};
        for (const entry of byKey.values()) {
          const src = entry.source || "supermarket";
          if (!result[src]) result[src] = [];
          const { amount, unit } = MP.units.fromCanonical(entry.family, entry.total);
          const amtStr = amount % 1 === 0 ? String(amount) : amount.toFixed(1);
          result[src].push({ item: entry.item, display: `${amtStr} ${unit}` });
        }
        return result;
      }, [ids.join(","), mealServes]);

      // Hide once the meal's serve time has passed, or once there's nothing to show.
      // (Checked after the hook above, never before. Early returns ahead of a hook
      // change how many hooks run between renders and crash React.)
      if (nowMin != null) {
        const serveMin = MP.schedule.parseHM(day[mealType + "_time"] || MP.schedule.defaultMealTime(mealType));
        if (serveMin < nowMin) return null;
      }
      const totalItems = Object.values(groups).reduce((n, g) => n + g.length, 0);
      if (totalItems === 0) return null;

      const toggle = (key) => setChecked((c) => ({ ...c, [key]: !c[key] }));
      const checkedCount = Object.values(checked).filter(Boolean).length;

      return (
        <div className="rounded-2xl overflow-hidden ring-1 ring-sand bg-sand/40">
          <button onClick={() => setOpen((o) => !o)}
            className="w-full flex items-center justify-between px-4 py-3 text-left outline-none focus:outline-none">
            <div className="flex items-center gap-3 flex-1 min-w-0">
              <span className="text-2xl shrink-0">🛍️</span>
              <div>
                <div className="font-display text-lg text-ink">{t(lang, "shopping")}</div>
                <div className="text-sm text-warm/70 mt-0.5">
                  {checkedCount > 0 ? `${checkedCount} ${t(lang, "of")} ${totalItems} ${t(lang, "bought")}` : `${totalItems} ${lang === "tl" ? "na item" : `item${totalItems !== 1 ? "s" : ""}`}`}{t(lang, "tapToSee")}
                </div>
              </div>
            </div>
            <span className="text-warm/40 text-2xl shrink-0 ml-2 leading-none" style={{ transform: open ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>›</span>
          </button>
          {open && (
            <div className="border-t border-sand divide-y divide-sand/60">
              {SOURCE_ORDER.filter((s) => groups[s]?.length).map((src) => (
                <div key={src} className="px-4 py-3">
                  <div className="text-xs font-semibold text-warm/70 uppercase tracking-wide mb-2">{SOURCE_LABEL(lang)[src]}</div>
                  <ul className="space-y-1.5">
                    {[...groups[src]]
                      .sort((a, b) => (checked[a.item] ? 1 : 0) - (checked[b.item] ? 1 : 0))
                      .map((it) => {
                        const isChecked = !!checked[it.item];
                        return (
                          <li key={it.item} className="flex items-center gap-3 text-sm">
                            <button
                              onClick={(e) => { e.stopPropagation(); toggle(it.item); }}
                              className={`shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center transition ${
                                isChecked ? "bg-sage border-sage text-white" : "border-warm/30 bg-white"
                              }`}>
                              {isChecked && <span className="text-xs font-bold leading-none">✓</span>}
                            </button>
                            <span className={`flex-1 ${isChecked ? "line-through text-warm/40" : ""}`}>{it.item}</span>
                            <span className={`num tabular-nums text-xs ${isChecked ? "text-warm/30" : "text-warm/70"}`}>{it.display}</span>
                          </li>
                        );
                      })}
                  </ul>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Renders a full meal: timing header + summary + accordion per component
    function MealSection({ mealType, day, recipesById, planServes, lang, onVerify, nowMin }) {
      const mealObj = MP.getMealObj(day, mealType);
      const mealTime = day[mealType + "_time"];
      const mealServes = day[mealType + "_serves"] || planServes;
      const [localServes, setLocalServes] = useState(null);
      const effServes = localServes || mealServes;
      const eatingLabel = ({ en: "Eating", tl: "Kakain", il: "Mangan" })[lang] || "Eating";
      const ids = MP.getMealRecipeIds(day, mealType);
      if (!ids.length) return null;

      const serveMin = MP.schedule.parseHM(mealTime || MP.schedule.defaultMealTime(mealType));
      const servedAtLabel = MP.schedule.fmtTime(serveMin);
      let earliestStart = Infinity;
      let hasOvernightDep = false;
      for (const id of ids) {
        const r = recipesById[id]; if (!r) continue;
        const sched = MP.schedule.forMeal(mealType, r, { mealTime, buffer: HELPER_BUFFER });
        if (sched.startMin < earliestStart) earliestStart = sched.startMin;
        if (sched.hasOvernightDep) hasOvernightDep = true;
      }
      const startLabel = isFinite(earliestStart) ? MP.schedule.fmtTime(earliestStart) : "—";

      return (
        <div className="space-y-3">
          {/* Timing: one quiet line, the dish list is the hero of the page */}
          {hasOvernightDep ? (
            <div className="bg-warm text-cream px-4 py-3 rounded-xl">
              <div className="text-sm font-semibold opacity-90">{t(lang, "overnightWarn")}</div>
              <div className="text-sm mt-1 opacity-80">{t(lang, "serveBy")} <span className="num font-bold">{servedAtLabel}</span></div>
            </div>
          ) : (
            <div className="flex items-center gap-2 bg-sand/70 rounded-xl px-3.5 py-2.5 text-sm text-ink/80">
              <span>⏱</span>
              <span>{t(lang, "start")} <span className="num font-bold text-terra">{startLabel}</span></span>
              <span className="text-warm/50">·</span>
              <span>{t(lang, "serveBy")} <span className="num font-bold">{servedAtLabel}</span></span>
            </div>
          )}
          {/* Serves adjustment */}
          <div className="flex items-center justify-between px-1 py-1">
            <span className="text-xs text-warm">{eatingLabel}: {effServes} {effServes === 1 ? "person" : "people"}</span>
            <div className="flex items-center gap-1.5">
              <button onClick={() => setLocalServes(Math.max(1, effServes - 1))}
                className="w-7 h-7 rounded-full bg-sand text-warm text-sm font-semibold flex items-center justify-center active:bg-warm/20">-</button>
              <button onClick={() => setLocalServes(Math.min(12, effServes + 1))}
                className="w-7 h-7 rounded-full bg-sand text-warm text-sm font-semibold flex items-center justify-center active:bg-warm/20">+</button>
            </div>
          </div>
          {/* Shopping list first — buy before cooking */}
          <MealShoppingList mealType={mealType} day={day} recipesById={recipesById} planServes={effServes} lang={lang} nowMin={nowMin} />
          {/* Recipes: one accordion per recipe, all closed until Leni taps one */}
          <div className="text-sm font-semibold text-warm/60 px-1 pt-2">{t(lang, "howToCook")}</div>
          {ALL_COMPONENTS.flatMap((comp) => {
            const ids = mealObj[comp]; // array
            return ids.map((id) => {
              const r = recipesById[id]; if (!r) return null;
              return (
                <ComponentAccordion
                  key={`${comp}-${id}`} comp={comp} recipe={r}
                  mealServes={effServes} lang={lang} onVerify={onVerify}
                />
              );
            }).filter(Boolean);
          })}
        </div>
      );
    }

    function PrepTomorrow({ tomorrowDay, recipesById, lang }) {
      if (!tomorrowDay) return null;
      const items = [];
      for (const meal of ["breakfast", "lunch", "dinner"]) {
        for (const id of MP.getMealRecipeIds(tomorrowDay, meal)) {
          const r = recipesById[id]; if (!r) continue;
          for (const d of r.dependencies || []) {
            const mealName = MP.i18n.meals[lang][meal];
            const recipeName = MP.i18n.recipeName(r, lang);
            if (d.type === "defrost" && d.hours_before >= 12)
              items.push({ icon: "❄️", text: lang === "tl"
                ? `Ilabas ang ${recipeName} sa freezer ngayon, para sa ${mealName} bukas.`
                : `Take ${recipeName} out of the freezer today, for tomorrow's ${mealName}.` });
            if (d.type === "marinate" && d.hours_before >= 8)
              items.push({ icon: "🧴", text: lang === "tl"
                ? `Simulan ang pag-marinate ng ${recipeName} bago ka umuwi, para sa ${mealName} bukas.`
                : `Start marinating the ${recipeName} before you go home, for tomorrow's ${mealName}.` });
          }
        }
      }
      if (items.length === 0) return null;
      return (
        <section className="rounded-2xl overflow-hidden shadow-sm mt-4">
          <div className="bg-warm text-cream px-5 py-4">
            <div className="font-display text-xl">{t(lang, "beforeSleep")}</div>
            <p className="text-sm opacity-80 mt-1">{t(lang, "prepInstructions")}</p>
          </div>
          <div className="bg-sand/60 divide-y divide-warm/10">
            {items.map((it, i) => (
              <div key={i} className="flex items-start gap-3 px-5 py-4">
                <span className="text-2xl leading-none mt-0.5">{it.icon}</span>
                <p className="text-base leading-relaxed">{it.text}</p>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function ComingUpView({ plan, upcoming, recipesById, today, lang, onOpen }) {
      const weekFloor = MP.date.mondayOf(today);
      const allDays = [];
      const seen = new Set();
      const addPlan = (p) => {
        if (!p) return;
        for (const d of p.days || []) {
          if (d.date < weekFloor) continue;
          if (seen.has(d.date)) continue;
          seen.add(d.date);
          allDays.push({ ...d, _planServes: p.serves || 4 });
        }
      };
      addPlan(plan);
      for (const p of upcoming || []) addPlan(p);
      allDays.sort((a, b) => a.date.localeCompare(b.date));

      if (allDays.length === 0) {
        return <p className="text-warm text-sm">{t(lang, "nothingPlanned")}</p>;
      }

      const groups = {};
      for (const d of allDays) {
        const wk = MP.date.mondayOf(d.date);
        (groups[wk] = groups[wk] || []).push(d);
      }
      const weekKeys = Object.keys(groups).sort();
      const todayMonday = MP.date.mondayOf(today);

      return (
        <div className="space-y-6">
          {weekKeys.map((wk) => {
            const label = wk === todayMonday ? t(lang, "thisWeek") :
                          wk === MP.date.addDays(todayMonday, 7) ? t(lang, "nextWeek") :
                          `${t(lang, "weekOf")} ${MP.date.prettyDate(wk, lang)}`;
            return (
              <section key={wk}>
                <h3 className="font-display text-xl text-terra mb-2">{label}</h3>
                <div className="space-y-3">
                  {groups[wk].map((d) => {
                    const isToday = d.date === today;
                    const isPast = d.date < today;
                    return (
                      <div key={d.date} className={`rounded-xl p-4 ring-1 ${
                        isToday ? "bg-white ring-terra/40" :
                        isPast ? "bg-white ring-black/5 opacity-60" :
                        "bg-white ring-black/5"
                      }`}>
                        <div className="flex items-baseline justify-between">
                          <div>
                            <div className="font-display text-lg leading-tight">
                              {MP.date.dayName(d.date, lang)}
                              {isToday && <span className="text-terra"> · {t(lang, "today")}</span>}
                            </div>
                            <div className="text-xs text-warm num mt-0.5">{MP.date.prettyDate(d.date, lang)}</div>
                          </div>
                          {isPast && <span className="text-xs text-warm/50 italic">{t(lang, "doneLbl")}</span>}
                        </div>
                        <ul className="mt-2 space-y-1 text-sm">
                          {["breakfast","lunch","dinner"].map((m) => {
                            const ids = MP.getMealRecipeIds(d, m);
                            if (!ids.length) return (
                              <li key={m} className="flex justify-between text-warm/50 text-sm">
                                <span className="uppercase tracking-wide text-xs">{MP.i18n.meals[lang][m]}</span>
                                <span className="italic">{t(lang, "notPlanned")}</span>
                              </li>
                            );
                            const mealObj = MP.getMealObj(d, m);
                            const names = ALL_COMPONENTS.flatMap((c) => {
                              const ids = mealObj[c]; // array
                              return ids.map((id) => {
                                const r = recipesById[id];
                                return r ? `${COMPONENT_ICONS[c]} ${MP.i18n.recipeName(r, lang)}` : null;
                              }).filter(Boolean);
                            });
                            const time = d[m + "_time"] || MP.schedule.defaultMealTime(m);
                            const allDeps = ids.flatMap((id) => (recipesById[id]?.dependencies || []));
                            const hasLongDep = allDeps.some((dep) => dep.hours_before >= 12);
                            const hasMarinate = allDeps.some((dep) => dep.type === "marinate" && dep.hours_before < 12);
                            return (
                              <li key={m}>
                                <button
                                  onClick={() => onOpen && onOpen({ mealType: m, day: d })}
                                  className="w-full flex items-start justify-between gap-2 text-left hover:bg-terra/5 rounded-lg px-1 py-1 transition">
                                  <span className="uppercase tracking-wide text-xs text-warm min-w-[5.5rem] mt-0.5">{m}</span>
                                  <span className="flex-1 text-sm leading-snug underline decoration-terra/30 underline-offset-2">
                                    {names.join(" · ")}
                                    {hasLongDep && <span className="ml-1 text-xs">🌙</span>}
                                    {hasMarinate && <span className="ml-1 text-xs">🧂</span>}
                                  </span>
                                  <span className="text-xs text-warm num shrink-0 mt-0.5">{MP.schedule.fmtTime(MP.schedule.parseHM(time))}</span>
                                </button>
                              </li>
                            );
                          })}
                        </ul>
                      </div>
                    );
                  })}
                </div>
              </section>
            );
          })}
        </div>
      );
    }

    const HKTVMALL_SEARCH = (q) => `https://www.hktvmall.com/hktv/en/main?q=${encodeURIComponent(q)}&area=search_results`;

    function ItemRow({ it, has, onTick, srcLabel }) {
      const amt = it.amount != null ? Number(Number(it.amount).toFixed(2)) : "";
      return (
        <li className={`flex items-center gap-3 text-sm px-4 py-3 transition ${has ? "bg-sage/5" : "bg-white"}`}>
          <button
            aria-label={has ? "Unmark" : "Mark as bought"}
            onClick={onTick}
            className={`shrink-0 w-7 h-7 rounded-full border-2 flex items-center justify-center transition ${
              has ? "bg-sage border-sage text-white" : "border-warm/30 bg-white"
            }`}>
            {has && <span className="text-sm font-bold leading-none">✓</span>}
          </button>
          <span className="num text-warm/70 min-w-[4.5rem] text-xs">{amt} {it.unit || ""}</span>
          <span className={`flex-1 ${has ? "line-through text-warm/50" : ""}`}>{it.item}</span>
          {srcLabel && <span className="text-xs text-warm/50 shrink-0">{srcLabel}</span>}
          <a href={HKTVMALL_SEARCH(it.item)} target="_blank" rel="noopener"
            title="Search on HKTVmall"
            className="shrink-0 text-warm/25 hover:text-terra transition text-base leading-none">
            📦
          </a>
        </li>
      );
    }

    function ShoppingView({ recipes, plan, pantry, onToggle, lang, sources, extras, onToggleExtra }) {
      const groups = MP.buildShoppingList(recipes, plan, sources);
      const [filter, setFilter] = useState(() => sessionStorage.getItem("mpShopFilter") || "all");
      const [search, setSearch] = useState("");

      const sourceLabels = {
        "wet-market": "🥬 Wet market", "supermarket": "🛒 Fusion / Marketplace",
        "hktvmall": "📦 HKTVmall", "other": "Other",
      };
      const categoryLabels = {
        meat: "Meat & Seafood", produce: "Vegetables & Fruit",
        dairy: "Dairy & Eggs", pantry: "Pantry & Dry Goods",
        bakery: "Bread & Bakery", frozen: "Frozen", other: "Other",
      };
      const sourceOrder = ["wet-market", "supermarket", "hktvmall", "other"];
      const key = (it) => (it.item || "").toLowerCase().trim();

      function updateFilter(val) {
        setFilter(val);
        sessionStorage.setItem("mpShopFilter", val);
      }

      // Counts per store
      const counts = {};
      for (const src of sourceOrder) {
        const g = groups[src];
        if (!g) continue;
        let bought = 0, total = 0;
        for (const items of Object.values(g)) for (const it of items) {
          total++; if (pantry[key(it)]) bought++;
        }
        counts[src] = { bought, total, remaining: total - bought };
      }
      const extrasRemaining = (extras || []).filter((x) => !x.done).length;
      const extrasTotal = (extras || []).length;
      const extrasBought = extrasTotal - extrasRemaining;

      // Overall totals
      const overallTotal = Object.values(counts).reduce((s, c) => s + c.total, 0) + extrasTotal;
      const overallBought = Object.values(counts).reduce((s, c) => s + c.bought, 0) + extrasBought;
      const overallRemaining = overallTotal - overallBought;

      const showSource = (src) => filter === "all" || filter === src;
      const showExtras = extrasTotal > 0 && (filter === "all" || filter === "extras");

      // Search
      const searchActive = search.trim().length > 0;
      let searchResults = [];
      if (searchActive) {
        const q = search.toLowerCase();
        for (const src of sourceOrder) {
          const g = groups[src];
          if (!g) continue;
          for (const [cat, items] of Object.entries(g)) {
            for (const it of items) {
              if ((it.item || "").toLowerCase().includes(q))
                searchResults.push({ ...it, _src: src, _cat: cat });
            }
          }
        }
      }

      return (
        <div>
          {/* Summary card */}
          {!searchActive && overallTotal > 0 && (
            <div className="bg-white rounded-2xl p-4 mb-4 shadow-sm ring-1 ring-black/5">
              <div className="flex items-baseline justify-between mb-3">
                <h3 className="font-display text-lg">Shopping summary</h3>
                <span className="num text-sm text-warm">{overallBought} of {overallTotal} done</span>
              </div>
              {/* Progress bar */}
              <div className="h-2 bg-sand rounded-full overflow-hidden mb-3">
                <div
                  className="h-full bg-sage rounded-full transition-all"
                  style={{ width: overallTotal ? `${(overallBought / overallTotal) * 100}%` : "0%" }}
                />
              </div>
              {/* Per-store breakdown */}
              <ul className="space-y-1.5">
                {sourceOrder.map((src) => {
                  const c = counts[src]; if (!c || c.total === 0) return null;
                  const allDone = c.remaining === 0;
                  return (
                    <li key={src} className="flex items-center justify-between text-sm">
                      <span className={allDone ? "text-sage" : "text-ink"}>{sourceLabels[src]}</span>
                      <span className={`num text-xs ${allDone ? "text-sage font-semibold" : "text-warm"}`}>
                        {allDone ? "✓ all done" : `${c.bought} of ${c.total} · ${c.remaining} left`}
                      </span>
                    </li>
                  );
                })}
                {extrasTotal > 0 && (
                  <li className="flex items-center justify-between text-sm">
                    <span className={extrasRemaining === 0 ? "text-sage" : "text-ink"}>➕ Extras</span>
                    <span className={`num text-xs ${extrasRemaining === 0 ? "text-sage font-semibold" : "text-warm"}`}>
                      {extrasRemaining === 0 ? "✓ all done" : `${extrasBought} of ${extrasTotal} · ${extrasRemaining} left`}
                    </span>
                  </li>
                )}
              </ul>
            </div>
          )}

          {/* Search */}
          <div className="relative mb-3">
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Search items…"
              className="w-full rounded-xl border border-warm/20 bg-white px-4 py-2.5 pr-10 text-sm" />
            {search && <button onClick={() => setSearch("")} className="absolute right-3 top-1/2 -translate-y-1/2 text-warm">×</button>}
          </div>

          {/* Store filter nav */}
          {!searchActive && (
            <nav className="sticky top-11 z-10 -mx-4 px-4 py-2 mb-4 bg-cream/95 backdrop-blur border-b border-warm/10 flex flex-wrap gap-2">
              <button onClick={() => updateFilter("all")}
                className={`px-3 py-1.5 rounded-full text-sm ${filter === "all" ? "bg-ink text-cream" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                All
              </button>
              {sourceOrder.map((src) => {
                if (!counts[src]) return null;
                const active = filter === src;
                const { remaining } = counts[src];
                return (
                  <button key={src} onClick={() => updateFilter(src)}
                    className={`px-3 py-1.5 rounded-full text-sm ${active ? "bg-ink text-cream" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                    {sourceLabels[src]}
                    {remaining > 0 && <span className="ml-1.5 num text-xs opacity-70">{remaining}</span>}
                    {remaining === 0 && counts[src].total > 0 && <span className="ml-1.5 text-sage text-xs">✓</span>}
                  </button>
                );
              })}
              {extrasTotal > 0 && (
                <button onClick={() => updateFilter("extras")}
                  className={`px-3 py-1.5 rounded-full text-sm ${filter === "extras" ? "bg-ink text-cream" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                  ➕ Extras {extrasRemaining > 0 && <span className="ml-1 num text-xs opacity-70">{extrasRemaining}</span>}
                  {extrasRemaining === 0 && extrasTotal > 0 && <span className="ml-1 text-sage text-xs">✓</span>}
                </button>
              )}
            </nav>
          )}

          {/* Search results */}
          {searchActive && (
            <div className="mb-6">
              <div className="text-xs text-warm uppercase tracking-wide mb-2">Results for "{search}"</div>
              {searchResults.length === 0 && <p className="text-sm text-warm/60 italic">No items found.</p>}
              <ul className="rounded-2xl overflow-hidden divide-y divide-sand space-y-0 shadow-sm ring-1 ring-black/5">
                {searchResults.map((it, i) => {
                  const has = !!pantry[key(it)];
                  return <ItemRow key={i} it={it} has={has}
                    onTick={() => onToggle(key(it), !has)}
                    srcLabel={sourceLabels[it._src]} />;
                })}
              </ul>
            </div>
          )}

          {/* Normal view */}
          {!searchActive && (
            <>
              {showExtras && (
                <section className="mb-6">
                  <h3 className="font-display text-lg mb-2">➕ Extras</h3>
                  {(() => {
                    const unchecked = (extras || []).filter((x) => !x.done);
                    const checked = (extras || []).filter((x) => x.done);
                    return (
                      <div className="rounded-2xl overflow-hidden shadow-sm ring-1 ring-black/5 divide-y divide-sand">
                        {unchecked.map((x) => (
                          <li key={x.id} className="list-none flex items-center gap-3 text-sm px-4 py-3 bg-white">
                            <button onClick={() => onToggleExtra && onToggleExtra(x.id, true)}
                              className="shrink-0 w-7 h-7 rounded-full border-2 border-warm/30 bg-white flex items-center justify-center" />
                            <span className="flex-1">{x.item}</span>
                            <span className="text-xs text-warm/50">{sourceLabels[x.source] || x.source}</span>
                          </li>
                        ))}
                        {checked.length > 0 && (
                          <>
                            <div className="px-4 py-2 bg-sage/10 text-xs font-semibold text-sage uppercase tracking-wide">
                              Got ✓ — {checked.length} item{checked.length > 1 ? "s" : ""}
                            </div>
                            {checked.map((x) => (
                              <li key={x.id} className="list-none flex items-center gap-3 text-sm px-4 py-3 bg-sage/5">
                                <button onClick={() => onToggleExtra && onToggleExtra(x.id, false)}
                                  className="shrink-0 w-7 h-7 rounded-full border-2 bg-sage border-sage text-white flex items-center justify-center">
                                  <span className="text-sm font-bold leading-none">✓</span>
                                </button>
                                <span className="flex-1 line-through text-warm/50">{x.item}</span>
                                <span className="text-xs text-warm/50">{sourceLabels[x.source] || x.source}</span>
                              </li>
                            ))}
                          </>
                        )}
                        {unchecked.length === 0 && checked.length === 0 && (
                          <li className="list-none text-sm text-warm/50 px-4 py-3 bg-white">No extras added.</li>
                        )}
                      </div>
                    );
                  })()}
                </section>
              )}

              {sourceOrder.map((src) => {
                const g = groups[src];
                if (!g || !showSource(src)) return null;
                // Collect all items across categories, split bought/needed
                const allNeeded = [], allBought = [], catMap = {};
                for (const [cat, items] of Object.entries(g)) {
                  for (const it of items) {
                    const has = !!pantry[key(it)];
                    const entry = { ...it, _cat: cat };
                    if (has) allBought.push(entry); else allNeeded.push(entry);
                  }
                  catMap[cat] = true;
                }
                if (allNeeded.length === 0 && allBought.length === 0) return null;
                return (
                  <section key={src} className="mb-6">
                    <div className="flex items-baseline justify-between mb-2">
                      <h3 className="font-display text-lg">{sourceLabels[src] || src}</h3>
                      {allBought.length > 0 && (
                        <span className="text-xs text-sage num">{allBought.length} of {allNeeded.length + allBought.length} got</span>
                      )}
                    </div>
                    <div className="rounded-2xl overflow-hidden shadow-sm ring-1 ring-black/5 divide-y divide-sand">
                      {/* Items still needed — grouped by category */}
                      {Object.keys(catMap).map((cat) => {
                        const needed = allNeeded.filter((it) => it._cat === cat);
                        if (needed.length === 0) return null;
                        return (
                          <React.Fragment key={cat}>
                            <div className="px-4 py-2 bg-sand/50 text-xs font-semibold uppercase tracking-wide text-warm">
                              {categoryLabels[cat] || cat}
                            </div>
                            {needed.map((it, i) => (
                              <ItemRow key={i} it={it} has={false}
                                onTick={() => onToggle(key(it), true)} />
                            ))}
                          </React.Fragment>
                        );
                      })}
                      {/* Got section — always visible when there are bought items */}
                      {allBought.length > 0 && (
                        <>
                          <div className="px-4 py-2 bg-sage/10 text-xs font-semibold text-sage uppercase tracking-wide">
                            Got ✓ — {allBought.length} item{allBought.length > 1 ? "s" : ""}
                          </div>
                          {allBought.map((it, i) => (
                            <ItemRow key={i} it={it} has={true}
                              onTick={() => onToggle(key(it), false)} />
                          ))}
                        </>
                      )}
                      {/* All done state */}
                      {allNeeded.length === 0 && allBought.length > 0 && (
                        <div className="px-4 py-3 bg-sage/5 text-sm text-sage font-medium text-center">
                          ✓ All done at {sourceLabels[src]}
                        </div>
                      )}
                    </div>
                  </section>
                );
              })}
            </>
          )}
        </div>
      );
    }

    // Full recipe library, browsable and searchable, independent of what's planned.
    // Buckets derived from each recipe's free-form `tags` array. Not every recipe carries
    // a tag for every bucket, so recipes with no match just fall out when that filter is used.
    // They still show up under "All". Ilocano labels are a best effort, lower confidence than
    // Tagalog since it's a much lower-resource language, worth a native-speaker check.
    function pickLabel(label, lang) {
      return (label && (label[lang] || label.en)) || "";
    }

    const FILTER_TITLES = {
      protein: { en: "Protein", tl: "Protina", il: "Protina" },
      style: { en: "Cooking style", tl: "Paraan ng Pagluluto", il: "Pamay-an ti Panagluto" },
      time: { en: "Prep time", tl: "Oras ng Paghahanda", il: "Oras ti Panagisagana" },
    };

    const PROTEIN_FILTERS = [
      { key: "chicken", icon: "🐔", label: { en: "Chicken", tl: "Manok", il: "Manok" }, tags: ["chicken"] },
      { key: "beef", icon: "🥩", label: { en: "Beef", tl: "Baka", il: "Baka" }, tags: ["beef", "steak"] },
      { key: "pork", icon: "🥓", label: { en: "Pork", tl: "Baboy", il: "Baboy" }, tags: ["pork", "bacon", "sausage"] },
      { key: "lamb", icon: "🐑", label: { en: "Lamb", tl: "Tupa", il: "Karnero" }, tags: ["lamb"] },
      { key: "seafood", icon: "🐟", label: { en: "Seafood", tl: "Pagkaing-dagat", il: "Sidaen ti Baybay" }, tags: ["fish", "salmon", "shrimp", "squid", "seafood"] },
      { key: "egg", icon: "🥚", label: { en: "Egg", tl: "Itlog", il: "Itlog" }, tags: ["egg", "eggs"] },
      { key: "vegetarian", icon: "🌱", label: { en: "Vegetarian", tl: "Vegetarian", il: "Vegetarian" }, tags: ["vegetarian"] },

    const STYLE_FILTERS = [
      { key: "roasted", label: { en: "Roasted", tl: "Hinurnong Inihaw", il: "Naihawan iti Hurno" }, tags: ["roast"] },
      { key: "baked", label: { en: "Baked", tl: "Hinurno", il: "Naihurno" }, tags: ["baked", "oven"] },
      { key: "grilled", label: { en: "Grilled", tl: "Inihaw", il: "Naihaw" }, tags: ["grilled", "skewers"] },
      { key: "fried", label: { en: "Fried", tl: "Prito", il: "Naprito" }, tags: ["fried", "pan-fried", "crispy"] },
      { key: "stir-fry", label: { en: "Stir-fry", tl: "Ginisa", il: "Naginisa" }, tags: ["stir-fry"] },
      { key: "steamed", label: { en: "Steamed", tl: "Pinasingawan", il: "Napasingaw" }, tags: ["steamed"] },

      { key: "soup", label: { en: "Soup", tl: "Sabaw", il: "Digo" }, tags: ["soup"] },
      { key: "no-cook", label: { en: "No-cook", tl: "Walang Lutuin", il: "Saan a Masapul ti Panagluto" }, tags: ["no-cook"] },
    ];
    const TIME_FILTERS = [
      { key: "under30", label: { en: "Under 30 min", tl: "Wala pang 30 minuto", il: "Basbassit ngem 30 minuto" }, test: (mins) => mins < 30 },
      { key: "3060", label: { en: "30–60 min", tl: "30–60 minuto", il: "30–60 minuto" }, test: (mins) => mins >= 30 && mins <= 60 },
      { key: "over60", label: { en: "Over 1 hour", tl: "Higit sa 1 oras", il: "Nasursurok ngem 1 oras" }, test: (mins) => mins > 60 },
    ];
    const FILTER_ALL_LABELS = {
      protein: { en: "All proteins", tl: "Lahat ng protina", il: "Amin a protina" },
      style: { en: "All styles", tl: "Lahat ng istilo", il: "Amin a pamay-an" },
      time: { en: "Any time", tl: "Kahit anong oras", il: "Aniaman nga oras" },
    };

    function FilterRow({ title, active, onSelect, allLabel, options, labelOf, keyOf }) {
      return (
        <div className="mb-3">
          <div className="text-[11px] font-semibold uppercase tracking-wide text-warm/60 mb-1.5">{title}</div>
          <div className="flex flex-wrap gap-2">
            <button onClick={() => onSelect("all")}
              className={`px-3 py-1.5 rounded-full text-sm ${active === "all" ? "bg-terra text-cream" : "bg-white text-warm ring-1 ring-warm/20"}`}>
              {allLabel}
            </button>
            {options.map((opt) => (
              <button key={keyOf(opt)} onClick={() => onSelect(keyOf(opt))}
                className={`px-3 py-1.5 rounded-full text-sm ${active === keyOf(opt) ? "bg-terra text-cream" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                {labelOf(opt)}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function RecipesView({ recipes, lang, onOpen }) {
      const [q, setQ] = useState("");
      const [protein, setProtein] = useState("all");
      const [style, setStyle] = useState("all");
      const [timeBucket, setTimeBucket] = useState("all");

      const filtered = useMemo(() => {
        const query = q.trim().toLowerCase();
        const proteinDef = PROTEIN_FILTERS.find((p) => p.key === protein);
        const styleDef = STYLE_FILTERS.find((s) => s.key === style);
        const timeDef = TIME_FILTERS.find((tb) => tb.key === timeBucket);
        return (recipes || [])
          .filter((r) => {
            if (!proteinDef) return true;
            const tags = new Set(r.tags || []);
            return proteinDef.tags.some((tg) => tags.has(tg));
          })
          .filter((r) => {
            if (!styleDef) return true;
            const tags = new Set(r.tags || []);
            return styleDef.tags.some((tg) => tags.has(tg));
          })
          .filter((r) => {
            if (!timeDef) return true;
            const mins = (r.prep_time_mins || 0) + (r.cook_time_mins || 0);
            return timeDef.test(mins);
          })
          .filter((r) => {
            if (!query) return true;
            const name = MP.i18n.recipeName(r, lang).toLowerCase();
            return name.includes(query) || (r.name || "").toLowerCase().includes(query);
          })
          .sort((a, b) => MP.i18n.recipeName(a, lang).localeCompare(MP.i18n.recipeName(b, lang)));
      }, [recipes, q, protein, style, timeBucket, lang]);

      return (
        <div>
          <div className="relative mb-3">
            <input value={q} onChange={(e) => setQ(e.target.value)}
              placeholder={t(lang, "searchRecipes") + "…"}
              className="w-full rounded-xl border border-warm/20 bg-white px-4 py-2.5 pr-10 text-sm" />
            {q && <button onClick={() => setQ("")} className="absolute right-3 top-1/2 -translate-y-1/2 text-warm">×</button>}
          </div>

          <FilterRow title={pickLabel(FILTER_TITLES.protein, lang)} active={protein} onSelect={setProtein}
            allLabel={pickLabel(FILTER_ALL_LABELS.protein, lang)} options={PROTEIN_FILTERS}
            keyOf={(p) => p.key} labelOf={(p) => `${p.icon} ${pickLabel(p.label, lang)}`} />

          <FilterRow title={pickLabel(FILTER_TITLES.style, lang)} active={style} onSelect={setStyle}
            allLabel={pickLabel(FILTER_ALL_LABELS.style, lang)} options={STYLE_FILTERS}
            keyOf={(s) => s.key} labelOf={(s) => pickLabel(s.label, lang)} />

          <FilterRow title={pickLabel(FILTER_TITLES.time, lang)} active={timeBucket} onSelect={setTimeBucket}
            allLabel={pickLabel(FILTER_ALL_LABELS.time, lang)} options={TIME_FILTERS}
            keyOf={(tb) => tb.key} labelOf={(tb) => pickLabel(tb.label, lang)} />

          <div className="text-xs text-warm mb-2 num">{filtered.length}</div>

          <div className="space-y-2">
            {filtered.map((r) => {
              const img = MP.recipeImage(r);
              const name = MP.i18n.recipeName(r, lang);
              const mins = (r.prep_time_mins || 0) + (r.cook_time_mins || 0);
              return (
                <button key={r.id} onClick={() => onOpen(r.id)}
                  className="w-full flex items-center gap-3 bg-white rounded-2xl p-3 shadow-sm ring-1 ring-black/5 text-left">
                  <div className="w-14 h-14 rounded-xl bg-sand overflow-hidden shrink-0">
                    {img && <img src={img} alt="" className="w-full h-full object-cover" {...MP.imgFallbackHandlers(r)} />}
                  </div>
                  <div className="min-w-0 flex-1">
                    <div className="font-display text-base leading-tight truncate">{name}</div>
                    <div className="text-xs text-warm mt-0.5">
                      {r.cuisine ? `${r.cuisine} · ` : ""}{MP.formatDuration(mins)}
                    </div>
                  </div>
                  <span className="text-warm/30 text-xl shrink-0">›</span>
                </button>
              );
            })}
            {filtered.length === 0 && (
              <p className="text-sm text-warm/50 italic text-center py-8">{t(lang, "noRecipesFound")}</p>
            )}
          </div>
        </div>
      );
    }

    function useNow() {
      const [now, setNow] = useState(() => MP.date.hkNowMin());
      useEffect(() => {
        const id = setInterval(() => setNow(MP.date.hkNowMin()), 1000);
        return () => clearInterval(id);
      }, []);
      return now;
    }

    function useClock() {
      const getHKParts = () => {
        const now = new Date();
        const fmt = new Intl.DateTimeFormat("en-US", {
          timeZone: "Asia/Hong_Kong",
          hour: "numeric", minute: "2-digit", second: "2-digit",
          day: "numeric", month: "short", weekday: "short",
          hour12: true,
        });
        return Object.fromEntries(fmt.formatToParts(now).map((p) => [p.type, p.value]));
      };
      const [parts, setParts] = useState(getHKParts);
      useEffect(() => {
        const id = setInterval(() => setParts(getHKParts()), 1000);
        return () => clearInterval(id);
      }, []);
      const sec = parseInt(parts.second || "0");
      return {
        h: parts.hour || "12",
        m: parts.minute || "00",
        s: parts.second || "00",
        ampm: parts.dayPeriod || "",
        blink: sec % 2 === 0,
        dateStr: `${parts.weekday || ""}, ${parts.day || ""} ${parts.month || ""}`,
      };
    }

    const MEAL_EMOJI = { breakfast: "🍳", lunch: "🥗", dinner: "🍽️" };

    function StatusPill({ status, lang }) {
      if (status === "done") return <span className="shrink-0 text-[10px] font-semibold uppercase tracking-wide px-2.5 py-1 rounded-full bg-sage/15 text-sage">{t(lang, "doneLbl")}</span>;
      if (status === "now") return <span className="shrink-0 text-[10px] font-semibold uppercase tracking-wide px-2.5 py-1 rounded-full bg-terra text-cream">{t(lang, "cookNow")}</span>;
      return null;
    }

    // Today's meal view: the bottom nav's Breakfast/Lunch/Dinner tabs are exclusive,
    // each shows ONLY that meal, never the other two. Multiple dishes within the one
    // active meal still each get their own accordion (handled inside MealSection).
    function MealTicket({ mealType, day, recipesById, planServes, lang, onVerify, nowMin }) {
      const label = MP.i18n.meals[lang][mealType];
      const ids = MP.getMealRecipeIds(day, mealType);
      const hasRecipes = ids.length > 0;
      const mealTime = day[mealType + "_time"];
      const serveMin = MP.schedule.parseHM(mealTime || MP.schedule.defaultMealTime(mealType));
      const dishCount = ids.length;

      let status = "upcoming";
      if (hasRecipes && nowMin != null) {
        let earliestStart = Infinity;
        for (const id of ids) {
          const r = recipesById[id]; if (!r) continue;
          const sched = MP.schedule.forMeal(mealType, r, { mealTime, buffer: HELPER_BUFFER });
          if (sched.startMin < earliestStart) earliestStart = sched.startMin;
        }
        if (serveMin < nowMin) status = "done";
        else if (isFinite(earliestStart) && nowMin >= earliestStart) status = "now";
      }

      const notPlannedMsg = { en: "Not planned yet", tl: "Hindi pa planado", il: "Saan pay a naplano" };

      return (
        <div className="rounded-2xl overflow-hidden bg-white shadow-sm ring-1 ring-black/5">
          <div className="flex items-center gap-3 px-4 py-3.5">
            <span className="text-2xl shrink-0">{MEAL_EMOJI[mealType]}</span>
            <div className="flex-1 min-w-0">
              <div className="font-display text-lg leading-tight">{label}</div>
              <div className="text-xs text-warm mt-0.5">
                {hasRecipes
                  ? `${dishCount} ${dishCount === 1 ? "dish" : "dishes"}`
                  : (notPlannedMsg[lang] || notPlannedMsg.en)}
              </div>
            </div>
            <StatusPill status={status} lang={lang} />
          </div>
          {hasRecipes && (
            <div className="border-t border-sand/60 px-4 pb-4 pt-3">
              <MealSection
                mealType={mealType} day={day}
                recipesById={recipesById} planServes={planServes}
                lang={lang} onVerify={onVerify} nowMin={nowMin}
              />
            </div>
          )}
        </div>
      );
    }

    // Renders only the one active meal (set by the bottom nav) plus tonight's prep reminder.
    function TodayMealView({ activeMeal, todayDay, tomorrowDay, recipesById, planServes, nowMin, lang, onVerify }) {
      return (
        <div className="space-y-3">
          <MealTicket
            key={activeMeal}
            mealType={activeMeal}
            day={todayDay}
            recipesById={recipesById}
            planServes={planServes}
            lang={lang}
            onVerify={onVerify}
            nowMin={nowMin}
          />
          {/* Overnight prep reminder */}
          <PrepTomorrow tomorrowDay={tomorrowDay} recipesById={recipesById} lang={lang} />
        </div>
      );
    }

    function App() {
      const [lang, setLang] = useState(langStore());
      const [tab, setTab] = useState(MP.date.currentMeal()); // "breakfast"|"lunch"|"dinner"|"coming"|"shop"
      const [recipes, setRecipes] = useState(null);
      const [plan, setPlan] = useState(null);
      const [upcoming, setUpcoming] = useState([]);
      const [pantry, setPantry] = useState({});
      const [sources, setSources] = useState({});
      const [extras, setExtras] = useState([]);
      const [study, setStudy] = useState(null); // { recipe, mealType, date, mealTime, mealServes }
      const [viewRecipeId, setViewRecipeId] = useState(null); // recipe opened from the library tab
      const [err, setErr] = useState(null);
      const [offline, setOffline] = useState(!navigator.onLine);
      const [showOnboard, setShowOnboard] = useState(() => !localStorage.getItem("mpHelperOnboarded"));

      useEffect(() => { localStorage.setItem("mpHelperLang", lang); }, [lang]);

      useEffect(() => {
        (async () => {
          try {
            const today = MP.date.hkToday();
            const monday = MP.date.mondayOf(today);
            const [rs, wp, pa, upc, sr, ex] = await Promise.all([
              MP.api.getRecipes(), MP.api.getWeekplan(), MP.api.getPantry(),
              MP.api.getWeekplans(monday).catch(() => []),
              MP.api.getSources().catch(() => ({})),
              MP.api.getExtras().catch(() => ([])),
            ]);
            setRecipes(rs);
            setPlan(wp);
            setUpcoming(upc || []);
            setPantry(pa || {});
            setSources(sr || {});
            setExtras(ex || []);
          } catch (e) { setErr(e.message); }
        })();
      }, []);

      async function togglePantryItem(item, have) {
        setPantry((p) => {
          const next = { ...p };
          if (have) next[item] = new Date().toISOString().slice(0, 10);
          else delete next[item];
          return next;
        });
        try {
          await MP.api.togglePantry(item, have);
          flash(have ? "✓ Got it" : "Unmarked");
        }
        catch (e) {
          flash("Could not save — tap to retry", true);
          const fresh = await MP.api.getPantry().catch(() => ({}));
          setPantry(fresh || {});
        }
      }

      const today = MP.date.hkToday();
      const nowMin = useNow();
      const recipesById = useMemo(() => {
        const m = {};
        (recipes || []).forEach((r) => { m[r.id] = r; });
        return m;
      }, [recipes]);

      const todayDay = useMemo(() => {
        if (!plan) return null;
        return (plan.days || []).find((d) => d.date === today);
      }, [plan, today]);

      const tomorrowDay = useMemo(() => {
        if (!plan) return null;
        const tmr = MP.date.addDays(today, 1);
        return (plan.days || []).find((d) => d.date === tmr);
      }, [plan, today]);

      // Auto-jump to the next upcoming meal tab when the plan first loads.
      // MUST be before early returns (Rules of Hooks).
      const autoTabDone = React.useRef(false);
      useEffect(() => {
        if (!todayDay || autoTabDone.current) return;
        autoTabDone.current = true;
        const nowMinVal = MP.date.hkNowMin();
        const next = ["breakfast", "lunch", "dinner"].find((m) => {
          const mt = todayDay[m + "_time"] || MP.schedule.defaultMealTime(m);
          return MP.schedule.parseHM(mt) > nowMinVal;
        }) || "dinner";
        setTab(next);
      }, [todayDay]);

      // MUST be declared before any early returns so hook count stays stable.
      const needCount = useMemo(() => {
        if (!recipes || !plan) return 0;
        const g = MP.buildShoppingList(recipes, plan);
        let n = 0;
        for (const src of Object.values(g)) {
          for (const cat of Object.values(src)) {
            for (const it of cat) {
              if (!pantry[(it.item || "").toLowerCase().trim()]) n++;
            }
          }
        }
        return n;
      }, [recipes, plan, pantry]);

      useEffect(() => {
        const goOff = () => setOffline(true);
        const goOn = () => setOffline(false);
        window.addEventListener("offline", goOff);
        window.addEventListener("online", goOn);
        return () => { window.removeEventListener("offline", goOff); window.removeEventListener("online", goOn); };
      }, []);

      function dismissOnboard() { localStorage.setItem("mpHelperOnboarded", "1"); setShowOnboard(false); }

      async function verify(recipeId) {
        try {
          const r = recipesById[recipeId];
          if (!r) return;
          const updated = { ...r, translations_verified: true };
          try {
            await MP.api.upsertRecipe(recipeId, updated);
            setRecipes((rs) => rs.map((x) => (x.id === recipeId ? updated : x)));
            flash("✓ Thanks — translation marked verified.");
          } catch (e) {
            flash("Ask Faith to mark this verified — helper can't change recipes.");
          }
        } catch (e) { flash("Error: " + e.message, true); }
      }

      if (err) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center px-6 text-center gap-4">
            <div className="text-5xl">😔</div>
            <p className="font-display text-2xl text-ink">Could not load the plan</p>
            <p className="text-warm text-sm max-w-xs">Check your connection and try again. If it keeps failing, ask Faith to check the settings.</p>
            <button onClick={() => window.location.reload()}
              className="mt-2 bg-terra text-cream px-6 py-3 rounded-full text-sm font-semibold">
              Try again
            </button>
          </div>
        );
      }
      if (!recipes || !plan) {
        return (
          <main className="max-w-xl mx-auto px-4 pt-14 pb-24">
            {/* NowBar skeleton */}
            <div className="fixed top-0 left-0 right-0 z-20 bg-ink flex items-center justify-between px-4" style={{ height: "56px" }}>
              <div className="h-5 w-20 bg-white/10 rounded-full animate-pulse" />
              <div className="h-4 w-28 bg-white/10 rounded-full animate-pulse" />
            </div>
            <div className="mt-6 space-y-4">
              <div className="h-7 w-32 bg-sand rounded-lg animate-pulse" />
              <div className="h-10 w-44 bg-sand rounded-lg animate-pulse" />
              <div className="h-4 w-24 bg-sand/60 rounded-lg animate-pulse" />
              <div className="h-20 bg-terra/20 rounded-2xl animate-pulse" />
              <div className="h-28 bg-sand rounded-2xl animate-pulse" />
              <div className="h-28 bg-sand/70 rounded-2xl animate-pulse" />
            </div>
          </main>
        );
      }
      if (!todayDay) {
        return (
          <div className="p-6 max-w-md mx-auto">
            <h1 className="font-display text-3xl">{MP.date.prettyDate(today, lang)}</h1>
            <p className="mt-2 text-warm">{t(lang, "noPlanToday")}</p>
            <div className="mt-6"><LangToggle lang={lang} onChange={setLang} /></div>
          </div>
        );
      }

      const planServes = plan.serves || 4;
      const MEAL_TABS = ["breakfast", "lunch", "dinner"];
      const upNextMeal = todayDay ? MEAL_TABS.find((m) => {
        if (!MP.getMealRecipeIds(todayDay, m).length) return false;
        const mt = todayDay[m + "_time"] || MP.schedule.defaultMealTime(m);
        return MP.schedule.parseHM(mt) > nowMin;
      }) : null;
      const isMealTab = MEAL_TABS.includes(tab);

      return (
        <main className="max-w-xl mx-auto px-4 pt-14 pb-24">
          <NowBar day={todayDay} nextDay={tomorrowDay} recipesById={recipesById} nowMin={nowMin} lang={lang} />
          {offline && (
            <div className="fixed top-14 left-0 right-0 z-15 bg-amber-100 text-amber-800 text-center text-xs py-1.5 font-medium">
              You're offline. Showing last loaded data
            </div>
          )}

          <header className="mb-5 mt-5">
            <div className="flex items-center justify-between gap-3">
              <div className="text-sm font-semibold text-terra leading-tight min-w-0 truncate">{t(lang, "helloLeni")}</div>
              <div className="shrink-0">
                <LangToggle lang={lang} onChange={setLang} />
              </div>
            </div>
            <h1 className="font-display text-2xl leading-tight whitespace-nowrap mt-1">
              {MP.date.dayName(today, lang)}
              <span className="text-warm font-normal num"> · {MP.date.prettyDate(today, lang)}</span>
            </h1>
          </header>

          {isMealTab && (
            <TodayMealView
              activeMeal={tab}
              todayDay={todayDay} tomorrowDay={tomorrowDay}
              recipesById={recipesById} planServes={planServes}
              nowMin={nowMin} lang={lang} onVerify={verify}
            />
          )}

          {tab === "coming" && (
            <ComingUpView plan={plan} upcoming={upcoming} recipesById={recipesById} today={today} lang={lang}
              onOpen={(info) => setStudy(info)} />
          )}

          {tab === "shop" && (
            <ShoppingView
              recipes={recipes} plan={plan} pantry={pantry}
              onToggle={togglePantryItem} lang={lang}
              sources={sources} extras={extras}
              onToggleExtra={async (id, done) => {
                setExtras((xs) => xs.map((x) => x.id === id ? { ...x, done } : x));
                try { await MP.api.updateExtra(id, { done }); } catch (e) { flash("Save failed", true); }
              }}
            />
          )}

          {tab === "recipes" && (
            <RecipesView recipes={recipes} lang={lang} onOpen={setViewRecipeId} />
          )}

          <div id="flash" aria-live="polite"
            className="fixed left-1/2 -translate-x-1/2 bottom-24 bg-ink text-cream px-4 py-2 rounded-full text-sm shadow-lg opacity-0 pointer-events-none transition">
          </div>

          {/* Bottom navigation */}
          <nav className="fixed bottom-0 left-0 right-0 z-30 bg-sand border-t border-warm/20 flex">
            {MEAL_TABS.map((meal) => {
              const isActive = tab === meal;
              const isUpNext = meal === upNextMeal;
              const hasRecipes = todayDay && MP.getMealRecipeIds(todayDay, meal).length > 0;
              return (
                <button key={meal} onClick={() => setTab(meal)}
                  className={`flex-1 flex flex-col items-center py-2.5 gap-0.5 relative transition outline-none focus:outline-none min-w-0 px-1
                    ${isActive ? "text-terra" : hasRecipes ? "text-warm" : "text-warm/30"}`}>
                  {isUpNext && !isActive && (
                    <span className="absolute top-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-terra" />
                  )}
                  <span className="text-lg leading-none">{MEAL_EMOJI[meal]}</span>
                  <span className="text-[9px] font-medium w-full text-center leading-tight">{MP.i18n.meals[lang][meal]}</span>
                  {isActive && <span className="absolute bottom-0 left-1/4 right-1/4 h-0.5 bg-terra rounded-full" />}
                </button>
              );
            })}
            <button onClick={() => setTab("coming")}
              className={`flex-1 flex flex-col items-center py-2.5 gap-0.5 relative transition outline-none focus:outline-none min-w-0 px-1 ${tab === "coming" ? "text-terra" : "text-warm"}`}>
              <span className="text-lg leading-none">📅</span>
              <span className="text-[9px] font-medium w-full text-center leading-tight">{t(lang, "navThisWeek")}</span>
              {tab === "coming" && <span className="absolute bottom-0 left-1/4 right-1/4 h-0.5 bg-terra rounded-full" />}
            </button>
            <button onClick={() => setTab("shop")}
              className={`flex-1 flex flex-col items-center py-2.5 gap-0.5 relative transition outline-none focus:outline-none min-w-0 px-1 ${tab === "shop" ? "text-terra" : "text-warm"}`}>
              {needCount > 0 && (
                <span className="absolute top-1 right-3 bg-terra text-cream text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center">{needCount}</span>
              )}
              <span className="text-lg leading-none">🛒</span>
              <span className="text-[9px] font-medium w-full text-center leading-tight">{t(lang, "navShopping")}</span>
              {tab === "shop" && <span className="absolute bottom-0 left-1/4 right-1/4 h-0.5 bg-terra rounded-full" />}
            </button>
            <button onClick={() => setTab("recipes")}
              className={`flex-1 flex flex-col items-center py-2.5 gap-0.5 relative transition outline-none focus:outline-none min-w-0 px-1 ${tab === "recipes" ? "text-terra" : "text-warm"}`}>
              <span className="text-lg leading-none">📖</span>
              <span className="text-[9px] font-medium w-full text-center leading-tight">{t(lang, "navRecipes")}</span>
              {tab === "recipes" && <span className="absolute bottom-0 left-1/4 right-1/4 h-0.5 bg-terra rounded-full" />}
            </button>
          </nav>

          {study && (
            <div className="fixed inset-0 z-40 bg-ink/60 flex items-start justify-center p-3 overflow-y-auto"
              onClick={() => setStudy(null)}>
              <div className="bg-cream w-full max-w-xl rounded-2xl shadow-xl mt-6 mb-10 overflow-hidden"
                onClick={(e) => e.stopPropagation()}>
                <div className="flex items-center justify-between px-4 py-3 border-b border-warm/10 sticky top-0 bg-cream z-10">
                  <div className="font-display text-lg">
                    {MP.date.dayName(study.day.date, lang)} · {MP.i18n.meals[lang][study.mealType]}
                  </div>
                  <button onClick={() => setStudy(null)} className="text-warm text-2xl leading-none">×</button>
                </div>
                <div className="p-4">
                  <MealSection
                    mealType={study.mealType} day={study.day}
                    recipesById={recipesById} planServes={planServes}
                    lang={lang} onVerify={verify} />
                </div>
              </div>
            </div>
          )}

          {viewRecipeId && recipesById[viewRecipeId] && (
            <div className="fixed inset-0 z-40 bg-ink/60 flex items-start justify-center p-3 overflow-y-auto"
              onClick={() => setViewRecipeId(null)}>
              <div className="bg-cream w-full max-w-xl rounded-2xl shadow-xl mt-6 mb-10 overflow-hidden"
                onClick={(e) => e.stopPropagation()}>
                <div className="flex items-center justify-between px-4 py-3 border-b border-warm/10 sticky top-0 bg-cream z-10">
                  <div className="font-display text-lg">{MP.i18n.recipeName(recipesById[viewRecipeId], lang)}</div>
                  <button onClick={() => setViewRecipeId(null)} className="text-warm text-2xl leading-none">×</button>
                </div>
                <div className="p-4">
                  <RecipeCard recipe={recipesById[viewRecipeId]} lang={lang} onVerify={verify} />
                </div>
              </div>
            </div>
          )}

          {showOnboard && recipes && plan && (
            <div className="fixed inset-0 z-50 bg-ink/70 flex items-center justify-center p-6" onClick={dismissOnboard}>
              <div className="bg-cream max-w-sm w-full rounded-2xl p-6 text-center space-y-4 shadow-xl" onClick={(e) => e.stopPropagation()}>
                <div className="text-4xl">👋</div>
                <h2 className="font-display text-2xl">{t(lang, "helloLeni")}</h2>
                <div className="text-sm text-warm space-y-3 text-left">
                  <p>🍳 <strong>Bottom tabs</strong> show each meal for today</p>
                  <p>▶ <strong>Watch</strong> buttons open the cooking video</p>
                  <p>🛒 <strong>Shopping</strong> tab has your full list</p>
                  <p>📅 <strong>This week</strong> shows what's coming up</p>
                </div>
                <button onClick={dismissOnboard}
                  className="w-full bg-terra text-cream py-3 rounded-full text-sm font-semibold mt-2">
                  Got it!
                </button>
              </div>
            </div>
          )}
        </main>
      );
    }

    function flash(msg, bad=false) {
      const el = document.getElementById("flash");
      if (!el) return;
      el.textContent = msg;
      el.style.background = bad ? "#b4593a" : "";
      el.style.opacity = "1";
      clearTimeout(el._to);
      el._to = setTimeout(() => { el.style.opacity = "0"; }, 2200);
    }

    const splash = document.getElementById("splash");
    if (splash) splash.remove();
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
