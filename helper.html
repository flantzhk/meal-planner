<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f5ecdf" />
  <title>Today's meals</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f5ecdf'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='44'%3E🍳%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: "#f5ecdf", sand: "#ebddc6", ink: "#2e2a24",
            terra: "#b4593a", sage: "#6b8a6c", warm: "#6d5b46",
          },
          fontFamily: {
            display: ["Lora", "Georgia", "serif"],
            body: ["Source Sans 3", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    html, body { background: #f5ecdf; color: #2e2a24; font-family: "Source Sans 3", system-ui, sans-serif; }
    h1, h2, h3 { font-family: Lora, Georgia, serif; }
    .step-num { font-variant-numeric: tabular-nums; }
    .num { font-variant-numeric: tabular-nums; }
  </style>
  <script src="shared.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState, useMemo } = React;
    const APP_VERSION = "v2.1 · 2026-04-24";
    const t = (lang, key) => MP.i18n.t(lang, key);
    const COMPONENTS = ["protein", "vegetable", "carb"];
    const OPT_COMPONENTS = ["soup", "salad"];
    const ALL_COMPONENTS = [...COMPONENTS, ...OPT_COMPONENTS];
    const COMPONENT_ICONS  = { protein: "🥩", vegetable: "🥦", carb: "🍚", soup: "🍲", salad: "🥗" };
    const COMPONENT_LABELS = { protein: "Protein", vegetable: "Vegetable", carb: "Carb", soup: "Soup", salad: "Salad" };

    function langStore() {
      return localStorage.getItem("mpHelperLang") || "en";
    }

    function LangToggle({ lang, onChange }) {
      return (
        <div className="inline-flex rounded-full bg-sand p-1 text-sm">
          {MP.i18n.languages.map((l) => (
            <button
              key={l.code}
              onClick={() => onChange(l.code)}
              className={`px-3 py-1 rounded-full transition ${
                lang === l.code ? "bg-cream shadow text-ink" : "text-warm"
              }`}>
              {l.code.toUpperCase()}
            </button>
          ))}
        </div>
      );
    }

    // Change 2: NowBar — fixed slim bar always visible at top
    function NowBar({ day, nextDay, recipesById, nowMin, lang }) {
      const { h, m, s, ampm, blink, dateStr } = useClock();
      let content = null;
      let overdue = false;

      if (day) {
        const tasks = MP.schedule.buildDayTasks(day, nextDay, recipesById);
        const upcoming = tasks.find((tk) => (tk.kind === "cook" || tk.kind === "serve") && tk.at > nowMin);
        if (upcoming) {
          const minsToStart = upcoming.at - nowMin;
          overdue = minsToStart <= 0;
          content = overdue
            ? "⚡ Cook now"
            : minsToStart < 60
              ? `Start in ${minsToStart} min`
              : `Start at ${MP.schedule.fmtTime(upcoming.at)}`;
        } else {
          content = "🌙 All done";
        }
      } else {
        content = "🌙 All done";
      }

      return (
        <div
          className={`fixed top-0 left-0 right-0 z-20 flex items-center justify-between px-4 ${
            overdue ? "bg-terra text-cream" : "bg-ink text-cream"
          }`}
          style={{ height: "56px" }}>
          {/* Left: live clock */}
          <div>
            <div className="text-[10px] font-semibold uppercase tracking-widest opacity-50 leading-none mb-0.5">Current time · {dateStr}</div>
            <div className="num font-display text-xl leading-none tracking-tight">
              {h}<span style={{ opacity: blink ? 1 : 0.25 }}>:</span>{m}<span style={{ opacity: blink ? 1 : 0.25 }}>:</span>{s}<span className="text-sm ml-1 opacity-70">{ampm}</span>
            </div>
          </div>
          {/* Right: cooking action */}
          <div className={`text-sm font-medium ${overdue ? "text-cream" : "text-cream/80"}`}>{content}</div>
        </div>
      );
    }

    // Renders a single recipe's image, ingredients and steps
    function RecipeCard({ recipe, componentType, lang, onVerify, noImage }) {
      const name = MP.i18n.recipeName(recipe, lang);
      const showEng = !recipe.translations_verified && lang !== "en";
      const img = MP.recipeImage(recipe);
      return (
        <article className="bg-white rounded-2xl overflow-hidden shadow-sm ring-1 ring-black/5">
          {!noImage && img && (
            <a href={recipe.youtube_url || undefined} target="_blank" rel="noopener"
              className={recipe.youtube_url ? "block relative group" : "block"}>
              <img src={img} alt={name} className="w-full h-44 object-cover"
                onLoad={(e) => {
                  if (!MP.isYoutubePlaceholder(e.target)) return;
                  const s = e.target.src;
                  if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                  if (recipe.hero_image && s !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                  e.target.style.display = "none";
                }}
                onError={(e) => {
                  const s = e.target.src;
                  if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                  if (recipe.hero_image && s !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                  e.target.style.display = "none";
                }} />
              {recipe.youtube_url && (
                <div className="absolute inset-0 flex items-center justify-center bg-black/20 opacity-0 group-hover:opacity-100 transition">
                  <div className="bg-black/60 text-white rounded-full px-4 py-2 text-sm font-medium">▶ Watch video</div>
                </div>
              )}
            </a>
          )}
          <div className="p-5">
            <div className="flex items-center gap-2 text-warm text-xs uppercase tracking-wide mb-1">
              <span className="text-base">{COMPONENT_ICONS[componentType] || ""}</span>
              <span>{COMPONENT_LABELS[componentType] || componentType}</span>
            </div>
            <h2 className="font-display text-2xl leading-tight">{name}</h2>
            {showEng && <div className="text-sm text-warm/80 italic mt-0.5">{recipe.name}</div>}
            {recipe.youtube_url && (
              <a href={recipe.youtube_url} target="_blank" rel="noopener"
                className="mt-3 inline-flex items-center gap-2 bg-terra text-cream px-4 py-2 rounded-full text-sm font-medium">
                ▶ {t(lang, "watch")}
              </a>
            )}
            <h3 className="mt-5 font-display text-lg">{t(lang, "ingredients")}</h3>
            <ul className="mt-1 text-sm leading-relaxed">
              {(recipe.ingredients || []).map((ing, i) => {
                const amt = ing.amount != null ? Number(Number(ing.amount).toFixed(2)) : "";
                return (
                  <li key={i} className="flex gap-3 py-0.5">
                    <span className="num text-warm min-w-[4.5rem]">{amt !== "" ? amt : ""} {ing.unit || ""}</span>
                    <span>{ing.item || ""}</span>
                  </li>
                );
              })}
            </ul>
            <h3 className="mt-5 font-display text-lg">{t(lang, "steps")}</h3>
            <ol className="mt-1 space-y-3">
              {(recipe.steps || []).map((s, i) => (
                <li key={s.step ?? i} className="flex gap-3">
                  <span className="step-num font-display text-terra text-lg leading-7 min-w-[1.5rem]">{s.step ?? i + 1}</span>
                  <div className="leading-relaxed text-sm">
                    <div>{MP.i18n.stepText(s, lang)}</div>
                    {showEng && <div className="text-warm/70 italic text-sm mt-0.5">{s.instruction}</div>}
                  </div>
                </li>
              ))}
            </ol>
            {!recipe.translations_verified && lang !== "en" && (
              <button onClick={() => onVerify(recipe.id)} className="mt-4 text-xs underline text-warm/80">
                ✓ {t(lang, "verify")}
              </button>
            )}
          </div>
        </article>
      );
    }

    // Accordion item: summary row that expands to show full RecipeCard
    function ComponentAccordion({ comp, recipe, mealServes, lang, onVerify, defaultOpen }) {
      const [open, setOpen] = useState(defaultOpen || false);
      const name = MP.i18n.recipeName(recipe, lang);
      const img = MP.recipeImage(recipe);
      const scaled = {
        ...recipe,
        ingredients: (recipe.ingredients || []).map((i) => {
          try { return MP.scale(i, mealServes, recipe.serves_base || 4); } catch(e) { return i; }
        }),
      };
      return (
        <div className="bg-white rounded-2xl overflow-hidden shadow-sm ring-1 ring-black/5">
          {/* Summary row — always visible, tap to toggle */}
          <button
            onClick={() => setOpen((o) => !o)}
            className="w-full flex items-center gap-3 px-4 py-3 text-left"
          >
            {img ? (
              <div className="relative shrink-0 w-12 h-12"
                onClick={(e) => { if (recipe.youtube_url) { e.stopPropagation(); window.open(recipe.youtube_url, "_blank", "noopener"); } }}>
                <img src={img} alt="" className="w-12 h-12 rounded-xl object-cover"
                  onLoad={(e) => {
                    if (!MP.isYoutubePlaceholder(e.target)) return;
                    const s = e.target.src;
                    if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                    if (recipe.hero_image && s !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                    e.target.style.display = "none";
                  }}
                  onError={(e) => {
                    const s = e.target.src;
                    if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                    if (recipe.hero_image && s !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                    e.target.style.display = "none";
                  }} />
                {recipe.youtube_url && (
                  <div className="absolute bottom-0.5 right-0.5 bg-black/60 text-white text-[9px] leading-none px-1 py-0.5 rounded font-bold">▶</div>
                )}
              </div>
            ) : (
              <div className="w-12 h-12 rounded-xl bg-sand/60 flex items-center justify-center text-2xl shrink-0">
                {COMPONENT_ICONS[comp]}
              </div>
            )}
            <div className="flex-1 min-w-0">
              <div className="font-display text-lg leading-snug truncate">{name}</div>
              <div className="text-xs text-warm/50 mt-0.5">Tap to see how to cook this</div>
            </div>
            <span className="text-warm/50 text-lg shrink-0 transition-transform" style={{ transform: open ? "rotate(180deg)" : "rotate(0deg)" }}>
              ›
            </span>
          </button>
          {/* Expanded content */}
          {open && (
            <div className="border-t border-sand">
              <RecipeCard recipe={scaled} componentType={comp} lang={lang} onVerify={onVerify} noImage />
            </div>
          )}
        </div>
      );
    }

    const SOURCE_LABEL = { "wet-market": "🥬 From the wet market", "supermarket": "🛒 From the supermarket" };
    const SOURCE_ORDER = ["wet-market", "supermarket"];

    function MealShoppingList({ mealType, day, recipesById, planServes, lang }) {
      const [open, setOpen] = useState(false);
      const mealServes = day[mealType + "_serves"] || planServes;
      const ids = MP.getMealRecipeIds(day, mealType);

      const groups = useMemo(() => {
        const byKey = new Map();
        for (const id of ids) {
          const r = recipesById[id]; if (!r) continue;
          for (const ing of r.ingredients || []) {
            if (ing.category === "pantry") continue;
            const scaled = MP.scale(ing, mealServes, r.serves_base || 4);
            const { family, value } = MP.units.toCanonical(scaled.amount, scaled.unit);
            const itemKey = MP.normalizeIngredientKey(ing.item);
            const key = `${itemKey}|${ing.source}|${family}`;
            const ex = byKey.get(key) || { item: itemKey, source: ing.source || "supermarket", category: ing.category, family, total: 0 };
            ex.total += value;
            byKey.set(key, ex);
          }
        }
        const result = {};
        for (const entry of byKey.values()) {
          const src = entry.source || "supermarket";
          if (!result[src]) result[src] = [];
          const { amount, unit } = MP.units.fromCanonical(entry.family, entry.total);
          const amtStr = amount % 1 === 0 ? String(amount) : amount.toFixed(1);
          result[src].push({ item: entry.item, display: `${amtStr} ${unit}` });
        }
        return result;
      }, [ids.join(","), mealServes]);

      const totalItems = Object.values(groups).reduce((n, g) => n + g.length, 0);
      if (totalItems === 0) return null;

      return (
        <div className="rounded-2xl overflow-hidden ring-1 ring-black/5 bg-white">
          <button onClick={() => setOpen((o) => !o)}
            className="w-full flex items-center justify-between px-4 py-3 text-left">
            <div className="flex-1 min-w-0">
              <div className="font-display text-base">Before you start — what to buy</div>
              <div className="text-xs text-warm/60 mt-0.5">{totalItems} item{totalItems !== 1 ? "s" : ""} · tap to see the list</div>
            </div>
            <span className="text-warm/50 text-lg transition-transform ml-2 shrink-0" style={{ transform: open ? "rotate(180deg)" : "rotate(0deg)" }}>›</span>
          </button>
          {open && (
            <div className="border-t border-sand divide-y divide-sand/60">
              {SOURCE_ORDER.filter((s) => groups[s]?.length).map((src) => (
                <div key={src} className="px-4 py-3">
                  <div className="text-xs font-semibold text-warm/70 uppercase tracking-wide mb-2">{SOURCE_LABEL[src]}</div>
                  <ul className="space-y-1">
                    {groups[src].map((it, i) => (
                      <li key={i} className="flex justify-between text-sm">
                        <span>{it.item}</span>
                        <span className="text-warm/70 num tabular-nums">{it.display}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Renders a full meal: timing header + summary + accordion per component
    function MealSection({ mealType, day, recipesById, planServes, lang, onVerify, nowMin }) {
      const mealObj = MP.getMealObj(day, mealType);
      const mealTime = day[mealType + "_time"];
      const mealServes = day[mealType + "_serves"] || planServes;
      const ids = MP.getMealRecipeIds(day, mealType);
      if (!ids.length) return null;

      const serveMin = MP.schedule.parseHM(mealTime || MP.schedule.defaultMealTime(mealType));
      const servedAtLabel = MP.schedule.fmtTime(serveMin);
      let earliestStart = Infinity;
      let hasOvernightDep = false;
      for (const id of ids) {
        const r = recipesById[id]; if (!r) continue;
        const sched = MP.schedule.forMeal(mealType, r, { mealTime });
        if (sched.startMin < earliestStart) earliestStart = sched.startMin;
        if (sched.hasOvernightDep) hasOvernightDep = true;
      }
      const startLabel = isFinite(earliestStart) ? MP.schedule.fmtTime(earliestStart) : "—";
      const mealEmoji = mealType === "breakfast" ? "🍳" : mealType === "lunch" ? "🥗" : "🍽️";

      // Collect all components that have both a recipe and an image
      const compImages = ALL_COMPONENTS.map((comp) => {
        const id = mealObj[comp]; if (!id) return null;
        const r = recipesById[id]; if (!r) return null;
        const img = MP.recipeImage(r); if (!img) return null;
        return { comp, recipe: r, img };
      }).filter(Boolean);

      return (
        <div className="space-y-3">
          {/* Per-component image strip */}
          {compImages.length > 0 && (
            <div className={`flex gap-1 rounded-2xl overflow-hidden`} style={{ height: "10rem" }}>
              {compImages.map(({ comp, recipe, img }) => (
                <a key={comp}
                  href={recipe.youtube_url || undefined}
                  target="_blank" rel="noopener"
                  className="relative flex-1 overflow-hidden group"
                  style={{ minWidth: 0 }}
                  onClick={(e) => { if (!recipe.youtube_url) e.preventDefault(); }}>
                  <img src={img} alt="" className="w-full h-full object-cover"
                    onLoad={(e) => {
                      if (!MP.isYoutubePlaceholder(e.target)) return;
                      const s = e.target.src;
                      if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                      if (recipe.hero_image && s !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                      e.target.closest("a").style.display = "none";
                    }}
                    onError={(e) => {
                      const s = e.target.src;
                      if (s.includes("maxresdefault")) { e.target.src = s.replace("maxresdefault", "hqdefault"); return; }
                      if (recipe.hero_image && s !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                      e.target.closest("a").style.display = "none";
                    }} />
                  {/* Label overlay */}
                  <div className="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/70 to-transparent px-2 pt-6 pb-2 pointer-events-none">
                    <div className="text-white text-[9px] font-bold uppercase tracking-widest opacity-70 leading-none">{COMPONENT_ICONS[comp]} {COMPONENT_LABELS[comp]}</div>
                    <div className="text-white text-xs font-medium leading-tight truncate mt-0.5">{MP.i18n.recipeName(recipe, lang)}</div>
                  </div>
                  {recipe.youtube_url && (
                    <div className="absolute top-2 right-2 bg-black/60 text-white text-[10px] font-bold px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 transition">▶</div>
                  )}
                </a>
              ))}
            </div>
          )}
          {/* Timing header */}
          {hasOvernightDep ? (
            <div className="bg-warm text-cream px-5 py-4 rounded-2xl">
              <div className="text-sm font-semibold opacity-80">⚠️ This meal needs overnight preparation.</div>
              <div className="font-display text-xl mt-1">{mealEmoji} {MP.i18n.meals[lang][mealType]}</div>
              <div className="text-sm opacity-80 mt-1">Food should be on the table by <span className="num font-semibold">{servedAtLabel}</span>. Please check with Faith.</div>
            </div>
          ) : (
            <div className="bg-ink text-cream px-5 py-4 rounded-2xl">
              <div className="text-xs font-semibold uppercase tracking-widest opacity-50 mb-1">{mealEmoji} {MP.i18n.meals[lang][mealType]}</div>
              <div className="text-base leading-snug">
                Please start cooking at <span className="num font-display text-xl">{startLabel}</span>.
              </div>
              <div className="text-base leading-snug mt-1">
                Food should be on the table by <span className="num font-display text-xl">{servedAtLabel}</span>.
              </div>
            </div>
          )}
          {/* Shopping list first — buy before cooking */}
          <MealShoppingList mealType={mealType} day={day} recipesById={recipesById} planServes={planServes} lang={lang} />
          {/* Recipes — one accordion per component */}
          <div className="text-xs font-semibold uppercase tracking-widest text-warm/50 px-1">How to cook each dish</div>
          {ALL_COMPONENTS.map((comp, i) => {
            const id = mealObj[comp]; if (!id) return null;
            const r = recipesById[id]; if (!r) return null;
            return (
              <ComponentAccordion
                key={comp} comp={comp} recipe={r}
                mealServes={mealServes} lang={lang} onVerify={onVerify}
                defaultOpen={false}
              />
            );
          })}
        </div>
      );
    }

    function PrepTomorrow({ tomorrowDay, recipesById, lang }) {
      if (!tomorrowDay) return null;
      const items = [];
      for (const meal of ["breakfast", "lunch", "dinner"]) {
        for (const id of MP.getMealRecipeIds(tomorrowDay, meal)) {
          const r = recipesById[id]; if (!r) continue;
          for (const d of r.dependencies || []) {
            if (d.type === "defrost" && d.hours_before >= 12)
              items.push({ icon: "❄️", text: `Take ${MP.i18n.recipeName(r, lang)} out of the freezer today — for tomorrow's ${meal}.` });
            if (d.type === "marinate" && d.hours_before >= 8)
              items.push({ icon: "🧴", text: `Start marinating the ${MP.i18n.recipeName(r, lang)} tonight — for tomorrow's ${meal}.` });
          }
        }
      }
      if (items.length === 0) return null;
      return (
        <section className="rounded-2xl overflow-hidden shadow-sm mt-4">
          <div className="bg-warm text-cream px-5 py-4">
            <div className="font-display text-xl">Before you go to sleep tonight</div>
            <p className="text-sm opacity-80 mt-1">Auntie Leni, please do these things tonight so tomorrow's meals are ready.</p>
          </div>
          <div className="bg-sand/60 divide-y divide-warm/10">
            {items.map((it, i) => (
              <div key={i} className="flex items-start gap-3 px-5 py-4">
                <span className="text-2xl leading-none mt-0.5">{it.icon}</span>
                <p className="text-base leading-relaxed">{it.text}</p>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function ComingUpView({ plan, upcoming, recipesById, today, lang, onOpen }) {
      const weekFloor = MP.date.mondayOf(today);
      const allDays = [];
      const seen = new Set();
      const addPlan = (p) => {
        if (!p) return;
        for (const d of p.days || []) {
          if (d.date < weekFloor) continue;
          if (seen.has(d.date)) continue;
          seen.add(d.date);
          allDays.push({ ...d, _planServes: p.serves || 4 });
        }
      };
      addPlan(plan);
      for (const p of upcoming || []) addPlan(p);
      allDays.sort((a, b) => a.date.localeCompare(b.date));

      if (allDays.length === 0) {
        return <p className="text-warm text-sm">Nothing planned yet.</p>;
      }

      const groups = {};
      for (const d of allDays) {
        const wk = MP.date.mondayOf(d.date);
        (groups[wk] = groups[wk] || []).push(d);
      }
      const weekKeys = Object.keys(groups).sort();
      const todayMonday = MP.date.mondayOf(today);

      return (
        <div className="space-y-6">
          {weekKeys.map((wk) => {
            const label = wk === todayMonday ? "This week" :
                          wk === MP.date.addDays(todayMonday, 7) ? "Next week" :
                          `Week of ${MP.date.prettyDate(wk)}`;
            return (
              <section key={wk}>
                <h3 className="font-display text-xl text-terra mb-2">{label}</h3>
                <div className="space-y-3">
                  {groups[wk].map((d) => {
                    const isToday = d.date === today;
                    const isPast = d.date < today;
                    return (
                      <div key={d.date} className={`rounded-xl p-4 ring-1 ${
                        isToday ? "bg-white ring-terra/40" :
                        isPast ? "bg-white ring-black/5 opacity-60" :
                        "bg-white ring-black/5"
                      }`}>
                        <div className="flex items-baseline justify-between">
                          <div>
                            <div className="font-display text-lg leading-tight">
                              {MP.date.dayName(d.date)}
                              {isToday && <span className="text-terra"> · Today</span>}
                            </div>
                            <div className="text-xs text-warm num mt-0.5">{MP.date.prettyDate(d.date)}</div>
                          </div>
                          {isPast && <span className="text-xs text-warm/50 italic">Done</span>}
                        </div>
                        <ul className="mt-2 space-y-1 text-sm">
                          {["breakfast","lunch","dinner"].map((m) => {
                            const ids = MP.getMealRecipeIds(d, m);
                            if (!ids.length) return (
                              <li key={m} className="flex justify-between text-warm/50 text-sm">
                                <span className="uppercase tracking-wide text-xs">{m}</span>
                                <span className="italic">— not planned</span>
                              </li>
                            );
                            const mealObj = MP.getMealObj(d, m);
                            const names = ALL_COMPONENTS
                              .filter((c) => mealObj[c])
                              .map((c) => {
                                const r = recipesById[mealObj[c]];
                                return r ? `${COMPONENT_ICONS[c]} ${MP.i18n.recipeName(r, lang)}` : null;
                              }).filter(Boolean);
                            const time = d[m + "_time"] || MP.schedule.defaultMealTime(m);
                            const allDeps = ids.flatMap((id) => (recipesById[id]?.dependencies || []));
                            const hasLongDep = allDeps.some((dep) => dep.hours_before >= 12);
                            const hasMarinate = allDeps.some((dep) => dep.type === "marinate" && dep.hours_before < 12);
                            return (
                              <li key={m}>
                                <button
                                  onClick={() => onOpen && onOpen({ mealType: m, day: d })}
                                  className="w-full flex items-start justify-between gap-2 text-left hover:bg-terra/5 rounded-lg px-1 py-1 transition">
                                  <span className="uppercase tracking-wide text-xs text-warm min-w-[5.5rem] mt-0.5">{m}</span>
                                  <span className="flex-1 text-sm leading-snug underline decoration-terra/30 underline-offset-2">
                                    {names.join(" · ")}
                                    {hasLongDep && <span className="ml-1 text-xs">🌙</span>}
                                    {hasMarinate && <span className="ml-1 text-xs">🧂</span>}
                                  </span>
                                  <span className="text-xs text-warm num shrink-0 mt-0.5">{MP.schedule.fmtTime(MP.schedule.parseHM(time))}</span>
                                </button>
                              </li>
                            );
                          })}
                        </ul>
                      </div>
                    );
                  })}
                </div>
              </section>
            );
          })}
        </div>
      );
    }

    function ItemRow({ it, has, onTick, srcLabel }) {
      const amt = it.amount != null ? Number(Number(it.amount).toFixed(2)) : "";
      return (
        <li className={`flex items-center gap-3 text-sm px-4 py-3 transition ${has ? "bg-sage/5" : "bg-white"}`}>
          <button
            aria-label={has ? "Unmark" : "Mark as bought"}
            onClick={onTick}
            className={`shrink-0 w-7 h-7 rounded-full border-2 flex items-center justify-center transition ${
              has ? "bg-sage border-sage text-white" : "border-warm/30 bg-white"
            }`}>
            {has && <span className="text-sm font-bold leading-none">✓</span>}
          </button>
          <span className="num text-warm/70 min-w-[4.5rem] text-xs">{amt} {it.unit || ""}</span>
          <span className={`flex-1 ${has ? "line-through text-warm/50" : ""}`}>{it.item}</span>
          {srcLabel && <span className="text-xs text-warm/50 shrink-0">{srcLabel}</span>}
        </li>
      );
    }

    function ShoppingView({ recipes, plan, pantry, onToggle, lang, sources, extras, onToggleExtra }) {
      const groups = MP.buildShoppingList(recipes, plan, sources);
      const [filter, setFilter] = useState(() => sessionStorage.getItem("mpShopFilter") || "all");
      const [search, setSearch] = useState("");

      const sourceLabels = {
        "wet-market": "🥬 Wet market", "supermarket": "🛒 Fusion / Marketplace",
        "hktvmall": "📦 HKTVmall", "other": "Other",
      };
      const categoryLabels = {
        meat: "Meat & Seafood", produce: "Vegetables & Fruit",
        dairy: "Dairy & Eggs", pantry: "Pantry & Dry Goods",
        bakery: "Bread & Bakery", frozen: "Frozen", other: "Other",
      };
      const sourceOrder = ["wet-market", "supermarket", "hktvmall", "other"];
      const key = (it) => (it.item || "").toLowerCase().trim();

      function updateFilter(val) {
        setFilter(val);
        sessionStorage.setItem("mpShopFilter", val);
      }

      // Counts per store
      const counts = {};
      for (const src of sourceOrder) {
        const g = groups[src];
        if (!g) continue;
        let bought = 0, total = 0;
        for (const items of Object.values(g)) for (const it of items) {
          total++; if (pantry[key(it)]) bought++;
        }
        counts[src] = { bought, total, remaining: total - bought };
      }
      const extrasRemaining = (extras || []).filter((x) => !x.done).length;
      const extrasTotal = (extras || []).length;
      const extrasBought = extrasTotal - extrasRemaining;

      // Overall totals
      const overallTotal = Object.values(counts).reduce((s, c) => s + c.total, 0) + extrasTotal;
      const overallBought = Object.values(counts).reduce((s, c) => s + c.bought, 0) + extrasBought;
      const overallRemaining = overallTotal - overallBought;

      const showSource = (src) => filter === "all" || filter === src;
      const showExtras = extrasTotal > 0 && (filter === "all" || filter === "extras");

      // Search
      const searchActive = search.trim().length > 0;
      let searchResults = [];
      if (searchActive) {
        const q = search.toLowerCase();
        for (const src of sourceOrder) {
          const g = groups[src];
          if (!g) continue;
          for (const [cat, items] of Object.entries(g)) {
            for (const it of items) {
              if ((it.item || "").toLowerCase().includes(q))
                searchResults.push({ ...it, _src: src, _cat: cat });
            }
          }
        }
      }

      return (
        <div>
          {/* Summary card */}
          {!searchActive && overallTotal > 0 && (
            <div className="bg-white rounded-2xl p-4 mb-4 shadow-sm ring-1 ring-black/5">
              <div className="flex items-baseline justify-between mb-3">
                <h3 className="font-display text-lg">Shopping summary</h3>
                <span className="num text-sm text-warm">{overallBought} of {overallTotal} done</span>
              </div>
              {/* Progress bar */}
              <div className="h-2 bg-sand rounded-full overflow-hidden mb-3">
                <div
                  className="h-full bg-sage rounded-full transition-all"
                  style={{ width: overallTotal ? `${(overallBought / overallTotal) * 100}%` : "0%" }}
                />
              </div>
              {/* Per-store breakdown */}
              <ul className="space-y-1.5">
                {sourceOrder.map((src) => {
                  const c = counts[src]; if (!c || c.total === 0) return null;
                  const allDone = c.remaining === 0;
                  return (
                    <li key={src} className="flex items-center justify-between text-sm">
                      <span className={allDone ? "text-sage" : "text-ink"}>{sourceLabels[src]}</span>
                      <span className={`num text-xs ${allDone ? "text-sage font-semibold" : "text-warm"}`}>
                        {allDone ? "✓ all done" : `${c.bought} of ${c.total} · ${c.remaining} left`}
                      </span>
                    </li>
                  );
                })}
                {extrasTotal > 0 && (
                  <li className="flex items-center justify-between text-sm">
                    <span className={extrasRemaining === 0 ? "text-sage" : "text-ink"}>➕ Extras</span>
                    <span className={`num text-xs ${extrasRemaining === 0 ? "text-sage font-semibold" : "text-warm"}`}>
                      {extrasRemaining === 0 ? "✓ all done" : `${extrasBought} of ${extrasTotal} · ${extrasRemaining} left`}
                    </span>
                  </li>
                )}
              </ul>
            </div>
          )}

          {/* Search */}
          <div className="relative mb-3">
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Search items…"
              className="w-full rounded-xl border border-warm/20 bg-white px-4 py-2.5 pr-10 text-sm" />
            {search && <button onClick={() => setSearch("")} className="absolute right-3 top-1/2 -translate-y-1/2 text-warm">×</button>}
          </div>

          {/* Store filter nav */}
          {!searchActive && (
            <nav className="sticky top-11 z-10 -mx-4 px-4 py-2 mb-4 bg-cream/95 backdrop-blur border-b border-warm/10 flex flex-wrap gap-2">
              <button onClick={() => updateFilter("all")}
                className={`px-3 py-1.5 rounded-full text-sm ${filter === "all" ? "bg-ink text-cream" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                All
              </button>
              {sourceOrder.map((src) => {
                if (!counts[src]) return null;
                const active = filter === src;
                const { remaining } = counts[src];
                return (
                  <button key={src} onClick={() => updateFilter(src)}
                    className={`px-3 py-1.5 rounded-full text-sm ${active ? "bg-ink text-cream" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                    {sourceLabels[src]}
                    {remaining > 0 && <span className="ml-1.5 num text-xs opacity-70">{remaining}</span>}
                    {remaining === 0 && counts[src].total > 0 && <span className="ml-1.5 text-sage text-xs">✓</span>}
                  </button>
                );
              })}
              {extrasTotal > 0 && (
                <button onClick={() => updateFilter("extras")}
                  className={`px-3 py-1.5 rounded-full text-sm ${filter === "extras" ? "bg-ink text-cream" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                  ➕ Extras {extrasRemaining > 0 && <span className="ml-1 num text-xs opacity-70">{extrasRemaining}</span>}
                  {extrasRemaining === 0 && extrasTotal > 0 && <span className="ml-1 text-sage text-xs">✓</span>}
                </button>
              )}
            </nav>
          )}

          {/* Search results */}
          {searchActive && (
            <div className="mb-6">
              <div className="text-xs text-warm uppercase tracking-wide mb-2">Results for "{search}"</div>
              {searchResults.length === 0 && <p className="text-sm text-warm/60 italic">No items found.</p>}
              <ul className="rounded-2xl overflow-hidden divide-y divide-sand space-y-0 shadow-sm ring-1 ring-black/5">
                {searchResults.map((it, i) => {
                  const has = !!pantry[key(it)];
                  return <ItemRow key={i} it={it} has={has}
                    onTick={() => onToggle(key(it), !has)}
                    srcLabel={sourceLabels[it._src]} />;
                })}
              </ul>
            </div>
          )}

          {/* Normal view */}
          {!searchActive && (
            <>
              {showExtras && (
                <section className="mb-6">
                  <h3 className="font-display text-lg mb-2">➕ Extras</h3>
                  {(() => {
                    const unchecked = (extras || []).filter((x) => !x.done);
                    const checked = (extras || []).filter((x) => x.done);
                    return (
                      <div className="rounded-2xl overflow-hidden shadow-sm ring-1 ring-black/5 divide-y divide-sand">
                        {unchecked.map((x) => (
                          <li key={x.id} className="list-none flex items-center gap-3 text-sm px-4 py-3 bg-white">
                            <button onClick={() => onToggleExtra && onToggleExtra(x.id, true)}
                              className="shrink-0 w-7 h-7 rounded-full border-2 border-warm/30 bg-white flex items-center justify-center" />
                            <span className="flex-1">{x.item}</span>
                            <span className="text-xs text-warm/50">{sourceLabels[x.source] || x.source}</span>
                          </li>
                        ))}
                        {checked.length > 0 && (
                          <>
                            <div className="px-4 py-2 bg-sage/10 text-xs font-semibold text-sage uppercase tracking-wide">
                              Got ✓ — {checked.length} item{checked.length > 1 ? "s" : ""}
                            </div>
                            {checked.map((x) => (
                              <li key={x.id} className="list-none flex items-center gap-3 text-sm px-4 py-3 bg-sage/5">
                                <button onClick={() => onToggleExtra && onToggleExtra(x.id, false)}
                                  className="shrink-0 w-7 h-7 rounded-full border-2 bg-sage border-sage text-white flex items-center justify-center">
                                  <span className="text-sm font-bold leading-none">✓</span>
                                </button>
                                <span className="flex-1 line-through text-warm/50">{x.item}</span>
                                <span className="text-xs text-warm/50">{sourceLabels[x.source] || x.source}</span>
                              </li>
                            ))}
                          </>
                        )}
                        {unchecked.length === 0 && checked.length === 0 && (
                          <li className="list-none text-sm text-warm/50 px-4 py-3 bg-white">No extras added.</li>
                        )}
                      </div>
                    );
                  })()}
                </section>
              )}

              {sourceOrder.map((src) => {
                const g = groups[src];
                if (!g || !showSource(src)) return null;
                // Collect all items across categories, split bought/needed
                const allNeeded = [], allBought = [], catMap = {};
                for (const [cat, items] of Object.entries(g)) {
                  for (const it of items) {
                    const has = !!pantry[key(it)];
                    const entry = { ...it, _cat: cat };
                    if (has) allBought.push(entry); else allNeeded.push(entry);
                  }
                  catMap[cat] = true;
                }
                if (allNeeded.length === 0 && allBought.length === 0) return null;
                return (
                  <section key={src} className="mb-6">
                    <div className="flex items-baseline justify-between mb-2">
                      <h3 className="font-display text-lg">{sourceLabels[src] || src}</h3>
                      {allBought.length > 0 && (
                        <span className="text-xs text-sage num">{allBought.length} of {allNeeded.length + allBought.length} got</span>
                      )}
                    </div>
                    <div className="rounded-2xl overflow-hidden shadow-sm ring-1 ring-black/5 divide-y divide-sand">
                      {/* Items still needed — grouped by category */}
                      {Object.keys(catMap).map((cat) => {
                        const needed = allNeeded.filter((it) => it._cat === cat);
                        if (needed.length === 0) return null;
                        return (
                          <React.Fragment key={cat}>
                            <div className="px-4 py-2 bg-sand/50 text-xs font-semibold uppercase tracking-wide text-warm">
                              {categoryLabels[cat] || cat}
                            </div>
                            {needed.map((it, i) => (
                              <ItemRow key={i} it={it} has={false}
                                onTick={() => onToggle(key(it), true)} />
                            ))}
                          </React.Fragment>
                        );
                      })}
                      {/* Got section — always visible when there are bought items */}
                      {allBought.length > 0 && (
                        <>
                          <div className="px-4 py-2 bg-sage/10 text-xs font-semibold text-sage uppercase tracking-wide">
                            Got ✓ — {allBought.length} item{allBought.length > 1 ? "s" : ""}
                          </div>
                          {allBought.map((it, i) => (
                            <ItemRow key={i} it={it} has={true}
                              onTick={() => onToggle(key(it), false)} />
                          ))}
                        </>
                      )}
                      {/* All done state */}
                      {allNeeded.length === 0 && allBought.length > 0 && (
                        <div className="px-4 py-3 bg-sage/5 text-sm text-sage font-medium text-center">
                          ✓ All done at {sourceLabels[src]}
                        </div>
                      )}
                    </div>
                  </section>
                );
              })}
            </>
          )}
        </div>
      );
    }

    function useNow() {
      const [now, setNow] = useState(() => MP.date.hkNowMin());
      useEffect(() => {
        const id = setInterval(() => setNow(MP.date.hkNowMin()), 1000);
        return () => clearInterval(id);
      }, []);
      return now;
    }

    function useClock() {
      const getHKParts = () => {
        const now = new Date();
        const fmt = new Intl.DateTimeFormat("en-US", {
          timeZone: "Asia/Hong_Kong",
          hour: "numeric", minute: "2-digit", second: "2-digit",
          day: "numeric", month: "short", weekday: "short",
          hour12: true,
        });
        return Object.fromEntries(fmt.formatToParts(now).map((p) => [p.type, p.value]));
      };
      const [parts, setParts] = useState(getHKParts);
      useEffect(() => {
        const id = setInterval(() => setParts(getHKParts()), 1000);
        return () => clearInterval(id);
      }, []);
      const sec = parseInt(parts.second || "0");
      return {
        h: parts.hour || "12",
        m: parts.minute || "00",
        s: parts.second || "00",
        ampm: parts.dayPeriod || "",
        blink: sec % 2 === 0,
        dateStr: `${parts.weekday || ""}, ${parts.day || ""} ${parts.month || ""}`,
      };
    }

    function TodaySchedule({ day, nextDay, recipesById, nowMin, lang }) {
      const tasks = MP.schedule.buildDayTasks(day, nextDay, recipesById);
      if (tasks.length === 0) return null;

      const [open, setOpen] = useState(false);

      // Group tasks by timestamp
      const groups = [];
      for (const tk of tasks) {
        const last = groups[groups.length - 1];
        if (last && last.at === tk.at) { last.items.push(tk); }
        else { groups.push({ at: tk.at, items: [tk] }); }
      }

      const kindIcon = { defrost: "❄️", marinate: "🧂", cook: "🔥", serve: "🍽️" };
      const kindClass = {
        defrost: "text-sky-700",
        marinate: "text-amber-700",
        cook: "text-terra",
        serve: "text-sage",
      };

      // Find which group is "up next"
      const upNextGroupIdx = groups.findIndex((g) => g.at > nowMin);
      const upNext = upNextGroupIdx >= 0 ? groups[upNextGroupIdx] : null;
      const upNextLabel = upNext
        ? `${MP.schedule.fmtTime(upNext.at)} — ${upNext.items.map((t) => t.label).join(", ")}`
        : "All done for today";

      return (
        <section className="bg-white rounded-2xl mb-6 shadow-sm ring-1 ring-black/5 overflow-hidden">
          <button
            onClick={() => setOpen((o) => !o)}
            className="w-full flex items-center justify-between px-4 py-3.5 text-left"
          >
            <div>
              <div className="text-xs font-semibold uppercase tracking-widest text-warm/60 mb-0.5">⏱ Today's schedule</div>
              <div className={`text-sm font-medium ${upNext ? "text-terra" : "text-warm"}`}>{upNextLabel}</div>
            </div>
            <span className={`text-warm/40 text-xl transition-transform shrink-0 ml-3 ${open ? "rotate-180" : ""}`}>⌄</span>
          </button>
          {open && (
            <div className="border-t border-sand px-4 pb-4 pt-3">
              <ol className="space-y-0">
                {groups.map((group, gi) => {
                  const allPast = group.at <= nowMin;
                  const isUpNext = gi === upNextGroupIdx;
                  return (
                    <li key={gi} className={`flex gap-4 ${allPast ? "opacity-40" : ""}`}>
                      {/* Time column */}
                      <div className="flex flex-col items-center">
                        <div className={`num text-sm font-semibold min-w-[3.5rem] text-right pt-0.5 ${isUpNext ? "text-terra" : "text-warm"}`}>
                          {MP.schedule.fmtTime(group.at)}
                        </div>
                        {gi < groups.length - 1 && (
                          <div className="w-px flex-1 bg-sand mt-1.5 mb-0" style={{ minHeight: "1.5rem" }} />
                        )}
                      </div>
                      {/* Tasks column */}
                      <div className={`flex-1 pb-4 ${isUpNext ? "rounded-xl bg-terra/8 ring-1 ring-terra/30 px-3 py-2 -mx-1 mb-3" : ""}`}>
                        {isUpNext && (
                          <div className="text-[10px] font-bold uppercase tracking-widest text-terra mb-1">Up next</div>
                        )}
                        <ul className="space-y-1">
                          {group.items.map((tk, ti) => (
                            <li key={ti} className="flex items-start gap-2 text-sm">
                              <span className={`${kindClass[tk.kind]} mt-0.5 shrink-0`}>{kindIcon[tk.kind]}</span>
                              <span className={allPast ? "line-through text-warm" : ""}>{tk.label}</span>
                              {tk.flagEarly && !allPast && (
                                <span className="text-[11px] text-terra ml-1 shrink-0">⚠ early</span>
                              )}
                            </li>
                          ))}
                        </ul>
                      </div>
                    </li>
                  );
                })}
              </ol>
            </div>
          )}
        </section>
      );
    }

    function UpNextBanner({ day, recipesById, nowMin, lang }) {
      if (!day) return null;
      const options = [];
      for (const m of ["breakfast", "lunch", "dinner"]) {
        const ids = MP.getMealRecipeIds(day, m); if (!ids.length) continue;
        const mealTime = day[m + "_time"];
        const serveMin = MP.schedule.parseHM(mealTime || MP.schedule.defaultMealTime(m));
        let earliestStart = Infinity, hasOvernightDep = false;
        for (const id of ids) {
          const r = recipesById[id]; if (!r) continue;
          const sched = MP.schedule.forMeal(m, r, { mealTime });
          if (sched.startMin < earliestStart) earliestStart = sched.startMin;
          if (sched.hasOvernightDep) hasOvernightDep = true;
        }
        const mealObj = MP.getMealObj(day, m);
        const primaryId = mealObj.protein || ids[0];
        options.push({ meal: m, recipe: recipesById[primaryId], serveMin, startMin: earliestStart, hasOvernightDep, count: ids.length });
      }
      const nextMeal = options.find((o) => o.serveMin > nowMin);
      if (!nextMeal) return (
        <div className="mb-5 px-5 py-4 rounded-2xl bg-sand/60 text-warm text-sm">🌙 All meals served for today — you're done!</div>
      );
      const minsToStart = nextMeal.startMin - nowMin;
      const minsToServe = nextMeal.serveMin - nowMin;
      const emoji = nextMeal.meal === "breakfast" ? "🍳" : nextMeal.meal === "lunch" ? "🥗" : "🍽️";
      const dishCount = nextMeal.count > 1 ? ` · ${nextMeal.count} dishes` : "";
      if (nextMeal.hasOvernightDep) return (
        <div className="mb-5 rounded-2xl overflow-hidden shadow-sm">
          <div className="bg-warm text-cream px-5 py-4">
            <div className="font-display text-xl">⚠️ This meal needed overnight preparation.</div>
            <p className="text-sm opacity-80 mt-2">Please check with Faith before you start cooking. Food should be on the table by <span className="num font-semibold">{MP.schedule.fmtTime(nextMeal.serveMin)}</span>.</p>
          </div>
        </div>
      );
      const overdue = minsToStart <= 0;
      return (
        <div className={`mb-5 rounded-2xl overflow-hidden shadow-sm ${overdue ? "ring-2 ring-terra" : ""}`}>
          <div className={`px-5 py-4 ${overdue ? "bg-terra text-cream" : "bg-sage text-cream"}`}>
            {overdue ? (
              <>
                <div className="font-display text-2xl leading-tight">It's time to start cooking now.</div>
                <p className="text-sm opacity-80 mt-2">Food for {MP.i18n.meals[lang][nextMeal.meal]} should be on the table by <span className="num font-semibold">{MP.schedule.fmtTime(nextMeal.serveMin)}</span>. Thank you, Auntie Leni!</p>
              </>
            ) : (
              <>
                <div className="text-xs font-semibold uppercase tracking-widest opacity-70 mb-1">Coming up — {MP.i18n.meals[lang][nextMeal.meal]}</div>
                <div className="text-base leading-snug">
                  Please start cooking at <span className="num font-display text-2xl font-bold">{MP.schedule.fmtTime(nextMeal.startMin)}</span>.
                </div>
                <div className="text-base leading-snug mt-1 opacity-80">
                  Food on the table by <span className="num font-semibold">{MP.schedule.fmtTime(nextMeal.serveMin)}</span>
                  {minsToServe > 0 && <span className="text-sm opacity-70"> ({minsToServe} min from now)</span>}.
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // Today meal view — shows schedule + one meal (meal controlled by App via bottom nav)
    function TodayView({ todayDay, tomorrowDay, recipesById, planServes, nowMin, lang, onVerify, activeMeal, upNextMeal }) {
      const MEAL_EMOJI = { breakfast: "🍳", lunch: "🥗", dinner: "🍽️" };
      const MEAL_LABEL = { breakfast: "Breakfast", lunch: "Lunch", dinner: "Dinner" };
      const hasRecipes = MP.getMealRecipeIds(todayDay, activeMeal).length > 0;
      return (
        <>
          {/* Only show the UpNext banner when this tab IS the next upcoming meal */}
          {activeMeal === upNextMeal && (
            <UpNextBanner day={todayDay} recipesById={recipesById} nowMin={nowMin} lang={lang} />
          )}
          <TodaySchedule day={todayDay} nextDay={tomorrowDay} recipesById={recipesById} nowMin={nowMin} lang={lang} />
          <PrepTomorrow tomorrowDay={tomorrowDay} recipesById={recipesById} lang={lang} />
          {/* Meal heading */}
          {hasRecipes && (
            <div className="mb-3">
              <h2 className="font-display text-2xl text-ink leading-none">
                {MEAL_EMOJI[activeMeal]} Please cook this for {MEAL_LABEL[activeMeal]}
              </h2>
            </div>
          )}
          <MealSection
            key={activeMeal}
            mealType={activeMeal}
            day={todayDay}
            recipesById={recipesById}
            planServes={planServes}
            lang={lang}
            onVerify={onVerify}
            nowMin={activeMeal === upNextMeal ? nowMin : null}
          />
          {!hasRecipes && (
            <div className="text-center text-warm/60 text-sm py-10">No meal planned for {MEAL_LABEL[activeMeal].toLowerCase()} today.</div>
          )}
        </>
      );
    }

    function App() {
      const [lang, setLang] = useState(langStore());
      const [tab, setTab] = useState(MP.date.currentMeal()); // "breakfast"|"lunch"|"dinner"|"coming"|"shop"
      const [recipes, setRecipes] = useState(null);
      const [plan, setPlan] = useState(null);
      const [upcoming, setUpcoming] = useState([]);
      const [pantry, setPantry] = useState({});
      const [sources, setSources] = useState({});
      const [extras, setExtras] = useState([]);
      const [study, setStudy] = useState(null); // { recipe, mealType, date, mealTime, mealServes }
      const [err, setErr] = useState(null);

      useEffect(() => { localStorage.setItem("mpHelperLang", lang); }, [lang]);

      useEffect(() => {
        (async () => {
          try {
            const today = MP.date.hkToday();
            const monday = MP.date.mondayOf(today);
            const [rs, wp, pa, upc, sr, ex] = await Promise.all([
              MP.api.getRecipes(), MP.api.getWeekplan(), MP.api.getPantry(),
              MP.api.getWeekplans(monday).catch(() => []),
              MP.api.getSources().catch(() => ({})),
              MP.api.getExtras().catch(() => ([])),
            ]);
            setRecipes(rs);
            setPlan(wp);
            setUpcoming(upc || []);
            setPantry(pa || {});
            setSources(sr || {});
            setExtras(ex || []);
          } catch (e) { setErr(e.message); }
        })();
      }, []);

      async function togglePantryItem(item, have) {
        setPantry((p) => {
          const next = { ...p };
          if (have) next[item] = new Date().toISOString().slice(0, 10);
          else delete next[item];
          return next;
        });
        try { await MP.api.togglePantry(item, have); }
        catch (e) {
          flash("Could not save: " + e.message, true);
          const fresh = await MP.api.getPantry().catch(() => ({}));
          setPantry(fresh || {});
        }
      }

      const today = MP.date.hkToday();
      const nowMin = useNow();
      const clockStr = MP.date.hkNowClock(lang);
      const recipesById = useMemo(() => {
        const m = {};
        (recipes || []).forEach((r) => { m[r.id] = r; });
        return m;
      }, [recipes]);

      const todayDay = useMemo(() => {
        if (!plan) return null;
        return (plan.days || []).find((d) => d.date === today);
      }, [plan, today]);

      const tomorrowDay = useMemo(() => {
        if (!plan) return null;
        const tmr = MP.date.addDays(today, 1);
        return (plan.days || []).find((d) => d.date === tmr);
      }, [plan, today]);

      // MUST be declared before any early returns so hook count stays stable.
      const needCount = useMemo(() => {
        if (!recipes || !plan) return 0;
        const g = MP.buildShoppingList(recipes, plan);
        let n = 0;
        for (const src of Object.values(g)) {
          for (const cat of Object.values(src)) {
            for (const it of cat) {
              if (!pantry[(it.item || "").toLowerCase().trim()]) n++;
            }
          }
        }
        return n;
      }, [recipes, plan, pantry]);

      async function verify(recipeId) {
        try {
          const r = recipesById[recipeId];
          if (!r) return;
          const updated = { ...r, translations_verified: true };
          try {
            await MP.api.upsertRecipe(recipeId, updated);
            setRecipes((rs) => rs.map((x) => (x.id === recipeId ? updated : x)));
            flash("✓ Thanks — translation marked verified.");
          } catch (e) {
            flash("Ask Faith to mark this verified — helper can't change recipes.");
          }
        } catch (e) { flash("Error: " + e.message, true); }
      }

      if (err) {
        return (
          <div className="p-6 max-w-md mx-auto">
            <p className="text-terra">Could not load: {err}</p>
            <p className="text-warm text-sm mt-2">Check the Worker URL in <code>shared.js</code>.</p>
          </div>
        );
      }
      if (!recipes || !plan) {
        return <div className="p-6 text-warm">Loading…</div>;
      }
      if (!todayDay) {
        return (
          <div className="p-6 max-w-md mx-auto">
            <h1 className="font-display text-3xl">{MP.date.prettyDate(today, lang)}</h1>
            <p className="mt-2 text-warm">{t(lang, "noPlanToday")}</p>
            <div className="mt-6"><LangToggle lang={lang} onChange={setLang} /></div>
          </div>
        );
      }

      const planServes = plan.serves || 4;
      function scaleRecipe(r, servesOverride) {
        if (!r) return r;
        const s = servesOverride || planServes;
        return {
          ...r,
          ingredients: (r.ingredients || []).map((i) => {
            try { return MP.scale(i, s, r.serves_base || 4); }
            catch (e) { return i; }
          }),
        };
      }

      const MEAL_TABS = ["breakfast", "lunch", "dinner"];
      const MEAL_EMOJI = { breakfast: "🍳", lunch: "🥗", dinner: "🍽️" };
      const upNextMeal = todayDay ? MEAL_TABS.find((m) => {
        if (!MP.getMealRecipeIds(todayDay, m).length) return false;
        const mt = todayDay[m + "_time"] || MP.schedule.defaultMealTime(m);
        return MP.schedule.parseHM(mt) > nowMin;
      }) : null;
      const isMealTab = MEAL_TABS.includes(tab);
      const headerTitle = isMealTab ? t(lang, "cookToday") : tab === "coming" ? t(lang, "thisWeek") : t(lang, "shopping");

      return (
        <main className="max-w-xl mx-auto px-4 pt-14 pb-24">
          <NowBar day={todayDay} nextDay={tomorrowDay} recipesById={recipesById} nowMin={nowMin} lang={lang} />

          <header className="mb-6 mt-6">
            {isMealTab && <div className="font-display text-2xl text-terra mb-1">Hello Auntie Leni 👋</div>}
            <h1 className="font-display text-4xl leading-none">{MP.date.dayName(today, lang)}</h1>
            <div className="text-sm text-warm mt-1 num">{MP.date.prettyDate(today, lang)}</div>
            {isMealTab && <p className="text-base text-ink/70 mt-3">Here is what you need to cook today. Tap each dish to see how to make it.</p>}
          </header>

          {isMealTab && (
            <TodayView
              todayDay={todayDay} tomorrowDay={tomorrowDay}
              recipesById={recipesById} planServes={planServes}
              nowMin={nowMin} lang={lang} onVerify={verify}
              activeMeal={tab} upNextMeal={upNextMeal}
            />
          )}

          {tab === "coming" && (
            <ComingUpView plan={plan} upcoming={upcoming} recipesById={recipesById} today={today} lang={lang}
              onOpen={(info) => setStudy(info)} />
          )}

          {tab === "shop" && (
            <ShoppingView
              recipes={recipes} plan={plan} pantry={pantry}
              onToggle={togglePantryItem} lang={lang}
              sources={sources} extras={extras}
              onToggleExtra={async (id, done) => {
                setExtras((xs) => xs.map((x) => x.id === id ? { ...x, done } : x));
                try { await MP.api.updateExtra(id, { done }); } catch (e) { flash("Save failed", true); }
              }}
            />
          )}

          <div id="flash" aria-live="polite"
            className="fixed left-1/2 -translate-x-1/2 bottom-24 bg-ink text-cream px-4 py-2 rounded-full text-sm shadow-lg opacity-0 pointer-events-none transition">
          </div>

          {/* Bottom navigation */}
          <nav className="fixed bottom-0 left-0 right-0 z-30 bg-cream/97 backdrop-blur border-t border-warm/10 flex">
            {MEAL_TABS.map((meal) => {
              const isActive = tab === meal;
              const isUpNext = meal === upNextMeal;
              const hasRecipes = todayDay && MP.getMealRecipeIds(todayDay, meal).length > 0;
              return (
                <button key={meal} onClick={() => setTab(meal)}
                  className={`flex-1 flex flex-col items-center py-2.5 gap-0.5 relative transition
                    ${isActive ? "text-terra" : hasRecipes ? "text-warm" : "text-warm/30"}`}>
                  {isUpNext && !isActive && (
                    <span className="absolute top-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-terra" />
                  )}
                  <span className="text-lg leading-none">{MEAL_EMOJI[meal]}</span>
                  <span className="text-[10px] font-medium">{MP.i18n.meals[lang][meal]}</span>
                  {isActive && <span className="absolute bottom-0 left-1/4 right-1/4 h-0.5 bg-terra rounded-full" />}
                </button>
              );
            })}
            <button onClick={() => setTab("coming")}
              className={`flex-1 flex flex-col items-center py-2.5 gap-0.5 relative transition ${tab === "coming" ? "text-terra" : "text-warm"}`}>
              <span className="text-lg leading-none">📅</span>
              <span className="text-[10px] font-medium">{t(lang, "thisWeek")}</span>
              {tab === "coming" && <span className="absolute bottom-0 left-1/4 right-1/4 h-0.5 bg-terra rounded-full" />}
            </button>
            <button onClick={() => setTab("shop")}
              className={`flex-1 flex flex-col items-center py-2.5 gap-0.5 relative transition ${tab === "shop" ? "text-terra" : "text-warm"}`}>
              <span className="text-lg leading-none">🛒</span>
              <span className="text-[10px] font-medium relative">
                {t(lang, "shopping")}
                {needCount > 0 && <span className="absolute -top-2 -right-3 bg-terra text-cream text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center">{needCount}</span>}
              </span>
              {tab === "shop" && <span className="absolute bottom-0 left-1/4 right-1/4 h-0.5 bg-terra rounded-full" />}
            </button>
            <div className="flex flex-col items-center justify-center px-2 py-2.5 border-l border-warm/10">
              <LangToggle lang={lang} onChange={setLang} />
            </div>
          </nav>

          {study && (
            <div className="fixed inset-0 z-40 bg-ink/60 flex items-start justify-center p-3 overflow-y-auto"
              onClick={() => setStudy(null)}>
              <div className="bg-cream w-full max-w-xl rounded-2xl shadow-xl mt-6 mb-10 overflow-hidden"
                onClick={(e) => e.stopPropagation()}>
                <div className="flex items-center justify-between px-4 py-3 border-b border-warm/10 sticky top-0 bg-cream z-10">
                  <div className="font-display text-lg">
                    {MP.date.dayName(study.day.date, lang)} · {MP.i18n.meals[lang][study.mealType]}
                  </div>
                  <button onClick={() => setStudy(null)} className="text-warm text-2xl leading-none">×</button>
                </div>
                <div className="p-4">
                  <MealSection
                    mealType={study.mealType} day={study.day}
                    recipesById={recipesById} planServes={planServes}
                    lang={lang} onVerify={verify} />
                </div>
              </div>
            </div>
          )}
        </main>
      );
    }

    function flash(msg, bad=false) {
      const el = document.getElementById("flash");
      if (!el) return;
      el.textContent = msg;
      el.style.background = bad ? "#b4593a" : "";
      el.style.opacity = "1";
      clearTimeout(el._to);
      el._to = setTimeout(() => { el.style.opacity = "0"; }, 2200);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
