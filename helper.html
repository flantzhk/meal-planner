<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f5ecdf" />
  <title>Today's meals</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f5ecdf'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='44'%3E🍳%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: "#f5ecdf", sand: "#ebddc6", ink: "#2e2a24",
            terra: "#b4593a", sage: "#6b8a6c", warm: "#6d5b46",
          },
          fontFamily: {
            display: ["Lora", "Georgia", "serif"],
            body: ["Source Sans 3", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    html, body { background: #f5ecdf; color: #2e2a24; font-family: "Source Sans 3", system-ui, sans-serif; }
    h1, h2, h3 { font-family: Lora, Georgia, serif; }
    .step-num { font-variant-numeric: tabular-nums; }
    .num { font-variant-numeric: tabular-nums; }
  </style>
  <script src="shared.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState, useMemo } = React;
    const t = (lang, key) => MP.i18n.t(lang, key);

    function langStore() {
      return localStorage.getItem("mpHelperLang") || "en";
    }

    function LangToggle({ lang, onChange }) {
      return (
        <div className="inline-flex rounded-full bg-sand p-1 text-sm">
          {MP.i18n.languages.map((l) => (
            <button
              key={l.code}
              onClick={() => onChange(l.code)}
              className={`px-3 py-1 rounded-full transition ${
                lang === l.code ? "bg-cream shadow text-ink" : "text-warm"
              }`}>
              {l.code.toUpperCase()}
            </button>
          ))}
        </div>
      );
    }

    // Change 2: NowBar — fixed slim bar always visible at top
    function NowBar({ day, nextDay, recipesById, nowMin, lang }) {
      let content = null;
      let overdue = false;

      if (day) {
        const tasks = MP.schedule.buildDayTasks(day, nextDay, recipesById);
        const upcoming = tasks.find((tk) => (tk.kind === "cook" || tk.kind === "serve") && tk.at > nowMin);
        if (upcoming) {
          const minsToStart = upcoming.at - nowMin;
          overdue = minsToStart <= 0;
          const startMsg = overdue
            ? "⚡ Cook now"
            : minsToStart < 60
              ? `Start cooking in ${minsToStart} min`
              : `Start cooking at ${MP.schedule.fmtTime(upcoming.at)}`;
          content = startMsg;
        } else {
          content = "🌙 All done for today";
        }
      } else {
        content = "🌙 All done for today";
      }

      const nowClock = MP.date.hkNowClock(lang);

      return (
        <div
          className={`fixed top-0 left-0 right-0 z-20 flex items-center justify-between px-4 text-sm ${
            overdue ? "bg-terra text-cream" : "bg-ink text-cream"
          }`}
          style={{ height: "44px" }}>
          <span className="num font-semibold">{nowClock}</span>
          <span>{content}</span>
        </div>
      );
    }

    function MealCard({ mealType, recipe, lang, today, mealTime, mealServes, onVerify, nowMin }) {
      const sched = MP.schedule.forMeal(mealType, recipe, { mealTime });
      const name = MP.i18n.recipeName(recipe, lang);
      const serveMin = MP.schedule.parseHM(mealTime || MP.schedule.defaultMealTime(mealType));
      const startMin = serveMin - (recipe.prep_time_mins || 0) - (recipe.cook_time_mins || 0);
      const servedAtLabel = MP.schedule.fmtTime(serveMin);
      const showEng = !recipe.translations_verified && lang !== "en";

      // "Up next" = first meal whose serve time is still in the future
      const isUpNext = nowMin != null && nowMin < serveMin;

      return (
        <div className="relative">
          {isUpNext && (
            <div className="absolute -top-3 left-4 z-10 bg-terra text-cream text-[11px] font-semibold uppercase tracking-widest px-3 py-1 rounded-full shadow-sm">
              Up next
            </div>
          )}
        <article className="bg-white rounded-2xl overflow-hidden shadow-sm ring-1 ring-black/5">
          {MP.recipeImage(recipe) && (
            <img src={MP.recipeImage(recipe)} alt={recipe.name}
              className="w-full h-44 object-cover"
              onLoad={(e) => {
                if (!MP.isYoutubePlaceholder(e.target)) return;
                const src = e.target.src;
                if (src.includes("maxresdefault")) { e.target.src = src.replace("maxresdefault", "hqdefault"); return; }
                if (recipe.hero_image && src !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                e.target.style.display = "none";
              }}
              onError={(e) => {
                const src = e.target.src;
                if (src.includes("maxresdefault")) { e.target.src = src.replace("maxresdefault", "hqdefault"); return; }
                if (recipe.hero_image && src !== recipe.hero_image) { e.target.src = recipe.hero_image; return; }
                e.target.style.display = "none";
              }} />
          )}
          <div className="p-5">
            <div className="flex items-start justify-between gap-3">
              <div>
                <div className="flex items-center gap-2 text-terra">
                  <span className="text-2xl leading-none">{mealType === "breakfast" ? "🍳" : mealType === "lunch" ? "🥗" : "🍽️"}</span>
                  <span className="font-display text-xl">{MP.i18n.meals[lang][mealType]}</span>
                </div>
                <h2 className="font-display text-2xl leading-tight mt-1">{name}</h2>
                {showEng && (
                  <div className="text-sm text-warm/80 italic mt-0.5">{recipe.name}</div>
                )}
              </div>
              <div className="text-right shrink-0">
                <div className="text-xs text-warm">{t(lang, "start")}</div>
                <div className="font-display text-2xl num">{sched.startTime}</div>
                <div className="text-xs text-warm mt-0.5">Serve at <span className="num">{servedAtLabel}</span></div>
                {mealServes && (
                  <div className="text-xs text-warm mt-0.5">For <span className="num">{mealServes}</span> {mealServes === 1 ? "person" : "people"}</div>
                )}
                {sched.flagEarly && (
                  <div className="text-xs text-terra mt-1 max-w-[9rem]">
                    ⚠ {t(lang, "startEarly")}
                  </div>
                )}
              </div>
            </div>

            {recipe.youtube_url && (
              <a href={recipe.youtube_url} target="_blank" rel="noopener"
                 className="mt-3 inline-flex items-center gap-2 bg-terra text-cream px-4 py-2 rounded-full text-sm font-medium">
                ▶ {t(lang, "watch")}
              </a>
            )}

            <h3 className="mt-5 font-display text-lg">{t(lang, "ingredients")}</h3>
            <ul className="mt-1 text-sm leading-relaxed">
              {recipe.ingredients.map((ing, i) => (
                <li key={i} className="flex gap-3 py-0.5">
                  <span className="num text-warm min-w-[4.5rem]">
                    {Number(ing.amount.toFixed(2)).toString()} {ing.unit}
                  </span>
                  <span>{ing.item}</span>
                </li>
              ))}
            </ul>

            <h3 className="mt-5 font-display text-lg">{t(lang, "steps")}</h3>
            <ol className="mt-1 space-y-3">
              {recipe.steps.map((s) => (
                <li key={s.step} className="flex gap-3">
                  <span className="step-num font-display text-terra text-lg leading-7 min-w-[1.5rem]">
                    {s.step}
                  </span>
                  <div className="leading-relaxed text-sm">
                    <div>{MP.i18n.stepText(s, lang)}</div>
                    {showEng && (
                      <div className="text-warm/70 italic text-sm mt-0.5">{s.instruction}</div>
                    )}
                  </div>
                </li>
              ))}
            </ol>

            {!recipe.translations_verified && lang !== "en" && (
              <button onClick={() => onVerify(recipe.id)}
                className="mt-4 text-xs underline text-warm/80">
                ✓ {t(lang, "verify")}
              </button>
            )}
          </div>
        </article>
        </div>
      );
    }

    function PrepTomorrow({ tomorrowDay, recipesById, lang }) {
      if (!tomorrowDay) return null;
      const items = [];
      for (const meal of ["breakfast", "lunch", "dinner"]) {
        const id = tomorrowDay[meal];
        if (!id) continue;
        const r = recipesById[id];
        if (!r) continue;
        for (const d of r.dependencies || []) {
          if (d.type === "defrost" && d.hours_before >= 12) {
            items.push(`Take ${r.name} out of freezer today — for tomorrow's ${meal}.`);
          }
          if (d.type === "marinate" && d.hours_before >= 8) {
            items.push(`Start marinating ${r.name} tonight — for tomorrow's ${meal}.`);
          }
        }
      }
      if (items.length === 0) return null;
      return (
        <section className="mt-8 rounded-2xl border border-sage/40 bg-sage/10 p-4">
          <h3 className="font-display text-lg mb-2">🌙 {t(lang, "prepTomorrow")}</h3>
          <ul className="list-disc pl-5 space-y-1 text-sm">
            {items.map((it, i) => <li key={i}>{it}</li>)}
          </ul>
        </section>
      );
    }

    function ComingUpView({ plan, upcoming, recipesById, today, lang, onOpen }) {
      const weekFloor = MP.date.mondayOf(today);
      const allDays = [];
      const seen = new Set();
      const addPlan = (p) => {
        if (!p) return;
        for (const d of p.days || []) {
          if (d.date < weekFloor) continue;
          if (seen.has(d.date)) continue;
          seen.add(d.date);
          allDays.push({ ...d, _planServes: p.serves || 4 });
        }
      };
      addPlan(plan);
      for (const p of upcoming || []) addPlan(p);
      allDays.sort((a, b) => a.date.localeCompare(b.date));

      if (allDays.length === 0) {
        return <p className="text-warm text-sm">Nothing planned yet.</p>;
      }

      const groups = {};
      for (const d of allDays) {
        const wk = MP.date.mondayOf(d.date);
        (groups[wk] = groups[wk] || []).push(d);
      }
      const weekKeys = Object.keys(groups).sort();
      const todayMonday = MP.date.mondayOf(today);

      return (
        <div className="space-y-6">
          {weekKeys.map((wk) => {
            const label = wk === todayMonday ? "This week" :
                          wk === MP.date.addDays(todayMonday, 7) ? "Next week" :
                          `Week of ${MP.date.prettyDate(wk)}`;
            return (
              <section key={wk}>
                <h3 className="font-display text-xl text-terra mb-2">{label}</h3>
                <div className="space-y-3">
                  {groups[wk].map((d) => {
                    const isToday = d.date === today;
                    const isPast = d.date < today;
                    return (
                      <div key={d.date} className={`rounded-xl p-4 ring-1 ${
                        isToday ? "bg-white ring-terra/40" :
                        isPast ? "bg-white ring-black/5 opacity-60" :
                        "bg-white ring-black/5"
                      }`}>
                        <div className="flex items-baseline justify-between">
                          <div className="font-display text-lg">
                            {MP.date.dayName(d.date)}
                            {isToday && " · Today"}
                            {isPast && " · Done"}
                          </div>
                          <div className="text-xs text-warm num">{MP.date.prettyDate(d.date)}</div>
                        </div>
                        <ul className="mt-2 space-y-1 text-sm">
                          {["breakfast","lunch","dinner"].map((m) => {
                            const r = d[m] ? recipesById[d[m]] : null;
                            if (!r) return (
                              <li key={m} className="flex justify-between text-warm/50 text-sm">
                                <span className="uppercase tracking-wide text-xs">{m}</span>
                                <span className="italic">— not planned</span>
                              </li>
                            );
                            const time = d[m + "_time"] || MP.schedule.defaultMealTime(m);
                            const servesNote = d[m + "_serves"] ? ` · ${d[m + "_serves"]}p` : "";
                            // Change 7: dependency icons
                            const deps = r.dependencies || [];
                            const hasLongDep = deps.some((dep) => dep.hours_before >= 12);
                            const hasMarinate = deps.some((dep) => dep.type === "marinate" && dep.hours_before < 12);
                            return (
                              <li key={m}>
                                <button
                                  onClick={() => onOpen && onOpen({ recipe: r, mealType: m, date: d.date, mealTime: d[m+"_time"], mealServes: d[m+"_serves"] })}
                                  className="w-full flex items-baseline justify-between gap-2 text-left hover:bg-terra/5 rounded-lg px-1 py-0.5 transition">
                                  <span className="uppercase tracking-wide text-xs text-warm min-w-[5.5rem]">{m}</span>
                                  <span className="flex-1 underline decoration-terra/30 underline-offset-2">
                                    {r.name}
                                    {hasLongDep && <span className="ml-1 text-xs" title="Needs overnight prep">🌙</span>}
                                    {hasMarinate && <span className="ml-1 text-xs" title="Needs marinating">🧂</span>}
                                  </span>
                                  <span className="text-xs text-warm num shrink-0">{MP.schedule.fmtTime(MP.schedule.parseHM(time))}{servesNote}</span>
                                </button>
                              </li>
                            );
                          })}
                        </ul>
                      </div>
                    );
                  })}
                </div>
              </section>
            );
          })}
        </div>
      );
    }

    function ShoppingView({ recipes, plan, pantry, onToggle, lang, sources, extras, onToggleExtra }) {
      const groups = MP.buildShoppingList(recipes, plan, sources);
      // Change 8: persist filter to sessionStorage
      const [filter, setFilter] = useState(() => sessionStorage.getItem("mpShopFilter") || "all");
      // Change 4: search state
      const [search, setSearch] = useState("");

      const sourceLabels = {
        "wet-market": "🥬 Wet market", "supermarket": "🛒 Fusion / Marketplace",
        "hktvmall": "📦 HKTVmall", "other": "Other",
      };
      const categoryLabels = {
        meat: "Meat & Seafood", produce: "Vegetables & Fruit",
        dairy: "Dairy & Eggs", pantry: "Pantry & Dry Goods",
        bakery: "Bread & Bakery", frozen: "Frozen", other: "Other",
      };
      const sourceOrder = ["wet-market", "supermarket", "hktvmall", "other"];
      const key = (it) => (it.item || "").toLowerCase().trim();

      // Change 8: persist filter on change
      function updateFilter(val) {
        setFilter(val);
        sessionStorage.setItem("mpShopFilter", val);
      }

      const counts = {};
      for (const src of sourceOrder) {
        const g = groups[src];
        if (!g) continue;
        let remaining = 0, total = 0;
        for (const items of Object.values(g)) for (const it of items) {
          total++; if (!pantry[key(it)]) remaining++;
        }
        counts[src] = { remaining, total };
      }
      const extrasRemaining = (extras || []).filter((x) => !x.done).length;
      const extrasTotal = (extras || []).length;

      const showSource = (src) => filter === "all" || filter === src;
      const showExtras = extrasTotal > 0 && (filter === "all" || filter === "extras");

      // Change 4: search — flatten all items across all sources
      const searchActive = search.trim().length > 0;
      let searchResults = [];
      if (searchActive) {
        const q = search.toLowerCase();
        for (const src of sourceOrder) {
          const g = groups[src];
          if (!g) continue;
          for (const [cat, items] of Object.entries(g)) {
            for (const it of items) {
              if ((it.item || "").toLowerCase().includes(q)) {
                searchResults.push({ ...it, _src: src, _cat: cat });
              }
            }
          }
        }
      }

      return (
        <div>
          <p className="text-sm text-warm mb-3">
            Tap 'Got it' to mark items you already have. They'll move to the bottom.
          </p>

          {/* Change 4: Search input */}
          <div className="relative mb-3">
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Search items…"
              className="w-full rounded-xl border border-warm/20 bg-white px-4 py-2.5 pr-10 text-sm" />
            {search && <button onClick={() => setSearch("")} className="absolute right-3 top-1/2 -translate-y-1/2 text-warm">×</button>}
          </div>

          {/* Filter nav — hidden during search */}
          {!searchActive && (
            <nav className="sticky top-11 z-10 -mx-4 px-4 py-2 mb-4 bg-cream/95 backdrop-blur border-b border-warm/10 flex flex-wrap gap-3">
              {/* Change 1: unified active state for All button */}
              <button onClick={() => updateFilter("all")}
                className={`px-3 py-1.5 rounded-full text-sm ring-1 ${filter === "all" ? "ring-2 ring-terra text-terra bg-white" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                All
              </button>
              {sourceOrder.map((src) => {
                if (!counts[src]) return null;
                const active = filter === src;
                const { remaining, total } = counts[src];
                return (
                  <button key={src} onClick={() => updateFilter(src)}
                    className={`px-3 py-1.5 rounded-full text-sm ring-1 ${active ? "ring-2 ring-terra text-terra bg-white" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                    {sourceLabels[src]}
                    <span className={`ml-1.5 num text-xs ${active ? "text-terra/70" : "text-warm"}`}>{remaining}/{total}</span>
                  </button>
                );
              })}
              {extrasTotal > 0 && (
                <button onClick={() => updateFilter("extras")}
                  className={`px-3 py-1.5 rounded-full text-sm ring-1 ${filter === "extras" ? "ring-2 ring-terra text-terra bg-white" : "bg-white text-warm ring-1 ring-warm/20"}`}>
                  ➕ Extras <span className={`ml-1.5 num text-xs ${filter === "extras" ? "text-terra/70" : "text-warm"}`}>{extrasRemaining}/{extrasTotal}</span>
                </button>
              )}
            </nav>
          )}

          {/* Change 4: Search results */}
          {searchActive && (
            <div className="mb-6">
              <div className="text-xs text-warm uppercase tracking-wide mb-2">Results for '{search}'</div>
              {searchResults.length === 0 && (
                <p className="text-sm text-warm/60 italic">No items found.</p>
              )}
              <ul className="space-y-1">
                {searchResults.map((it, i) => {
                  const has = !!pantry[key(it)];
                  return (
                    <li key={i} className={`flex items-center gap-3 text-sm p-4 rounded-lg bg-white`}>
                      {/* Change 5: Got it pill button */}
                      <button
                        aria-label={has ? "Mark as need to buy" : "Mark as already have"}
                        onClick={() => onToggle(key(it), !has)}
                        className={`shrink-0 px-2 py-0.5 rounded-full text-xs font-semibold border transition ${
                          has ? "bg-sage/20 text-sage border-sage/40" : "bg-white text-warm border-warm/30"
                        }`}>
                        {has ? "✓ Got it" : "Got it"}
                      </button>
                      <span className="num text-warm min-w-[5rem]">
                        {Number(it.amount.toFixed(2)).toString()} {it.unit}
                      </span>
                      <span className="flex-1">{it.item}</span>
                      <span className="text-xs text-warm/60">{sourceLabels[it._src] || it._src}</span>
                    </li>
                  );
                })}
              </ul>
            </div>
          )}

          {/* Normal view — hidden during search */}
          {!searchActive && (
            <>
              {showExtras && (
                <section className="mb-6">
                  <h3 className="font-display text-lg text-sage">➕ Extras</h3>
                  {/* Change 5: extras with Got it pill */}
                  {(() => {
                    const unchecked = (extras || []).filter((x) => !x.done);
                    const checked = (extras || []).filter((x) => x.done);
                    return (
                      <>
                        <ul className="mt-2 space-y-1">
                          {unchecked.map((x) => (
                            <li key={x.id} className="flex items-center gap-3 text-sm p-4 rounded-lg bg-white">
                              <button
                                onClick={() => onToggleExtra && onToggleExtra(x.id, !x.done)}
                                className="shrink-0 px-2 py-0.5 rounded-full text-xs font-semibold border transition bg-white text-warm border-warm/30">
                                Got it
                              </button>
                              <span className="flex-1">{x.item}</span>
                              <span className="text-xs text-warm">{sourceLabels[x.source] || x.source}</span>
                            </li>
                          ))}
                        </ul>
                        {checked.length > 0 && (
                          <details className="mt-2">
                            <summary className="text-xs text-warm cursor-pointer">Got it ({checked.length})</summary>
                            <ul className="mt-1 space-y-1">
                              {checked.map((x) => (
                                <li key={x.id} className="flex items-center gap-3 text-sm p-4 rounded-lg bg-white opacity-50">
                                  <button
                                    onClick={() => onToggleExtra && onToggleExtra(x.id, !x.done)}
                                    className="shrink-0 px-2 py-0.5 rounded-full text-xs font-semibold border transition bg-sage/20 text-sage border-sage/40">
                                    ✓ Got it
                                  </button>
                                  <span className="flex-1">{x.item}</span>
                                  <span className="text-xs text-warm">{sourceLabels[x.source] || x.source}</span>
                                </li>
                              ))}
                            </ul>
                          </details>
                        )}
                      </>
                    );
                  })()}
                </section>
              )}

              {sourceOrder.map((src) => {
                const g = groups[src];
                if (!g) return null;
                if (!showSource(src)) return null;
                return (
                  <section key={src} className="mb-6">
                    <h3 className="font-display text-lg text-terra">{sourceLabels[src] || src}</h3>
                    {Object.entries(g).map(([cat, items]) => {
                      const unchecked = items.filter((it) => !pantry[key(it)]);
                      const checked = items.filter((it) => !!pantry[key(it)]);
                      return (
                        <div key={cat} className="mt-2">
                          <div className="uppercase tracking-wide text-xs text-warm mb-1">{categoryLabels[cat] || cat}</div>
                          {/* Change 5: unchecked items with Got it pill */}
                          <ul className="space-y-1">
                            {unchecked.map((it, i) => {
                              const has = false;
                              return (
                                <li key={i} className="flex items-center gap-3 text-sm p-4 rounded-lg bg-white">
                                  <button
                                    aria-label="Mark as already have"
                                    onClick={() => onToggle(key(it), true)}
                                    className="shrink-0 px-2 py-0.5 rounded-full text-xs font-semibold border transition bg-white text-warm border-warm/30">
                                    Got it
                                  </button>
                                  <span className="num text-warm min-w-[5rem]">
                                    {Number(it.amount.toFixed(2)).toString()} {it.unit}
                                  </span>
                                  <span>{it.item}</span>
                                </li>
                              );
                            })}
                          </ul>
                          {/* Change 5: checked items in collapsed details at bottom */}
                          {checked.length > 0 && (
                            <details>
                              <summary className="text-xs text-warm cursor-pointer mt-2">Got it ({checked.length})</summary>
                              <ul className="mt-1 space-y-1">
                                {checked.map((it, i) => (
                                  <li key={i} className="flex items-center gap-3 text-sm p-4 rounded-lg bg-white opacity-50">
                                    <button
                                      aria-label="Mark as need to buy"
                                      onClick={() => onToggle(key(it), false)}
                                      className="shrink-0 px-2 py-0.5 rounded-full text-xs font-semibold border transition bg-sage/20 text-sage border-sage/40">
                                      ✓ Got it
                                    </button>
                                    <span className="num text-warm min-w-[5rem]">
                                      {Number(it.amount.toFixed(2)).toString()} {it.unit}
                                    </span>
                                    <span>{it.item}</span>
                                  </li>
                                ))}
                              </ul>
                            </details>
                          )}
                        </div>
                      );
                    })}
                  </section>
                );
              })}
            </>
          )}
        </div>
      );
    }

    function useNow() {
      const [now, setNow] = useState(() => MP.date.hkNowMin());
      useEffect(() => {
        const id = setInterval(() => setNow(MP.date.hkNowMin()), 30 * 1000);
        return () => clearInterval(id);
      }, []);
      return now;
    }

    function TodaySchedule({ day, nextDay, recipesById, nowMin, lang }) {
      const tasks = MP.schedule.buildDayTasks(day, nextDay, recipesById);
      if (tasks.length === 0) return null;
      const kindLabel = { defrost: "❄️ Defrost", marinate: "🧂 Marinate", cook: "🔥 Cook", serve: "🍽️ Serve" };
      const kindClass = {
        defrost: "bg-sky-100 text-sky-900",
        marinate: "bg-amber-100 text-amber-900",
        cook: "bg-terra/20 text-terra",
        serve: "bg-sage/20 text-sage",
      };
      return (
        <section className="bg-white rounded-2xl p-4 mb-6 shadow-sm ring-1 ring-black/5">
          <h3 className="font-display text-lg mb-3">⏱ Today's schedule</h3>
          <ol className="space-y-2">
            {tasks.map((tk, i) => {
              const past = tk.at <= nowMin;
              const upNext = !past && tasks.slice(0, i).every((x) => x.at <= nowMin);
              return (
                <li key={i}
                  className={`flex items-start gap-3 p-2 rounded-lg ${
                    upNext ? "bg-terra/10 ring-1 ring-terra" :
                    past ? "opacity-40" : ""
                  }`}>
                  <div className="num text-warm min-w-[4.5rem] pt-0.5">
                    {MP.schedule.fmtTime(tk.at)}
                  </div>
                  <div className="flex-1">
                    <span className={`inline-block px-2 py-0.5 rounded-full text-xs mr-2 ${kindClass[tk.kind]}`}>
                      {kindLabel[tk.kind]}
                    </span>
                    <span className={past ? "line-through" : ""}>{tk.label}</span>
                    {tk.flagEarly && !past && (
                      <div className="text-xs text-terra mt-0.5">⚠ Start earlier than usual</div>
                    )}
                  </div>
                  {upNext && <span className="text-xs text-terra font-semibold self-center">← next</span>}
                </li>
              );
            })}
          </ol>
        </section>
      );
    }

    function UpNextBanner({ day, recipesById, nowMin, lang }) {
      if (!day) return null;
      const meals = ["breakfast", "lunch", "dinner"];
      const options = [];
      for (const m of meals) {
        if (!day[m]) continue;
        const r = recipesById[day[m]]; if (!r) continue;
        const mealTime = day[m + "_time"];
        const serveMin = MP.schedule.parseHM(mealTime || MP.schedule.defaultMealTime(m));
        const sched = MP.schedule.forMeal(m, r, { mealTime });
        options.push({ meal: m, recipe: r, serveMin, startMin: sched.startMin });
      }
      const nextMeal = options.find((o) => o.serveMin > nowMin);
      if (!nextMeal) {
        return (
          <div className="mb-4 p-4 rounded-xl bg-sand/60 text-sm text-warm">
            🌙 All meals served for today. Rest up!
          </div>
        );
      }
      const minsToStart = nextMeal.startMin - nowMin;
      const minsToServe = nextMeal.serveMin - nowMin;
      const emoji = nextMeal.meal === "breakfast" ? "🍳" : nextMeal.meal === "lunch" ? "🥗" : "🍽️";
      const startMsg =
        minsToStart <= 0 ? `⚡ Start cooking now — should already be on the stove`
        : minsToStart < 60 ? `Start cooking in ${minsToStart} min (at ${MP.schedule.fmtTime(nextMeal.startMin)})`
        : `Start cooking at ${MP.schedule.fmtTime(nextMeal.startMin)}`;
      return (
        <div className={`mb-4 p-4 rounded-2xl ring-1 ${minsToStart <= 0 ? "bg-terra/15 ring-terra text-ink" : "bg-sage/15 ring-sage/40 text-ink"}`}>
          <div className="text-xs uppercase tracking-wide text-warm">Up next</div>
          <div className="font-display text-xl mt-1">
            {emoji} {MP.i18n.meals[lang][nextMeal.meal]} — {MP.i18n.recipeName(nextMeal.recipe, lang)}
          </div>
          <div className="text-sm text-warm mt-1">
            Serve at <span className="num font-semibold">{MP.schedule.fmtTime(nextMeal.serveMin)}</span> ({minsToServe} min)
          </div>
          <div className={`text-sm mt-0.5 ${minsToStart <= 0 ? "text-terra font-semibold" : "text-warm"}`}>
            {startMsg}
          </div>
        </div>
      );
    }

    function App() {
      const [lang, setLang] = useState(langStore());
      const [tab, setTab] = useState("today"); // "today" | "coming" | "shop"
      const [recipes, setRecipes] = useState(null);
      const [plan, setPlan] = useState(null);
      const [upcoming, setUpcoming] = useState([]);
      const [pantry, setPantry] = useState({});
      const [sources, setSources] = useState({});
      const [extras, setExtras] = useState([]);
      const [study, setStudy] = useState(null); // { recipe, mealType, date, mealTime, mealServes }
      const [err, setErr] = useState(null);

      useEffect(() => { localStorage.setItem("mpHelperLang", lang); }, [lang]);

      useEffect(() => {
        (async () => {
          try {
            const today = MP.date.hkToday();
            const monday = MP.date.mondayOf(today);
            const [rs, wp, pa, upc, sr, ex] = await Promise.all([
              MP.api.getRecipes(), MP.api.getWeekplan(), MP.api.getPantry(),
              MP.api.getWeekplans(monday).catch(() => []),
              MP.api.getSources().catch(() => ({})),
              MP.api.getExtras().catch(() => ([])),
            ]);
            setRecipes(rs);
            setPlan(wp);
            setUpcoming(upc || []);
            setPantry(pa || {});
            setSources(sr || {});
            setExtras(ex || []);
          } catch (e) { setErr(e.message); }
        })();
      }, []);

      async function togglePantryItem(item, have) {
        setPantry((p) => {
          const next = { ...p };
          if (have) next[item] = new Date().toISOString().slice(0, 10);
          else delete next[item];
          return next;
        });
        try { await MP.api.togglePantry(item, have); }
        catch (e) {
          flash("Could not save: " + e.message, true);
          const fresh = await MP.api.getPantry().catch(() => ({}));
          setPantry(fresh || {});
        }
      }

      const today = MP.date.hkToday();
      const nowMin = useNow();
      const clockStr = MP.date.hkNowClock(lang);
      const recipesById = useMemo(() => {
        const m = {};
        (recipes || []).forEach((r) => { m[r.id] = r; });
        return m;
      }, [recipes]);

      const todayDay = useMemo(() => {
        if (!plan) return null;
        return (plan.days || []).find((d) => d.date === today);
      }, [plan, today]);

      const tomorrowDay = useMemo(() => {
        if (!plan) return null;
        const tmr = MP.date.addDays(today, 1);
        return (plan.days || []).find((d) => d.date === tmr);
      }, [plan, today]);

      // MUST be declared before any early returns so hook count stays stable.
      const needCount = useMemo(() => {
        if (!recipes || !plan) return 0;
        const g = MP.buildShoppingList(recipes, plan);
        let n = 0;
        for (const src of Object.values(g)) {
          for (const cat of Object.values(src)) {
            for (const it of cat) {
              if (!pantry[(it.item || "").toLowerCase().trim()]) n++;
            }
          }
        }
        return n;
      }, [recipes, plan, pantry]);

      async function verify(recipeId) {
        try {
          const r = recipesById[recipeId];
          if (!r) return;
          const updated = { ...r, translations_verified: true };
          try {
            await MP.api.upsertRecipe(recipeId, updated);
            setRecipes((rs) => rs.map((x) => (x.id === recipeId ? updated : x)));
            flash("✓ Thanks — translation marked verified.");
          } catch (e) {
            flash("Ask Faith to mark this verified — helper can't change recipes.");
          }
        } catch (e) { flash("Error: " + e.message, true); }
      }

      if (err) {
        return (
          <div className="p-6 max-w-md mx-auto">
            <p className="text-terra">Could not load: {err}</p>
            <p className="text-warm text-sm mt-2">Check the Worker URL in <code>shared.js</code>.</p>
          </div>
        );
      }
      if (!recipes || !plan) {
        return <div className="p-6 text-warm">Loading…</div>;
      }
      if (!todayDay) {
        return (
          <div className="p-6 max-w-md mx-auto">
            <h1 className="font-display text-3xl">{MP.date.prettyDate(today, lang)}</h1>
            <p className="mt-2 text-warm">{t(lang, "noPlanToday")}</p>
            <div className="mt-6"><LangToggle lang={lang} onChange={setLang} /></div>
          </div>
        );
      }

      const planServes = plan.serves || 4;
      function scaleRecipe(r, servesOverride) {
        const s = servesOverride || planServes;
        return {
          ...r,
          ingredients: r.ingredients.map((i) => MP.scale(i, s, r.serves_base || 4)),
        };
      }

      return (
        <main className="max-w-xl mx-auto px-4 pt-11 pb-24">
          {/* Change 2: NowBar — always visible fixed bar */}
          <NowBar day={todayDay} nextDay={tomorrowDay} recipesById={recipesById} nowMin={nowMin} lang={lang} />

          <header className="mb-5 mt-6">
            <h1 className="font-display text-4xl leading-none">{MP.date.dayName(today, lang)}</h1>
            <div className="text-sm text-warm mt-1 num">{MP.date.prettyDate(today, lang)}</div>
          </header>

          <nav className="flex gap-1 mb-6 bg-sand rounded-full p-1 text-sm">
            <button onClick={() => setTab("today")}
              className={`flex-1 py-2 rounded-full transition ${tab === "today" ? "bg-cream shadow" : "text-warm"}`}>
              🍳 Today
            </button>
            <button onClick={() => setTab("coming")}
              className={`flex-1 py-2 rounded-full transition ${tab === "coming" ? "bg-cream shadow" : "text-warm"}`}>
              📅 This week
            </button>
            <button onClick={() => setTab("shop")}
              className={`flex-1 py-2 rounded-full transition ${tab === "shop" ? "bg-cream shadow" : "text-warm"}`}>
              🛒 Shop {needCount > 0 && <span className="ml-1 text-xs bg-terra text-cream rounded-full px-2 num">{needCount}</span>}
            </button>
          </nav>

          {tab === "today" && (
            <>
              <UpNextBanner day={todayDay} recipesById={recipesById} nowMin={nowMin} lang={lang} />
              <TodaySchedule day={todayDay} nextDay={tomorrowDay} recipesById={recipesById} nowMin={nowMin} lang={lang} />
              {/* Change 3: PrepTomorrow moved BEFORE meal cards */}
              <PrepTomorrow tomorrowDay={tomorrowDay} recipesById={recipesById} lang={lang} />
              <div className="space-y-5 mt-6">
                {(() => {
                  // Find the first meal whose serve time hasn't passed yet — that's "up next"
                  const meals = ["breakfast", "lunch", "dinner"];
                  const upNextMeal = meals.find((meal) => {
                    const id = todayDay[meal];
                    if (!id || !recipesById[id]) return false;
                    const mt = todayDay[meal + "_time"] || MP.schedule.defaultMealTime(meal);
                    return MP.schedule.parseHM(mt) > nowMin;
                  });
                  return meals.map((meal) => {
                    const id = todayDay[meal];
                    if (!id) return null;
                    const r = recipesById[id];
                    if (!r) return null;
                    const mealServes = todayDay[meal + "_serves"];
                    return (
                      <MealCard
                        key={meal} mealType={meal} recipe={scaleRecipe(r, mealServes)}
                        lang={lang} today={today}
                        mealTime={todayDay[meal + "_time"]}
                        mealServes={mealServes}
                        onVerify={verify}
                        nowMin={meal === upNextMeal ? nowMin : null}
                      />
                    );
                  });
                })()}
              </div>
            </>
          )}

          {tab === "coming" && (
            <ComingUpView plan={plan} upcoming={upcoming} recipesById={recipesById} today={today} lang={lang}
              onOpen={(info) => setStudy(info)} />
          )}

          {tab === "shop" && (
            <ShoppingView
              recipes={recipes} plan={plan} pantry={pantry}
              onToggle={togglePantryItem} lang={lang}
              sources={sources} extras={extras}
              onToggleExtra={async (id, done) => {
                setExtras((xs) => xs.map((x) => x.id === id ? { ...x, done } : x));
                try { await MP.api.updateExtra(id, { done }); } catch (e) { flash("Save failed", true); }
              }}
            />
          )}

          <div id="flash" aria-live="polite"
            className="fixed left-1/2 -translate-x-1/2 bottom-20 bg-ink text-cream px-4 py-2 rounded-full text-sm shadow-lg opacity-0 pointer-events-none transition">
          </div>

          {/* Change 6: Fixed footer with LangToggle */}
          <div className="fixed bottom-0 left-0 right-0 z-30 bg-cream/95 backdrop-blur border-t border-warm/10 px-4 py-2 flex justify-center">
            <LangToggle lang={lang} onChange={setLang} />
          </div>

          {study && (
            <div className="fixed inset-0 z-40 bg-ink/60 flex items-start justify-center p-3 overflow-y-auto"
              onClick={() => setStudy(null)}>
              <div className="bg-cream w-full max-w-xl rounded-2xl shadow-xl mt-6 mb-10 overflow-hidden"
                onClick={(e) => e.stopPropagation()}>
                <div className="flex items-center justify-between px-4 py-3 border-b border-warm/10 sticky top-0 bg-cream z-10">
                  <div className="font-display text-lg">
                    {MP.date.dayName(study.date, lang)} · {MP.i18n.meals[lang][study.mealType]}
                  </div>
                  <button onClick={() => setStudy(null)} className="text-warm text-2xl leading-none">×</button>
                </div>
                <div className="p-2">
                  <MealCard
                    mealType={study.mealType}
                    recipe={scaleRecipe(study.recipe, study.mealServes)}
                    lang={lang} today={study.date}
                    mealTime={study.mealTime}
                    mealServes={study.mealServes}
                    onVerify={verify}
                  />
                </div>
              </div>
            </div>
          )}
        </main>
      );
    }

    function flash(msg, bad=false) {
      const el = document.getElementById("flash");
      if (!el) return;
      el.textContent = msg;
      el.style.background = bad ? "#b4593a" : "";
      el.style.opacity = "1";
      clearTimeout(el._to);
      el._to = setTimeout(() => { el.style.opacity = "0"; }, 2200);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
